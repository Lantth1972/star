    unit3: { name: "第三单元 · 汉字王国", desc: "综合性学习：遨游汉字王国，感受汉字趣味。", textbooks: ["汉字真有趣", "我爱你，汉字"] }

const textbookFullText = {
    "祖父的园子": "我家有一个大花园，这花园里蜜蜂、蝴蝶、蜻蜓、蚂蚱，样样都有。蝴蝶有白蝴蝶、黄蝴蝶。这种蝴蝶小，不太好看。好看的是大红蝴蝶，满身带着金粉。蜻蜓是金的，蚂蚱是绿的。蜜蜂则嗡嗡地飞着，满身绒毛，落到一朵花上，胖圆圆的就跟一个小毛球似的不动了。花园里边明晃晃的，红的红，绿的绿，新鲜漂亮。...（节选自萧红《呼兰河传》）<br><br><img src='grandpa_garden.jpeg' alt='祖父的园子' class='detail-img'>",
    "古诗三首": "【稚子弄冰】稚子金盆脱晓冰，彩丝穿取当银钲。敲成玉磬穿林响，忽作玻璃碎地声。<br>【村晚】草满池塘水满陂，山衔落日浸寒漪。牧童归去横牛背，短笛无腔信口吹。<br>【四时田园杂兴】昼出耘田夜绩麻，村庄儿女各当家。童孙未解供耕织，也傍桑阴学种瓜。",
    "月是故乡明": "每个人都有个故乡，人人的故乡都有个月亮。人人都爱自己故乡的月亮。事情大概就是这个样子。但是，如果只有孤零零一个月亮，未免显得有点孤单。因此，在中国古代诗文中，月亮总有什么东西当陪衬，最多的是山和水，什么“山高月小”、“三潭印月”等等，不可胜数。...（节选自季羡林散文）",
    "草船借箭": "周瑜妒忌诸葛亮的才干，想陷害他。一天，周瑜请诸葛亮商议军事，说：“我们就要跟曹军交战了，水上交战用什么兵器最好？”诸葛亮说：“用弓箭最好。”周瑜说：“对，可是现在军中缺箭，想请先生赶造十万支箭。”...（节选自《三国演义》）",
    "景阳冈": "武松在路上行了几日，来到阳谷县地面。离县城还远，正是晌午时候，武松走得肚中饥渴，望见前面有一家酒店，门前挑着一面旗，上头写着五个字：“三碗不过冈。”...（节选自《水浒传》）",
    "汉字真有趣": "汉字是世界上最古老的文字之一，从甲骨文、金文到小篆、隶书、楷书，经历了几千年的演变。每一个汉字背后都可能藏着一个有趣的故事。例如“家”字，上面是房子，下面是猪，古人认为有猪才像家。",
    "我爱你，汉字": "汉字不仅是一种工具，更是一种艺术。书法、篆刻、对联、字谜……汉字让我们的生活充满了趣味和智慧。王羲之的《兰亭序》被称为“天下第一行书”，颜真卿的楷书雄强有力。"
};

const textAnalysis = {
    "祖父的园子": { author:"萧红（1911-1942），原名张迺莹，黑龙江呼兰人，中国现代文学史上极具才华的女作家，被誉为“民国四大才女”之一。她一生坎坷，幼年丧母，父亲冷酷，只有祖父张维祯给予她温暖和自由。萧红的作品带有强烈的自传色彩，风格细腻而忧伤。", background:"《祖父的园子》节选自萧红的长篇小说《呼兰河传》。这部小说是萧红在生命最后两年（1940-1941）于香港完成的，当时她贫病交加，却以惊人的毅力回忆童年故乡呼兰河。祖父的园子是萧红童年唯一的乐园，也是她后来漂泊岁月中精神上的避难所。", theme:"本文通过描写园子里的植物、昆虫以及“我”与祖父的互动，表达了对童年自由生活的无限怀念和对祖父深深的眷恋。核心思想是“自由与爱”：园子里的一切都是自由的，倭瓜愿意爬上架就爬上架，黄瓜愿意开一朵花就开一朵花，这正是萧红内心对无拘无束的渴望。祖父的宽容和慈爱，是萧红灰色童年中唯一的光亮。", writing:"写作特色：1）儿童视角，语言天真烂漫；2）反复使用“愿意……就……”的句式强化自由感；3）动静结合，描绘昆虫与植物；4）借景抒情，园子的热闹反衬萧红的孤寂。", today:"📌 对今天的启示：萧红用“愿意……就……”写出了自由。今天我们的生活中也有“园子”吗？比如周末的公园、自己的房间、一个兴趣班。自由不是放纵，而是允许自己按喜欢的方式探索。另外，祖父的慈爱让萧红一生怀念，你也可以为家里的长辈做一件小事，表达感谢。" },
    "古诗三首": { author:"杨万里（1127-1206），南宋诗人，与陆游、范成大、尤袤并称“中兴四大诗人”。他一生作诗两万多首，擅长捕捉童趣与自然瞬间。雷震，南宋诗人，生平不详。范成大（1126-1193），南宋诗人，擅长田园诗。", background:"三首诗写于南宋，当时社会经济稳定，农村生活安宁。杨万里晚年隐居家乡，每日观察儿童游戏；雷震描绘乡村牧童；范成大退休后长期生活在农村，对农事有细致观察。", theme:"三首诗表现了古代儿童的天真活泼和田园生活的宁静美好。《稚子弄冰》展现儿童创造力；《村晚》表现乡村随意与和谐；《四时田园杂兴》体现劳动教育从小渗透。", writing:"艺术特色：白描手法；细节生动；动静相宜；以小见大。", today:"📌 对今天的启示：古人玩冰是冬天的乐趣，今天我们可以走出户外，堆雪人、滑冰，感受自然。科技没有让童趣消失，只是换了一种方式。牧童随意吹笛子，没有乐谱；今天我们学乐器往往考级、比赛，但别忘了音乐最初是为了表达心情。你可以试着随便哼个调子，不追求完美。" },
    "月是故乡明": { author:"季羡林（1911-2009），语言学家、文学家，精通多国语言，曾任北京大学副校长。出生于山东临清农民家庭，留学德国十年。", background:"写于季羡林晚年。1935年赴德国哥廷根大学留学，因二战滞留十年，无法与家人通信，极度思乡。文中“月是故乡明”源自杜甫《月夜忆舍弟》。", theme:"通过对比世界各地月亮与故乡月亮，抒发“月是故乡明”的普遍情感。每个人都有一片精神故乡，无论走多远，那里永远最明亮。", writing:"写作特色：对比手法；旁征博引；口语化叙述；情景交融。", today:"📌 对今天的启示：今天我们有了视频通话，可以随时联系。但技术的便利会不会让我们忽略了“用心思念”？可以试着给亲人写一封信，或做一道家乡菜，用行动表达思念。" },
    "草船借箭": { author:"罗贯中（约1330-1400），元末明初小说家，《三国演义》的作者。他广泛搜集历史资料和民间传说，融合自己的创作，写成这部长篇巨著。", background:"《草船借箭》选自《三国演义》第四十六回，故事发生在赤壁之战前夕。当时周瑜嫉妒诸葛亮的才能，故意刁难他，要他十天造十万支箭。诸葛亮却说只要三天，并立下军令状。他用智慧化解了危机，展现了非凡的谋略。", theme:"表现了诸葛亮的足智多谋、神机妙算，也衬托出周瑜的心胸狭隘。通过这个故事，我们看到了智慧的力量：不是硬碰硬，而是利用自然规律（大雾）和对手的心理（曹操多疑），达到自己的目的。", writing:"写作特色：通过对话和行动描写人物性格；情节环环相扣，悬念迭起；环境描写（大雾）推动了情节发展；对比手法突出诸葛亮和周瑜的不同。", today:"📌 对今天的启示：遇到困难时不要硬碰硬，换个角度思考，利用身边的资源，也许就能想出巧妙的办法。比如用雾天借箭，就是利用自然条件解决问题。学习中遇到难题，也可以换个思路，或者请教他人。" },
    "景阳冈": { author:"施耐庵（1296-1370），元末明初小说家，《水浒传》的作者。他生活在社会动荡的年代，对底层人民的生活有深刻了解。", background:"《景阳冈》选自《水浒传》第二十三回，描写武松打虎的经典片段。故事发生在北宋末年，武松回家路过景阳冈，在酒店喝了十八碗酒后，不听劝告执意过冈，果然遇到猛虎。", theme:"表现了武松的勇敢无畏、豪爽倔强的性格。武松明知山有虎，偏向虎山行，体现了英雄气概。同时，故事也提醒人们不要轻信传言，但也要敬畏自然。", writing:"写作特色：动作描写生动传神（如“闪”“揪”“按”等动词）；环境描写烘托紧张气氛；语言富有地方特色，口语化强；细节真实，如老虎的“一扑、一掀、一剪”。", today:"📌 对今天的启示：面对强大的困难，勇气和智慧缺一不可。武松不是蛮干，他观察老虎的弱点，最终战胜了它。但在现实生活中，遇到危险要首先保护自己，呼叫大人。我们学习的是他的勇敢精神，不是模仿他的行为。同时，要保护野生动物，老虎现在是国家一级保护动物。" },
    "汉字真有趣": { author:"无特定作者，综合性学习内容。", background:"汉字是世界上唯一沿用至今的表意文字，已有三千多年历史。从甲骨文到金文、小篆、隶书、楷书，汉字经历了漫长的演变。每一笔画都承载着古人的智慧。", theme:"感受汉字的趣味和智慧，激发对汉字的热爱。每个汉字都是一幅画、一个故事，通过字谜、谐音、形声字等，我们可以发现汉字的奇妙之处。", writing:"通过字谜、谐音、形声字等展示汉字的魅力。语言活泼有趣，适合小学生阅读。", today:"📌 对今天的启示：每个汉字都是一幅画、一个故事。试着去发现你名字里每个字的含义，你会更爱自己的名字。也可以和家人玩猜字谜游戏，感受汉字带来的乐趣。" },
    "我爱你，汉字": { author:"无特定作者，综合性学习内容。", background:"汉字书法是独特的艺术形式，篆隶楷行草各具美感。文房四宝——笔、墨、纸、砚，承载了中华文明。书法不仅是写字，更是修身养性的方式。", theme:"表达对汉字的热爱，传承中华文化。汉字不仅是工具，更是艺术和精神的载体。通过书法，我们可以感受到汉字的美和力量。", writing:"抒情与说明结合，引用名家名言，如“书为心画”。语言优美，感染力强。", today:"📌 对今天的启示：写一手好字不仅让人赏心悦目，也是对自己文化的尊重。每天练字十分钟，你会收获专注和美感。汉字也是连接全球华人的纽带，要为自己的文化自豪。" }
};

    "祖父的园子": { outline:"【写作大纲】\n一、开头点明园子位置（80字）。\n二、描写园子里的植物和昆虫，用拟人手法（150字）。\n三、写与长辈的互动（100字）。\n四、结尾表达情感（70字）。\n加分技巧：使用“愿意……就……”句式。", essays:[{ title:"范文一：心灵的花园", content:"每个人心中都有一座秘密花园。我的花园在外婆家的老院子。院子西墙种着一架丝瓜，藤蔓调皮地爬上屋檐，开出黄色的五瓣花。丝瓜一个个垂下来，像绿色的棒槌在荡秋千。东边角落里有一堆旧瓦片，掀开瓦片，常常能看见蜈蚣慌忙逃窜，或者西瓜虫缩成一个小黑球。外婆说，那些瓦片是给虫子们盖的房子。\n\n我最喜欢夏天的傍晚。外婆搬出竹椅坐在丝瓜架下，摇着蒲扇给我讲故事。萤火虫提着小灯笼飞来飞去，青蛙在远处的池塘里合唱。我趴在草地上，看蚂蚁排队搬运饭粒，看蜗牛背着房子慢吞吞旅行。外婆指着天空说：“你看，那三颗最亮的星叫‘扁担星’，中间那颗是牛郎，两边是他挑着的孩子。”我数着星星，不知不觉睡去。这就是我的心灵花园——没有名贵的花草，只有丝瓜、瓦片、萤火虫和外婆的故事。" },{ title:"范文二：都市里的秘密基地（时事结合）", content:"去年秋天，学校组织我们去光明欢乐田园研学。那是一个巨大的农场，有稻田、菜地和花海。导游说，这里是深圳版的“祖父的园子”。我们班分到一块菜地，种黄瓜。我学着农民伯伯的样子，先用小铲子挖坑，再把黄瓜苗放进去，盖上土，浇透水。阳光晒得我满头大汗，但看着一排排绿油油的秧苗，心里特别快乐。\n\n两个月后，黄瓜开花了，金灿灿的。又过了一周，长出了带刺的小黄瓜。我每天放学都想去看看它们长大了没有。终于，黄瓜可以采摘了！我轻轻拧下一根，咬一口，脆生生的，有一股清甜。老师说，深圳有很多这样的“城市农场”，比如南山的“昆虫旅馆”、福田的“屋顶菜园”。原来，即使在钢筋水泥的城市里，我们也能拥有一片属于自己的园子。现在，我也在阳台种了一盆番茄。每天浇水、松土，看着它开花结果。虽然它很小，但就像课文里说的——在这个阳台上，一切都是自由的。" }] },
    "古诗三首": { outline:"【写作大纲】\n一、选择一首古诗（80字）。\n二、想象自己穿越到那个场景（150字）。\n三、描写画面和感受（150字）。\n四、回到现实，写出感悟（80字）。", essays:[{ title:"范文一：冰，碎了", content:"冬天，我和表弟在老家院子玩。水缸里的水结了一层厚厚的冰。表弟拿锤子敲下一块，提在手里当锣敲。“当！当！当！”冰发出清脆的响声，像寺庙里的钟。表弟越敲越起劲，突然“哗啦”一声，冰碎了一地，晶莹的碎片在阳光下闪烁。表弟愣了一下，然后咯咯笑起来。那一刻，我想起了杨万里的《稚子弄冰》：“敲成玉磬穿林响，忽作玻璃碎地声。”原来，一千年前的孩子也和我们一样，会为一块冰而快乐，也会为冰碎了而哈哈大笑。古诗不是遥远的文字，它就是我们身边的游戏。" },{ title:"范文二：冰雪奇缘（时事结合）", content:"今年寒假，爸爸妈妈带我去哈尔滨看冰雪大世界。那里有冰雕城堡、冰滑梯，还有一座用冰块搭成的“童趣园”。童趣园里复原了《稚子弄冰》的场景：几个冰雕小孩正用彩线穿冰钲。游客可以亲手体验敲冰——工作人员递给我们小木槌，冰块发出“叮叮当当”的声音，像编钟一样好听。导游阿姨说，哈尔滨每年冬天都举办这样的冰雪节，吸引了全国各地的游客。她还说，2025年哈尔滨冰雪大世界特别增设了“古诗冰雕区”，就是为了让更多人通过冰来感受中国古诗词的美。我敲着冰块，心里想：古代孩子玩冰是冬天的日常，今天我们玩冰成了一种文化旅行。虽然时代变了，但快乐从来没有变。" }] },
    "月是故乡明": { outline:"【写作大纲】\n一、引用诗句或描写月亮（80字）。\n二、写两个不同地方的月亮（150字）。\n三、借月亮写一个人或回忆（150字）。\n四、结尾点题“月是故乡明”（80字）。", essays:[{ title:"范文一：两地的月亮", content:"去年中秋，我在深圳湾公园看月亮。月亮又大又圆，倒映在海面上，被海浪揉成碎银。周围人很多，大家举着手机拍照，热闹极了。可我心里总觉得缺了点什么——那是一种说不出的安静。\n\n今年中秋，我回到了山东老家的院子。夜幕降临，月亮从枣树梢悄悄升起来，月光把青瓦照得发亮。院子里只有蟋蟀在墙角唱歌，奶奶端出月饼，切成一牙一牙。咬一口，是五仁的香味，和记忆里一模一样。\n\n奶奶说：“月亮还是那个月亮，可看月亮的地方不一样，心里的温度也不一样。”我抬头望着月亮，忽然想起季羡林爷爷的话：“月是故乡明。”是啊，深圳的月亮也很亮，但老家的月亮更暖——因为那里有童年的枣树，有奶奶的月饼，有蟋蟀的夜曲。" },{ title:"范文二：月亮上的中国红（时事结合）", content:"2024年，嫦娥六号成功从月球背面采样返回。新闻里说，这是人类第一次取到月球背面的石头。我盯着电视屏幕，看着返回舱拖着降落伞安全着陆，心里涌起一股自豪。\n\n晚上，我爬到阳台上看月亮。今天的月亮格外明亮，我想，也许有一天中国人真的会在月球上建基地呢。爷爷走过来，也望着月亮。他说：“我们小时候，月亮就是嫦娥玉兔的传说。现在，中国人真的登上了月球背面。”\n\n爷爷还告诉我，1969年美国登月时，他还年轻，羡慕得不得了。如今，中国航天一步步追赶，终于把国旗插上了月球。\n\n我忽然明白了：月亮不仅是故乡的象征，也是梦想的象征。从季羡林的思乡，到今天的探月，一代代中国人望着同一个月亮，却写出了不同的故事。将来，我也想去月球看看——带着故乡的月饼。" }] },
    "草船借箭": { outline:"【写作大纲】\n一、交代背景（80字）。\n二、描述借箭过程（150字）。\n三、总结诸葛亮的智慧（100字）。\n四、联系现实（80字）。", essays:[{ title:"范文一：假如我是诸葛亮", content:"如果我是诸葛亮，我也会选择在大雾天用草船借箭。但我还会加一道保险：在船尾绑上一些稻草人，防止箭射空。另外，我还会派人提前在水下设置渔网，万一有箭掉进水里还能捞回来。最重要的是，我会让士兵们不要出声，以免被曹军发现是草人。这样，十万支箭肯定能稳稳到手。不过，我还是觉得诸葛亮更聪明，因为他只用三天就完成任务，而我可能还需要多一天。这个故事告诉我，遇到困难要多动脑筋，利用现有的条件解决问题。" },{ title:"范文二：现代版草船借箭（时事结合）", content:"2025年，中国航天团队用“借力”方式成功回收火箭助推器，就像诸葛亮借箭一样聪明。他们利用地球引力让助推器自然减速，再用网兜接住，既省钱又环保。还有，在疫情防控中，科学家借用大数据分析传播路径，提前采取措施。这些都是“草船借箭”的现代版——借用自然规律和现有技术，达到四两拨千斤的效果。看来，古人的智慧至今还在启发我们。我们在学习生活中也可以借用别人的经验和方法，让自己进步更快。" }] },
    "景阳冈": { outline:"【写作大纲】\n一、武松喝酒（80字）。\n二、上冈遇虎（100字）。\n三、打虎过程（150字）。\n四、下冈感悟（80字）。", essays:[{ title:"范文一：我心中的英雄", content:"武松的勇敢让我佩服。他在景阳冈上遇到老虎，没有逃跑，而是冷静地观察老虎的弱点。老虎用“一扑、一掀、一剪”三招，武松躲开后，趁机拳打脚踢，最终打死了老虎。这告诉我，面对困难要勇敢，还要有智慧。武松不是盲目蛮干，他抓住了老虎动作的间隙。在我们的学习中，遇到难题也要像武松一样，先看清问题的“招式”，再想办法破解。但我不赞成武松喝了十八碗酒还上冈，喝酒会让人反应变慢，这是危险的行为。英雄也要注意安全！" },{ title:"范文二：现代打虎英雄（时事结合）", content:"2024年，东北虎豹国家公园的巡护员们用科技手段保护老虎，他们才是真正的“打虎”英雄。他们通过红外相机监测老虎活动，用无人机追踪老虎位置，还给受伤的老虎做手术。他们不再是用拳头打虎，而是用爱心和科技保护老虎。现在野生东北虎的数量已经从几年前的27只增加到50只。这些巡护员每天要走几十公里山路，风餐露宿，他们像武松一样勇敢，但他们的“打虎”是保护老虎。这才是现代英雄——与自然和谐共处。" }] },
    "汉字真有趣": { outline:"【写作大纲】\n一、介绍一个有趣的汉字（100字）。\n二、讲它的故事或演变（150字）。\n三、说说你的感受（100字）。", essays:[{ title:"范文一：“家”字的故事", content:"“家”上面是“宀”，下面是“豕”，表示房子里有猪。古人把猪养在屋子里，因为猪是财富的象征，也代表家庭有食物。所以“家”这个字，充满了烟火气和安全感。每次看到“家”，我就想起外婆家院子里的猪圈，虽然臭烘烘的，但那是家的味道。汉字就像一幅幅画，藏着古代人的生活智慧。现在，你也能从自己的名字里找到这样的故事吗？" },{ title:"范文二：汉字里的中国智慧（时事结合）", content:"2025年，联合国中文日活动中，外国朋友被“和”字深深打动。“和”左边是“禾”，右边是“口”，表示人人有饭吃，社会就和谐。这个简单的汉字，却包含了中国几千年的和平思想。如今，中国提出“人类命运共同体”，也是“和”字的最好诠释。汉字不仅是中国的，也是世界的。作为一个中国人，写好汉字、理解汉字，就是传承我们的文化。" }] },
    "我爱你，汉字": { outline:"【写作大纲】\n一、汉字的美（100字）。\n二、我学书法的经历（150字）。\n三、对汉字的热爱（100字）。", essays:[{ title:"范文一：我与毛笔的约会", content:"第一次拿起毛笔，我的手在发抖。老师告诉我，要“腕平掌竖”，才能写出好字。我写了一百个“永”字，终于有一个像样了。墨香弥漫在空气中，我的心慢慢静下来。那一刻，我觉得毛笔就像一个老朋友，在跟我对话。现在，我每天都会练字半小时，虽然写得还不够好，但我已经爱上了那种专注的感觉。毛笔字让我变得更有耐心。" },{ title:"范文二：汉字走向世界（时事结合）", content:"2026年，全球汉语学习者已超过2亿。汉字从中国走向世界，成为连接不同文化的桥梁。在美国，很多学校开设中文课；在非洲，孔子学院的孩子们用毛笔写“福”字。汉字不再只是中国的，它是世界的。我爱你，汉字——因为你让我感到自豪。每当看到外国朋友认真书写汉字时，我都会为我们的文化感到骄傲。我要继续学好汉字，将来把汉字的美介绍给更多人。" }] }
};

const englishSection = {
    "祖父的园子": { vocab:"garden (园子), pumpkin (倭瓜), dragonfly (蜻蜓), freedom (自由)", culture:"《秘密花园》——小女孩玛丽在荒废花园中找回快乐，和萧红的园子一样象征自由与治愈。", translation:null },
    "古诗三首": { vocab:"ice (冰), child (儿童), buffalo (水牛), flute (笛子)", culture:"《一个孩子的诗园》——英国诗人史蒂文森写童年游戏，与杨万里的童趣诗异曲同工。", translation:"许渊冲译《稚子弄冰》：A child from gold bowl scoops out ice at break of day, / Through a colored silk string he wears it as a jade. / He knocks it with a stick, the sound spreads far away, / When suddenly it breaks, like smashing glass, he's sad." },
    "月是故乡明": { vocab:"moon (月亮), hometown (故乡), bright (明亮的), miss (思念)", culture:"彭斯《我的心在高原》——苏格兰诗人思念故乡高山，与季羡林望月思乡一样深情。", translation:"直译：The moon is brighter in my hometown. 意译：There's no place like home, and no moon like the one above it." },
    "草船借箭": { vocab:"arrow (箭), fog (雾), wisdom (智慧)", culture:"《三国演义》英译本——西方读者也能感受到诸葛亮的智慧。类似的作品有希腊神话中的《奥德赛》，主人公奥德修斯用木马计攻陷特洛伊。", translation:null },

    "汉字真有趣": { vocab:"Chinese character (汉字), oracle bone (甲骨文)", culture:"西方人学汉字的故事——很多外国人觉得汉字像画一样，他们用联想记忆法学习。例如，“木”字像一棵树，“林”是两棵树，“森”是三棵树。", translation:null },
    "我爱你，汉字": { vocab:"calligraphy (书法), brush (毛笔)", culture:"大英博物馆汉字展——让世界了解中国书法。西方也有类似的艺术形式，比如阿拉伯书法、西方的花体字等。", translation:null }
};

function getTextbookData(unitId, textbook) {
    return {
        fullText: textbookFullText[textbook],
        analysis: textAnalysis[textbook],
        science: scienceExt[textbook] || [],
        history: historyExt[textbook] || [],
        current: currentAffairs[textbook],
        writing: writingTips[textbook],
        english: englishSection[textbook]
    };
}

// ========== 全局状态与交互 ==========
let currentUnitId = "unit1", currentTextbook = "祖父的园子", currentCategory = null;
let completedCards = JSON.parse(localStorage.getItem("completedCards") || "{}");
let userChallenges = JSON.parse(localStorage.getItem("userChallenges") || "{}");
let parentMode = localStorage.getItem("parentMode") === "true";
let audioEnabled = localStorage.getItem("audioEnabled") === "true";
document.getElementById("parentModeCheckbox").checked = parentMode;
document.getElementById("audioCheckbox").checked = audioEnabled;
document.getElementById("parentModeCheckbox").addEventListener("change", e => { parentMode = e.target.checked; localStorage.setItem("parentMode", parentMode); if(currentCategory) renderDetailView(); });
document.getElementById("audioCheckbox").addEventListener("change", e => { audioEnabled = e.target.checked; localStorage.setItem("audioEnabled", audioEnabled); });

function markCompleted(category) { let key = `${currentUnitId}_${currentTextbook}_${category}`; if(!completedCards[key]){ completedCards[key]=true; localStorage.setItem("completedCards",JSON.stringify(completedCards)); updateProgress(); } }
function updateProgress() { let allKeys = []; for(let u of Object.keys(units)) for(let t of units[u].textbooks) for(let cat of ["课文内容","课文解析","科学拓展","人文历史","时事观察","作文小锦囊","英文小站"]) allKeys.push(`${u}_${t}_${cat}`); let done = allKeys.filter(k=>completedCards[k]).length; let total = allKeys.length; let percent = Math.round(done/total*100); let progressHtml = `📊 学习进度：已完成 ${done}/${total} 个核心卡片 (${percent}%)`; if(percent===100) progressHtml += " 🎉 恭喜！获得【跨学科小达人】勋章！"; document.getElementById("progressDisplay").innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>${progressHtml}`; }
function saveChallenge() { let note = document.getElementById("challengeNote").value; let key = `${currentUnitId}_${currentTextbook}_${currentCategory}_challenge`; if(note) userChallenges[key]=note; else delete userChallenges[key]; localStorage.setItem("userChallenges",JSON.stringify(userChallenges)); alert("笔记已保存！"); }
function speak(text) { if(audioEnabled && window.speechSynthesis) { window.speechSynthesis.cancel(); let u = new SpeechSynthesisUtterance(text); u.lang="zh-CN"; u.rate=0.9; window.speechSynthesis.speak(u); } }
function getTextForSpeak(content) { let div = document.createElement("div"); div.innerHTML = content; return div.innerText; }

function renderHome() { let search = document.getElementById("searchInput").value.toLowerCase(); let grid = document.getElementById("unitGrid"); grid.innerHTML = ""; for(let [id,u] of Object.entries(units)){ if(search && !u.name.toLowerCase().includes(search) && !u.textbooks.some(t=>t.toLowerCase().includes(search))) continue; let card = document.createElement("div"); card.className="card-item"; card.innerHTML=`<div class="card-icon">📚</div><div class="card-label">${u.name}</div>`; card.onclick=()=>{ currentUnitId=id; currentTextbook=u.textbooks[0]; renderUnitView(); showView("unitView"); }; grid.appendChild(card); } updateProgress(); }
function renderUnitView() { let unit=units[currentUnitId]; document.getElementById("unitName").innerText=unit.name; document.getElementById("unitDesc").innerText=unit.desc; let tabsDiv=document.getElementById("textbookTabs"); tabsDiv.innerHTML=""; unit.textbooks.forEach(tb=>{ let btn=document.createElement("button"); btn.className=`tab-btn ${tb===currentTextbook?"active":""}`; btn.innerText=tb; btn.onclick=()=>{ currentTextbook=tb; renderUnitView(); }; tabsDiv.appendChild(btn); }); let categories=[{id:"课文内容",icon:"📖",label:"课文内容"},{id:"课文解析",icon:"🔍",label:"课文解析"},{id:"科学拓展",icon:"🔬",label:"科学拓展"},{id:"人文历史",icon:"🏛️",label:"人文历史"},{id:"时事观察",icon:"📰",label:"时事观察"},{id:"作文小锦囊",icon:"✍️",label:"作文小锦囊"},{id:"英文小站",icon:"🇬🇧",label:"英文小站"}]; let grid=document.getElementById("categoryGrid"); grid.innerHTML=""; categories.forEach(cat=>{ let card=document.createElement("div"); card.className="card-item"; card.innerHTML=`<div class="card-icon">${cat.icon}</div><div class="card-label">${cat.label}</div>`; card.onclick=()=>{ if(cat.id==="时事观察"){ showView("currentSubView"); renderCurrentSubView(); } else { currentCategory=cat.id; renderDetailView(); showView("detailView"); } }; grid.appendChild(card); }); }
function renderCurrentSubView() { let subs=[{id:"international",label:"🌍 国际",icon:"🌍"},{id:"national",label:"🇨🇳 全国",icon:"🇨🇳"},{id:"shenzhen",label:"🏙️ 深圳",icon:"🏙️"},{id:"media",label:"🎬 影视文学",icon:"🎬"}]; let grid=document.getElementById("currentSubGrid"); grid.innerHTML=""; subs.forEach(sub=>{ let card=document.createElement("div"); card.className="card-item"; card.innerHTML=`<div class="card-icon">${sub.icon}</div><div class="card-label">${sub.label}</div>`; card.onclick=()=>{ currentCategory=sub.id; renderDetailView(); showView("detailView"); }; grid.appendChild(card); }); }
function renderDetailView() { let data=getTextbookData(currentUnitId,currentTextbook); let title="",contentHtml=""; if(currentCategory==="课文内容"){ title="📖 课文内容"; contentHtml=`<div class="detail-section">${data.fullText}</div>`; } else if(currentCategory==="课文解析"){ title="🔍 课文解析"; contentHtml=`<div><strong>✍️ 作者简介</strong><br>${data.analysis.author}</div><div><strong>📖 创作背景</strong><br>${data.analysis.background}</div><div><strong>🎯 中心思想</strong><br>${data.analysis.theme}</div><div><strong>✒️ 写作特色</strong><br>${data.analysis.writing}</div><div class="insight-block"><strong>📌 对今天的启示</strong><br>${data.analysis.today}</div>`; } else if(currentCategory==="科学拓展"){ title="🔬 科学拓展"; contentHtml=data.science.map(s=>`<div class="detail-section"><h3>${s.title}</h3><p>${s.content}</p></div>`).join("<hr>"); } else if(currentCategory==="人文历史"){ title="🏛️ 人文历史"; contentHtml=data.history.map(h=>`<p>${h}</p>`).join(""); } else if(["international","national","shenzhen","media"].includes(currentCategory)){ let map={international:"国际时事",national:"全国时事",shenzhen:"深圳时事",media:"影视文学"}; title=`📰 ${map[currentCategory]}`; let items=data.current[currentCategory]; contentHtml=items.map(item=>`<div class="sub-section"><div class="sub-section-title">${item.title}</div><div>${item.content}</div></div>`).join(""); } else if(currentCategory==="作文小锦囊"){ title="✍️ 作文小锦囊"; let essaysHtml=data.writing.essays.map(e=>`<div><strong>${e.title}</strong><div class="essay-full">${e.content}</div></div>`).join(""); if(parentMode) essaysHtml="<p>家长模式已隐藏范文，关闭后可查看。</p>"; contentHtml=`<div><strong>📝 写作大纲</strong><pre>${data.writing.outline}</pre></div>${essaysHtml}`; } else if(currentCategory==="英文小站"){ title="🇬🇧 英文小站"; contentHtml=`<div><strong>📖 核心词汇</strong><br>${data.english.vocab}</div><div><strong>🌍 文化连接</strong><br>${data.english.culture}</div>`; if(data.english.translation) contentHtml+=`<div><strong>🖋️ 古诗英译</strong><br>${data.english.translation}</div>`; } document.getElementById("detailTitle").innerText=title; document.getElementById("detailContent").innerHTML=contentHtml; markCompleted(currentCategory); let challengeKey=`${currentUnitId}_${currentTextbook}_${currentCategory}_challenge`; let saved=userChallenges[challengeKey]||""; document.getElementById("challengeNote").value=saved; document.getElementById("challengeArea").style.display="block"; document.getElementById("saveChallengeBtn").onclick=saveChallenge; if(audioEnabled){ let textToSpeak=getTextForSpeak(contentHtml); if(textToSpeak.trim()) speak(textToSpeak); } }
function showView(viewId){ document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden")); document.getElementById(viewId).classList.remove("hidden"); }

document.getElementById("backToHomeFromUnit").onclick=()=>{ renderHome(); showView("homeView"); };
document.getElementById("backToCategory").onclick=()=>{ if(["international","national","shenzhen","media"].includes(currentCategory)) showView("currentSubView"); else { renderUnitView(); showView("unitView"); } };
document.getElementById("backToCategoryFromSub").onclick=()=>{ renderUnitView(); showView("unitView"); };
document.getElementById("searchBtn").onclick=()=>{ renderHome(); };
document.getElementById("randomBtn").onclick=()=>{ let allTextbooks=[]; for(let u of Object.values(units)) for(let t of u.textbooks) allTextbooks.push({unitId:Object.keys(units).find(id=>units[id].name===u.name), textbook:t}); let rand=allTextbooks[Math.floor(Math.random()*allTextbooks.length)]; currentUnitId=rand.unitId; currentTextbook=rand.textbook; renderUnitView(); showView("unitView"); };
document.getElementById("printBtn").onclick=()=>{ window.print(); };
renderHome(); showView("homeView");
</script>
</body>
</html>

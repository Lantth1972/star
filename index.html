<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>来自宇宙的声音 - 答案之书版</title>
    <style>
        :root {
            --gold: #d4af37;
            --star-white: rgba(255, 255, 255, 0.8);
            --bg-color: linear-gradient(to bottom, #02060c 0%, #0a192f 60%, #000 100%);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: white; font-family: "PingFang SC", "STHeiti", serif;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        #bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            transition: background 3s ease-in-out;
            z-index: 1;
        }

        #star-canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        .container { position: relative; z-index: 10; width: 90%; max-width: 600px; text-align: center; }

        .page { display: none; opacity: 0; transition: opacity 1.5s ease; }
        .active { display: block; opacity: 1; }

        /* 呼吸文字 */
        .text-breathe { 
            font-size: 24px; letter-spacing: 5px; opacity: 0; 
            text-shadow: 0 0 20px var(--star-white);
            position: absolute; width: 100%; left: 0;
        }
        .anim-breathe { animation: breatheFade 5s ease-in-out forwards; }
        @keyframes breatheFade {
            0% { opacity: 0; transform: scale(0.9); }
            40%, 60% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        /* 提问框 */
        .question-input-wrapper { margin: 50px 0; }
        #user-question {
            width: 100%; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px; padding: 18px 30px;
            color: white; font-size: 20px; text-align: center;
            outline: none; backdrop-filter: blur(10px);
            transition: all 0.5s; box-sizing: border-box;
        }
        #user-question:focus { border-color: var(--gold); box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }

        /* 能量球 */
        .energy-sphere { 
            width: 150px; height: 150px; background: radial-gradient(circle at 30% 30%, #fff 0%, #4facfe 100%);
            border-radius: 50%; margin: 0 auto; box-shadow: 0 0 60px #4facfe;
            animation: pulse 2.5s infinite alternate; cursor: pointer; 
        }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.15); opacity: 1; } }

        /* 答案页 */
        .ans-cn { font-size: 36px; font-weight: bold; margin-bottom: 20px; letter-spacing: 3px; color: #fff; }
        .ans-en { font-size: 18px; color: rgba(255,255,255,0.6); font-style: italic; line-height: 1.4; padding: 0 20px; }
        
        /* 超大“再次聆听”按钮 */
        .reset-btn { 
            margin-top: 70px; background: rgba(212, 175, 55, 0.1); 
            border: 2px solid var(--gold); color: var(--gold); 
            padding: 20px 60px; border-radius: 50px; 
            font-size: 22px; font-weight: bold; letter-spacing: 4px;
            cursor: pointer; transition: all 0.4s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .reset-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }
    </style>
</head>
<body>

    <div id="bg-wrapper"></div>
    <canvas id="star-canvas"></canvas>

    <div class="container">
        <!-- 第1页 -->
        <div id="page1" class="page active">
            <div style="height:80px; position:relative;">
                <div id="line1" class="text-breathe">聆听来自宇宙的声音</div>
                <div id="line2" class="text-breathe">感受宇宙能量的奥妙</div>
            </div>
        </div>

        <!-- 第2页 -->
        <div id="page2" class="page">
            <div style="font-size: 22px; letter-spacing: 3px;">请在心中默念你的问题</div>
            <div class="question-input-wrapper">
                <input type="text" id="user-question" autocomplete="off" placeholder="点击输入...">
            </div>
            <button class="reset-btn" style="margin-top:0; padding:12px 40px; font-size:16px;" onclick="goToEnergy()">同步能量</button>
        </div>

        <!-- 第3页 -->
        <div id="page3" class="page">
            <div style="font-size: 22px; margin-bottom: 50px; color: var(--star-white); min-height: 30px;" id="display-q"></div>
            <div class="energy-sphere" onclick="showAnswer()"></div>
            <div style="margin-top: 40px; color: var(--gold); font-size: 18px;">触碰能量球 · 接收感应</div>
        </div>

        <!-- 第4页 -->
        <div id="page4" class="page">
            <div class="ans-cn" id="ans-cn"></div>
            <div class="ans-en" id="ans-en"></div>
            <button class="reset-btn" onclick="location.reload()">再次聆听回响</button>
        </div>
    </div>

<script>
    // --- 200条答案之书语库 (精选经典) ---
    const answers = [
        { cn: "顺其自然", en: "Let it be" },
        { cn: "绝对不要", en: "Absolutely not" },
        { cn: "答案就在你心中", en: "The answer is within you" },
        { cn: "时机尚未成熟", en: "The time is not yet ripe" },
        { cn: "勇敢地去尝试", en: "Go for it bravely" },
        { cn: "会有意外的收获", en: "There will be unexpected gains" },
        { cn: "不要犹豫", en: "Do not hesitate" },
        { cn: "重新审视你的初衷", en: "Re-examine your original intention" },
        { cn: "你需要更多信息", en: "You need more information" },
        { cn: "结果令人满意", en: "The result will be satisfying" },
        { cn: "这并不重要", en: "It is not important" },
        { cn: "换个角度思考", en: "Think from another perspective" },
        { cn: "那是显而易见的", en: "It is obvious" },
        { cn: "坚持下去", en: "Hold on to it" },
        { cn: "别太认真", en: "Don't take it too seriously" },
        { cn: "现在正是时候", en: "Now is the time" },
        { cn: "保持开放的心态", en: "Keep an open mind" },
        { cn: "寻求他人的建议", en: "Seek advice from others" },
        { cn: "不必担心", en: "No need to worry" },
        { cn: "结局会很美好", en: "A beautiful ending is coming" },
        { cn: "放弃是明智的", en: "It's wise to give up" },
        { cn: "专注在当下", en: "Focus on the present" },
        { cn: "你会感到惊喜", en: "You will be surprised" },
        { cn: "你需要耐心等待", en: "You need to wait patiently" },
        { cn: "毫无疑问", en: "Without a doubt" },
        { cn: "值得一试", en: "It's worth a try" },
        { cn: "别做无谓的挣扎", en: "Don't struggle in vain" },
        { cn: "相信你的直觉", en: "Trust your intuition" },
        { cn: "可能性很大", en: "It is highly probable" },
        { cn: "这是必然的", en: "It is inevitable" },
        { cn: "或许你应该拒绝", en: "Perhaps you should decline" },
        { cn: "这会消耗你的能量", en: "This will consume your energy" },
        { cn: "再等一等", en: "Wait a little longer" },
        { cn: "接受挑战", en: "Accept the challenge" },
        { cn: "事情没有那么简单", en: "It's not that simple" },
        { cn: "一切都在变好", en: "Everything is getting better" },
        { cn: "去做吧", en: "Just do it" },
        { cn: "不要勉强", en: "Don't force it" },
        { cn: "这需要勇气", en: "This requires courage" },
        { cn: "这是一份礼物", en: "This is a gift" }
        // ... (此处为了代码演示逻辑，已内置经典回复，实际运行将随机抽取)
    ];

    // 动态扩充至200条相似风格
    const extraCns = ["是的","不","很有可能","很难说","暂时别想","全力以赴","换个人试试","你会后悔的","别回头","这是个好主意","你会成功的","保持沉默","这不属于你","放手吧","别听他的","情况会改变","答案是肯定的","没戏","顺应天意","你需要休息"];
    const extraEns = ["Yes","No","Highly likely","Hard to say","Forget it for now","Go all out","Try someone else","You will regret it","Don't look back","Great idea","You'll succeed","Keep silent","It's not yours","Let go","Don't listen","Situation will change","Yes, definitely","No chance","Follow nature","Rest needed"];
    
    while(answers.length < 200) {
        let idx = Math.floor(Math.random() * extraCns.length);
        answers.push({ cn: extraCns[idx], en: extraEns[idx] });
    }

    const hints = ["他爱我吗？", "该辞职吗？", "他会回来吗？", "这次能成功吗？", "明天会下雨吗？", "我该买吗？"];

    function getDailyColors() {
        const now = new Date();
        const hue = ((now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate()) * 137.5) % 360; 
        return { top: '#02060c', mid: `hsl(${hue}, 40%, 10%)`, bottom: `hsl(${hue}, 60%, 25%)` };
    }

    window.onload = function() {
        initStarEngine();
        const l1 = document.getElementById('line1');
        const l2 = document.getElementById('line2');
        l1.classList.add('anim-breathe');
        setTimeout(() => l2.classList.add('anim-breathe'), 4500);
        setTimeout(() => nextPage(1, 2), 9500);
    };

    function nextPage(from, to) {
        document.getElementById('page' + from).classList.remove('active');
        setTimeout(() => {
            document.getElementById('page' + to).classList.add('active');
            if(to === 2) startHintRotation();
        }, 1000);
    }

    function startHintRotation() {
        const input = document.getElementById('user-question');
        let i = 0;
        setInterval(() => {
            i = (i + 1) % hints.length;
            input.placeholder = hints[i];
        }, 3000);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') goToEnergy(); });
    }

    function goToEnergy() {
        const q = document.getElementById('user-question').value;
        if(q.trim() !== "") document.getElementById('display-q').innerText = `「${q}」`;
        nextPage(2, 3);
    }

    function showAnswer() {
        const res = answers[Math.floor(Math.random() * answers.length)];
        document.getElementById('ans-cn').innerText = res.cn;
        document.getElementById('ans-en').innerText = res.en;
        const c = getDailyColors();
        document.documentElement.style.setProperty('--bg-color', `linear-gradient(to bottom, ${c.top} 0%, ${c.mid} 60%, ${c.bottom} 100%)`);
        nextPage(3, 4);
    }

    function initStarEngine() {
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        const stars = Array.from({length: 200}, () => ({
            x: Math.random() * w, y: Math.random() * h,
            size: Math.random() * 1.5, opacity: Math.random(),
            speed: 0.01 + Math.random() * 0.03
        }));
        let meteors = [];
        function draw() {
            ctx.clearRect(0, 0, w, h);
            stars.forEach(s => {
                s.opacity += s.speed;
                if (s.opacity > 1 || s.opacity < 0.1) s.speed = -s.speed;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });
            if (Math.random() > 0.985) meteors.push({x: Math.random()*w, y: Math.random()*h/2, len: Math.random()*100+50, speed: Math.random()*12+8, o: 1});
            meteors.forEach((m, i) => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${m.o})`;
                ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(m.x-m.len, m.y+m.len); ctx.stroke();
                m.x -= m.speed; m.y += m.speed; m.o -= 0.02;
                if(m.o <= 0) meteors.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>

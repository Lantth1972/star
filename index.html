            { title: "昆虫学·蜻蜓的复眼与飞行", content: "蜻蜓拥有世界上结构最复杂的复眼之一，由约28000个小眼组成，可以同时看前、后、上、下，视野接近360度。它的翅膀可以独立转动，能悬停、倒飞、急转弯，是自然界最顶尖的飞行家。蜻蜓幼虫（水虿）生活在水中，捕食蚊虫幼虫，是生态平衡的重要维护者。学习蜻蜓不仅能增加自然知识，还能启发学生对仿生学的兴趣。" },

            { title: "物理·冰的声学特性", content: "《稚子弄冰》中冰块敲击发出“玉磬”声，科学解释：冰的晶体结构在受到冲击时产生振动，不同温度下冰的硬度和密度不同，音调随温度降低而升高。零下15℃时冰的声速可达3200m/s，比0℃时快约10%。古代儿童无意中进行了声学实验，这启示我们：生活中处处有科学，只要留心观察。" },

    // 渲染首页单元卡片
    function renderHome() {
        const grid = document.getElementById('unitGrid');
        grid.innerHTML = '';
        for (const [id, unit] of Object.entries(units)) {
            const card = document.createElement('div');
            card.className = 'card-item';
            card.setAttribute('data-unit', id);
            card.innerHTML = `<div class="card-icon">📚</div><div class="card-label">${unit.name}</div>`;
            card.addEventListener('click', () => {
                currentUnitId = id;
                currentTextbook = units[id].textbooks[0];
                renderUnitView();
                showView('unitView');
            });
            grid.appendChild(card);
        }
    }

    // 渲染单元分类卡片页
    function renderUnitView() {
        const unit = units[currentUnitId];
        document.getElementById('unitName').innerText = unit.name;
        document.getElementById('unitDesc').innerText = unit.desc;

        const tabsDiv = document.getElementById('textbookTabs');
        tabsDiv.innerHTML = '';
        unit.textbooks.forEach(tb => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${tb === currentTextbook ? 'active' : ''}`;
            btn.innerText = tb;
            btn.addEventListener('click', () => {
                currentTextbook = tb;
                renderUnitView();
            });
            tabsDiv.appendChild(btn);
        });

            { id: "课文解析", icon: "🔍", label: "课文解析" },
            { id: "科学拓展", icon: "🔬", label: "科学拓展" },

        }

        document.getElementById('detailTitle').innerText = title;
        document.getElementById('detailContent').innerHTML = contentHtml;
    }

    // 返回逻辑
    document.getElementById('backToHomeFromUnit').addEventListener('click', () => {
        showView('homeView');
    });
    document.getElementById('backToCategory').addEventListener('click', () => {
        if (["international", "national", "shenzhen"].includes(currentCategory)) {
            renderCurrentSubView();
            showView('currentSubView');
        } else {
            renderUnitView();
            showView('unitView');
        }
    });
    document.getElementById('backToCategoryFromSub').addEventListener('click', () => {
        renderUnitView();
        showView('unitView');
    });

    renderHome();
    showView('homeView');
</script>
</body>
</html>

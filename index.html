<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>五年级语文下册 · 跨学科望远镜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef5e8; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 0.8rem; }
        .view { max-width: 1000px; margin: 0 auto; background: white; border-radius: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.08); padding: 1.2rem; transition: 0.2s; }
        .hidden { display: none; }
        .header { text-align: center; margin-bottom: 1rem; }
        .header h1 { font-size: 1.6rem; color: #2d6a4f; }
        .header p { color: #5a7a62; font-size: 0.85rem; }
        .toolbar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.6rem; margin-bottom: 1.2rem; background: #f8fbf5; padding: 0.6rem; border-radius: 2rem; }
        .search-box { flex: 2; min-width: 150px; display: flex; gap: 0.4rem; }
        .search-box input { flex: 1; padding: 0.4rem 0.8rem; border-radius: 2rem; border: 1px solid #cfe3cf; font-size: 0.85rem; }
        .btn { background: #2d6a4f; color: white; border: none; border-radius: 2rem; padding: 0.4rem 0.8rem; font-size: 0.8rem; cursor: pointer; }
        .btn-outline { background: white; color: #2d6a4f; border: 1px solid #2d6a4f; }
        .settings-bar { display: flex; gap: 0.6rem; align-items: center; font-size: 0.75rem; flex-wrap: wrap; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; margin-top: 1rem; }
        .card-item { background: #f9faf5; border-radius: 1.2rem; padding: 0.8rem 0.5rem; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid #e2ecd9; word-break: break-word; }
        .card-item:hover { transform: translateY(-3px); background: #f0f5ea; }
        .card-icon { font-size: 2rem; margin-bottom: 0.3rem; }
        .card-label { font-weight: 600; color: #2d6a4f; font-size: 0.85rem; }
        .textbook-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; border-bottom: 1px solid #e2e8d5; padding-bottom: 0.6rem; }
        .tab-btn { background: #f0f4ea; border: none; border-radius: 2rem; padding: 0.4rem 1rem; font-size: 0.85rem; cursor: pointer; }
        .tab-btn.active { background: #2d6a4f; color: white; }
        .detail-content { line-height: 1.5; color: #2c3e2f; font-size: 0.9rem; word-wrap: break-word; overflow-wrap: break-word; max-width: 100%; }
        .detail-section { margin-bottom: 1rem; word-wrap: break-word; }
        .detail-section h3 { color: #1e3a2f; margin-bottom: 0.4rem; font-size: 1.1rem; border-left: 4px solid #2d6a4f; padding-left: 0.5rem; }
        .back-button { background: #eef2e8; border: none; border-radius: 2rem; padding: 0.3rem 0.8rem; font-size: 0.8rem; cursor: pointer; margin-bottom: 0.8rem; display: inline-flex; align-items: center; gap: 0.2rem; }
        .sub-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.8rem; margin: 0.8rem 0; }
        .essay-full { background: #fff7e8; padding: 0.8rem; border-radius: 1rem; margin-top: 0.5rem; white-space: pre-wrap; font-size: 0.85rem; word-wrap: break-word; overflow-wrap: break-word; }
        .insight-block { background: #f0f7f0; padding: 0.6rem; border-radius: 0.8rem; margin-top: 0.4rem; word-wrap: break-word; }
        .sub-section { margin-bottom: 1rem; border-bottom: 1px solid #e2ecd9; padding-bottom: 0.6rem; word-wrap: break-word; }
        .sub-section-title { font-weight: 700; color: #2d6a4f; margin-bottom: 0.2rem; font-size: 0.9rem; }
        .challenge-box { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 0.6rem; margin-top: 0.8rem; border-radius: 0.8rem; word-wrap: break-word; }
        .challenge-input { width: 100%; padding: 0.4rem; margin-top: 0.4rem; border-radius: 1rem; border: 1px solid #ddd; font-size: 0.85rem; }
        .progress-bar { background: #e2e8d5; border-radius: 1rem; height: 0.4rem; width: 100%; margin-top: 0.2rem; }
        .progress-fill { background: #2d6a4f; border-radius: 1rem; height: 0.4rem; width: 0%; }
        .detail-img { max-width: 100%; height: auto; border-radius: 0.8rem; margin: 0.5rem 0; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; background: #f8fbf5; padding: 0.8rem; border-radius: 0.8rem; margin: 0.5rem 0; }
        footer { text-align: center; margin-top: 1rem; font-size: 0.7rem; color: #7c8f7a; }
        @media (max-width: 640px) { .toolbar { flex-direction: column; align-items: stretch; } .cards-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); } }
    </style>
</head>

    // 作文小锦囊（包含完整范文）
    const writingTips = {
        "祖父的园子": {
            tips: "写作角度：1）模仿萧红用“愿意……就……”句式写一个自由的地方；2）写一位给你温暖的长辈，通过具体事例；3）写你心中的秘密花园，可以结合深圳的欢乐田园或昆虫旅馆。建议运用拟人和细节描写。",
            essay: "## 《我心中的秘密花园》\n\n如果让我建造一座花园，我不会种名贵的牡丹，也不会摆精致的假山。我要在墙角种一架倭瓜，让它的藤蔓自由地爬上篱笆，开出金灿灿的花。倭瓜胖墩墩地躺在地上，像一个个调皮的孩子。我还要在花园中央放一座“昆虫旅馆”——用竹筒、木块和瓦片搭成几层小楼。\n\n春天，蜜蜂嗡嗡地飞来，钻进竹筒里安家。夏天，蜻蜓停在旅馆的阳台上，透明的翅膀在阳光下闪闪发光。我会趴在草地上，看蚂蚁排队搬运食物，看蝴蝶在倭瓜花上跳舞。风一吹，倭瓜叶“哗啦啦”地拍手，好像在欢迎每一位客人。\n\n最妙的是，祖父会搬一把藤椅坐在花园里，戴着老花镜看报纸。累了，他就闭上眼睛，听鸟儿唱歌。我偷偷把一朵倭瓜花插在他的草帽上，他醒来发现，哈哈大笑：“你这个小调皮！”\n\n这就是我心中的秘密花园——它不需要有多大，只要有自由的生命和温暖的爱。"
        },
        "古诗三首": {
            tips: "写作角度：1）选择一首古诗，扩写成一篇现代故事；2）写一个冬天或夏天的童年游戏；3）假如穿越到古诗里，你看到了什么？建议多用感官描写。",
            essay: "## 《穿越到南宋的早晨》\n\n一阵寒风把我吹醒，我发现自己站在一座南宋的村庄里。天刚蒙蒙亮，一个小孩蹲在铜盆前，正小心翼翼地敲下一块圆冰。他用彩丝穿过冰块中间的小洞，提在手里，像提着一面银钲。\n\n“能让我试试吗？”我怯生生地问。小孩咧嘴一笑，把冰锤递给我。我轻轻一敲——“叮！”声音清亮得像玉磬，穿过寂静的竹林。冰块在晨光中泛着淡蓝色的光。我们又敲了几下，突然“哗啦”一声，冰块碎了，洒了一地水晶。小孩没有哭，反而咯咯笑起来，笑声比冰声还好听。\n\n傍晚，我又看见一个牧童横骑牛背，吹着短笛，曲调随意而悠扬。夕阳把池塘染成金色，水牛慢悠悠地走过石桥。牧童朝我挥挥手，消失在炊烟里。\n\n醒来时，我手里还握着那首诗。原来，千年前的快乐和今天一样真实。"
        },
        "月是故乡明": {
            tips: "写作角度：1）写两个不同地方的月亮，对比景象与心情；2）借月亮写一个人或一段回忆；3）采访长辈，写他们的“故乡月亮”。注意引用古诗句。",
            essay: "## 《两地的月亮》\n\n去年中秋，我在深圳湾公园看月亮。月亮又大又圆，倒映在海面上，被海浪揉成碎银。周围人很多，大家举着手机拍照，热闹极了。可我心里总觉得缺了点什么——那是一种说不出的安静。\n\n今年中秋，我回到了山东老家的院子。夜幕降临，月亮从枣树梢悄悄升起来，月光把青瓦照得发亮。院子里只有蟋蟀在墙角唱歌，奶奶端出月饼，切成一牙一牙。咬一口，是五仁的香味，和记忆里一模一样。\n\n“月亮还是那个月亮，可看月亮的地方不一样，心里的温度也不一样。”奶奶说。我抬头望着月亮，忽然想起季羡林爷爷的话：“月是故乡明。”是啊，深圳的月亮也很亮，但老家的月亮更暖——因为那里有童年的枣树，有奶奶的月饼，有蟋蟀的夜曲。\n\n无论走到哪里，月亮永远提醒我：家，就在抬头的地方。"
        }
    };

    // 英文小站
    const englishSection = {
        "祖父的园子": "🔹 garden (园子)  🔹 pumpkin (倭瓜/南瓜)  🔹 dragonfly (蜻蜓)  🔹 freedom (自由)\n📝 例句：In my grandfather's garden, everything grows freely and happily.",
        "古诗三首": "🔹 ice (冰)  🔹 child (儿童)  🔹 flute (笛子)  🔹 ancient poem (古诗)\n📝 例句：Children knocking ice make sounds like ringing jade.",
        "月是故乡明": "🔹 moon (月亮)  🔹 hometown (故乡)  🔹 bright (明亮)  🔹 miss (思念)\n📝 例句：No matter where I go, the moon always reminds me of my hometown."
    };

    // 辅助函数：获取当前课文的数据（支持其他单元简化）
    function getTextbookData(unitId, textbook) {
        if (unitId === "unit1") {
            return {
                fullText: textbookFullText[textbook],
                analysis: textAnalysis[textbook],
                science: scienceExt[textbook],
                history: historyExt[textbook],
                current: currentAffairs[textbook],
                writing: writingTips[textbook],
                english: englishSection[textbook]
            };
        } else {
            // 其他单元演示简化内容
            return {
                fullText: "完整课文原文（示例）。实际使用时可添加对应课文。",
                analysis: { author: "作者介绍", background: "背景", theme: "主题", writing: "特色" },
                science: [{ title: "科学示例", content: "详细说明不少于100字。科学内容涵盖天文地理物理生物。" }],
                history: ["人文历史示例1", "人文历史示例2", "人文历史示例3"],
                current: { international: "国际时事示例", national: "全国时事示例", shenzhen: "深圳时事示例" },
                writing: { tips: "写作指导示例", essay: "范文示例……" },
                english: "英文示例"
            };
        }
    }

    // 状态管理
    let currentUnitId = "unit1";
    let currentTextbook = "祖父的园子";
    let currentCategory = null;      // 当前选中的分类（如 "课文内容", "课文解析" 等）
    let pendingCurrentSub = null;     // 用于时事子卡片选择

    // 视图引用
    const homeView = document.getElementById('homeView');
    const unitView = document.getElementById('unitView');
    const detailView = document.getElementById('detailView');
    const currentSubView = document.getElementById('currentSubView');

    function showView(viewId) {
        homeView.classList.add('hidden');
        unitView.classList.add('hidden');
        detailView.classList.add('hidden');
        currentSubView.classList.add('hidden');
        document.getElementById(viewId).classList.remove('hidden');
    }

    // 渲染首页单元卡片
    function renderHome() {
        const grid = document.getElementById('unitGrid');
        grid.innerHTML = '';
        for (const [id, unit] of Object.entries(units)) {
            const card = document.createElement('div');
            card.className = 'card-item';
            card.setAttribute('data-unit', id);
            card.innerHTML = `<div class="card-icon">📚</div><div class="card-label">${unit.name}</div>`;
            card.addEventListener('click', () => {
                currentUnitId = id;
                currentTextbook = units[id].textbooks[0];
                renderUnitView();
                showView('unitView');
            });
            grid.appendChild(card);
        }
    }

    // 渲染单元分类卡片页
    function renderUnitView() {
        const unit = units[currentUnitId];
        document.getElementById('unitName').innerText = unit.name;
        document.getElementById('unitDesc').innerText = unit.desc;

        // 课文标签
        const tabsDiv = document.getElementById('textbookTabs');
        tabsDiv.innerHTML = '';
        unit.textbooks.forEach(tb => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${tb === currentTextbook ? 'active' : ''}`;
            btn.innerText = tb;
            btn.addEventListener('click', () => {
                currentTextbook = tb;
                renderUnitView();
            });
            tabsDiv.appendChild(btn);
        });

        // 分类卡片
        const categories = [
            { id: "课文内容", icon: "📖", label: "课文内容" },
            { id: "课文解析", icon: "🔍", label: "课文解析" },
            { id: "科学拓展", icon: "🔬", label: "科学拓展" },
            { id: "人文历史", icon: "🏛️", label: "人文历史" },
            { id: "时事观察", icon: "📰", label: "时事观察" },
            { id: "作文小锦囊", icon: "✍️", label: "作文小锦囊" },
            { id: "英文小站", icon: "🇬🇧", label: "英文小站" }
        ];
        const grid = document.getElementById('categoryGrid');
        grid.innerHTML = '';
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'card-item';
            card.setAttribute('data-cat', cat.id);
            card.innerHTML = `<div class="card-icon">${cat.icon}</div><div class="card-label">${cat.label}</div>`;
            card.addEventListener('click', () => {
                if (cat.id === "时事观察") {
                    // 显示时事子卡片选择页
                    pendingCurrentSub = cat.id;
                    renderCurrentSubView();
                    showView('currentSubView');
                } else {
                    currentCategory = cat.id;
                    renderDetailView();
                    showView('detailView');
                }
            });
            grid.appendChild(card);
        });
    }

    // 渲染时事子卡片选择页
    function renderCurrentSubView() {
        const subGrid = document.getElementById('currentSubGrid');
        subGrid.innerHTML = '';
        const subs = [
            { id: "international", label: "🌍 国际时事", icon: "🌍" },
            { id: "national", label: "🇨🇳 全国时事", icon: "🇨🇳" },
            { id: "shenzhen", label: "🏙️ 深圳时事", icon: "🏙️" }
        ];
        subs.forEach(sub => {
            const card = document.createElement('div');
            card.className = 'card-item';
            card.setAttribute('data-sub', sub.id);
            card.innerHTML = `<div class="card-icon">${sub.icon}</div><div class="card-label">${sub.label}</div>`;
            card.addEventListener('click', () => {
                currentCategory = sub.id;
                renderDetailView();
                showView('detailView');
            });
            subGrid.appendChild(card);
        });
    }

    // 渲染详情页
    function renderDetailView() {
        const data = getTextbookData(currentUnitId, currentTextbook);
        let title = "";
        let contentHtml = "";

        if (currentCategory === "课文内容") {
            title = "📖 课文内容";
            contentHtml = `<div class="detail-section">${data.fullText.replace(/\n/g, '<br>')}</div>`;
        } 
        else if (currentCategory === "课文解析") {
            title = "🔍 课文解析";
            contentHtml = `
                <div class="detail-section"><h3>✍️ 作者简介</h3><p>${data.analysis.author}</p></div>
                <div class="detail-section"><h3>📖 创作背景</h3><p>${data.analysis.background}</p></div>
                <div class="detail-section"><h3>🎯 中心思想</h3><p>${data.analysis.theme}</p></div>
                <div class="detail-section"><h3>✒️ 写作特色</h3><p>${data.analysis.writing}</p></div>
            `;
        }
        else if (currentCategory === "科学拓展") {
            title = "🔬 科学拓展";
            contentHtml = data.science.map(s => `<div class="detail-section"><h3>${s.title}</h3><p>${s.content}</p></div>`).join('<hr>');
        }
        else if (currentCategory === "人文历史") {
            title = "🏛️ 人文历史";
            contentHtml = `<div class="detail-section">${data.history.map(h => `<p>• ${h}</p>`).join('')}</div>`;
        }
        else if (currentCategory === "国际" || currentCategory === "national" || currentCategory === "shenzhen" || currentCategory === "international") {
            // 时事子项
            let map = { international: "国际时事", national: "全国时事", shenzhen: "深圳时事" };
            let key = currentCategory;
            title = `📰 ${map[key] || "时事"}`;
            let text = data.current[key];
            contentHtml = `<div class="detail-section"><p>${text}</p></div>`;
        }
        else if (currentCategory === "作文小锦囊") {
            title = "✍️ 作文小锦囊";
            contentHtml = `
                <div class="detail-section"><h3>💡 写作角度与方法</h3><p>${data.writing.tips}</p></div>
                <div class="detail-section"><h3>📄 范文</h3><div class="essay-full">${data.writing.essay.replace(/\n/g, '<br>')}</div></div>
            `;
        }
        else if (currentCategory === "英文小站") {
            title = "🇬🇧 英文小站";
            contentHtml = `<div class="detail-section"><p>${data.english.replace(/\n/g, '<br>')}</p></div>`;
        }
        else {
            title = "内容";
            contentHtml = "<p>待补充</p>";
        }

        document.getElementById('detailTitle').innerText = title;
        document.getElementById('detailContent').innerHTML = contentHtml;
    }

    // 返回逻辑
    document.getElementById('backToHomeFromUnit').addEventListener('click', () => {
        showView('homeView');
    });
    document.getElementById('backToCategory').addEventListener('click', () => {
        if (currentCategory === "international" || currentCategory === "national" || currentCategory === "shenzhen") {
            renderCurrentSubView();
            showView('currentSubView');
        } else {
            renderUnitView();
            showView('unitView');
        }
    });
    document.getElementById('backToCategoryFromSub').addEventListener('click', () => {
        renderUnitView();
        showView('unitView');
    });

    // 启动
    renderHome();
    showView('homeView');
</script>
</body>
</html>

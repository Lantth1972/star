            margin-bottom: 1.8rem;
            border-bottom: 1px solid #e2e8d5;
            padding-bottom: 1rem;

            background: #f0f4ea;
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #2d4a33;

            background: #2d6a4f;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .cat-btn:hover:not(.active) {
            background: #e2e9da;
        }

        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

            background: #fefef7;
            border-radius: 1.2rem;
            border: 1px solid #e6efdf;
            transition: 0.1s;
        }
        .card-header {
            display: flex;

            gap: 0.6rem;
            padding: 0.9rem 1.2rem;
            background: #f8fbf5;
            border-bottom: 1px solid #e2e8d5;
            font-weight: 600;
            font-size: 1rem;

            line-height: 1.5;
            color: #2c3e2f;
            font-size: 0.95rem;

                border-bottom: 1px solid #e2e8d5;

                flex-direction: row;
                flex-wrap: wrap;
            }

</head>

        // 获取当前分类下的卡片数据
        const topicData = knowledgeBase[currentTopicKey];
        const cards = topicData && topicData[currentCategoryKey] ? topicData[currentCategoryKey] : [];
        let cardsHtml = '';
        if (cards.length === 0) {
            cardsHtml = '<div style="padding: 1rem; text-align: center; color: #7c8f7a;">✨ 暂无拓展内容，待补充</div>';
        } else {
            for (let card of cards) {
                const isEssay = (currentCategoryKey === "作文锦囊");
                cardsHtml += `
                    <div class="ext-card ${isEssay ? 'essay-card' : ''}">
                        <div class="card-header">
                            <span class="icon">${categories.find(c => c.key === currentCategoryKey)?.icon || '📌'}</span>
                            <span>${card.title}</span>
                        </div>
                        <div class="card-body">
                            ${card.content.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
            }
        }

        const html = `
            <div class="current-topic-title">📖 ${topicTitleMap[currentTopicKey]}</div>
            <div class="topic-sub">${subtitleMap[currentTopicKey]}</div>
            <div class="category-bar">
                ${buttonsHtml}
            </div>
            <div class="cards-list">
                ${cardsHtml}
            </div>
        `;
        mainDiv.innerHTML = html;

        // 绑定分类按钮点击事件
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const catKey = btn.getAttribute('data-cat');
                if (catKey) {
                    currentCategoryKey = catKey;
                    renderMain();
                }
            });
        });
    }

    // 切换课文
    function setTopic(topicKey) {
        currentTopicKey = topicKey;
        // 重置分类到第一个（深圳时事）
        currentCategoryKey = "深圳时事";
        renderMain();
        // 更新左侧按钮高亮
        document.querySelectorAll('.topic-btn').forEach(btn => {
            if (btn.getAttribute('data-topic') === topicKey) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // 绑定左侧课文按钮
    document.querySelectorAll('.topic-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const topic = btn.getAttribute('data-topic');
            if (topic) setTopic(topic);
        });
    });

    // 初始化
    setTopic("祖父的园子");
</script>
</body>
</html>

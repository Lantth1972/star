<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星星的答案 - 珍藏版</title>
    <style>
        :root {
            --gold: #d4af37;
            --star-white: rgba(255, 255, 255, 0.8);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white; font-family: "PingFang SC", "STHeiti", serif;
            overflow: hidden; touch-action: manipulation;
        }
        #bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #02060c 0%, #050a15 60%, #000 100%);
            transition: background 3s ease-in-out;
            z-index: 1;
        }
        #starCanvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        .container {
            position: relative; z-index: 10;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .divider-fixed {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px;
            display: flex; align-items: center; justify-content: center;
            z-index: 15; opacity: 0.8;
        }
        .divider-line {
            flex-grow: 1; height: 1px;
            background: linear-gradient(to var(--dir, right), transparent, var(--gold));
        }
        .divider-line.right { --dir: left; }
        .star-mini { color: var(--gold); font-size: 14px; margin: 0 10px; }
        .moon-phases { display: flex; align-items: center; gap: 8px; color: var(--gold); font-size: 12px; }
        .page { display: none; opacity: 0; transition: opacity 1.2s ease; width: 90%; text-align: center; }
        .active { display: block; opacity: 1; }
        .content-body { margin-top: -5vh; }
        .text-breathe {
            font-size: 26px; letter-spacing: 6px; opacity: 0;
            text-shadow: 0 0 25px var(--star-white);
            position: absolute; width: 100%; left: 0;
        }
        .anim-breathe { animation: breatheFade 5s ease-in-out forwards; }
        @keyframes breatheFade {
            0% { opacity: 0; transform: scale(0.95); }
            40%, 60% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }
        .num-box {
            width: 55px; height: 75px; background: #fff; border-radius: 8px;
            color: #000; font-size: 35px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid transparent; outline: none; text-align: center;
        }
        .num-box:focus { border-color: var(--gold); }
        .energy-sphere {
            width: 175px; height: 175px; border-radius: 50%; margin: 0 auto;
            animation: pulse 2.5s infinite alternate; cursor: pointer;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
        .ans-cn { font-size: 36px; font-weight: bold; margin-bottom: 25px; }
        .reset-btn {
            background: rgba(212, 175, 55, 0.1); border: 2px solid var(--gold); color: var(--gold);
            padding: 16px 55px; border-radius: 50px; font-size: 20px; cursor: pointer;
        }
        .disclaimer { position: fixed; bottom: 5vh; width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="bg-wrapper"></div>
    <canvas id="starCanvas"></canvas>
    
    <div id="top-divider" class="divider-fixed">
        <div class="divider-line"></div>
        <div class="star-mini">✦</div>
        <div class="moon-phases">☽ ● ☾</div>
        <div class="star-mini">✦</div>
        <div class="divider-line right"></div>
    </div>

    <div class="container">
        <!-- 引导页 -->
        <div id="page1" class="page active">
            <div class="content-body" style="height:100px; position:relative;">
                <div id="line1" class="text-breathe">聆听来自宇宙的声音</div>
                <div id="line2" class="text-breathe">感受今日星辰的指引</div>
            </div>
        </div>

        <!-- 输入页 -->
        <div id="page2" class="page">
            <div class="content-body">
                <div id="q-hint" style="opacity:0.6; margin-bottom:10px;">适合换工作吗？</div>
                <div style="font-size:22px; font-weight:bold; margin-bottom:35px;">默念你想问的问题</div>
                <div style="display:flex; gap:15px; justify-content:center;">
                    <input type="tel" maxlength="1" class="num-box" id="num1" inputmode="numeric">
                    <input type="tel" maxlength="1" class="num-box" id="num2" inputmode="numeric">
                    <input type="tel" maxlength="1" class="num-box" id="num3" inputmode="numeric">
                </div>
                <div id="alert-text" style="color:#ff6b6b; margin-top:15px; opacity:0;">请输入3位数字代码</div>
            </div>
        </div>

        <!-- 能量球页 -->
        <div id="page3" class="page">
            <div class="content-body">
                <div id="display-num" style="margin-bottom:45px; letter-spacing:3px;"></div>
                <div id="sphere" class="energy-sphere" onclick="showAnswer()"></div>
                <div style="margin-top:45px; color:var(--gold); font-size:21px; font-weight:bold;">触碰能量球 · 开启答案</div>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="page4" class="page">
            <div class="ans-cn" id="ans-cn"></div>
            <div class="ans-en" id="ans-en" style="font-style:italic; opacity:0.7;"></div>
            <button class="reset-btn" onclick="location.reload()" style="margin-top:60px;">再次对话星空</button>
        </div>
    </div>

    <div class="disclaimer" id="bottom-disclaimer" style="display:none;">仅供娱乐，不作为判断依据</div>

    <script>
        // 修正后的完整数据
        const cosmicThemes = [
            { sphere: '#4facfe', bg: 'linear-gradient(to bottom, #02060c 0%, #0a192f 60%, #1e3a5f 100%)' },
            { sphere: '#f093fb', bg: 'linear-gradient(to bottom, #1e002a 0%, #3d0e5a 60%, #1a0025 100%)' }
        ];

        const answers = [
            { cn: "顺其自然", en: "Let it flow naturally" },
            { cn: "时机未到", en: "The time is not yet ripe" },
            { cn: "勇敢一试", en: "Take the leap of faith" },
            { cn: "答案已在心中", en: "The answer is already in your heart" },
            { cn: "去做吧", en: "Just do it" },
            { cn: "好运在转角", en: "Luck is around the corner" }
        ];

        // Canvas 逻辑
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: 0.01 + Math.random() * 0.02
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.opacity += s.speed;
                if(s.opacity > 1 || s.opacity < 0) s.speed = -s.speed;
                ctx.fillStyle = `rgba(255,255,255,${Math.abs(s.opacity)})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        // 页面跳转逻辑
        function nextPage(from, to) {
            document.getElementById('page' + from).classList.remove('active');
            setTimeout(() => {
                document.getElementById('page' + from).style.display = 'none';
                const next = document.getElementById('page' + to);
                next.style.display = 'block';
                setTimeout(() => next.classList.add('active'), 50);
                if(to === 2) setupInput();
                if(to === 3) setSphere();
                if(to === 4) document.getElementById('bottom-disclaimer').style.display = 'block';
            }, 800);
        }

        function setupInput() {
            const boxes = [document.getElementById('num1'), document.getElementById('num2'), document.getElementById('num3')];
            boxes.forEach((box, i) => {
                box.oninput = () => {
                    if(box.value && i < 2) boxes[i+1].focus();
                    if(boxes.every(b => b.value !== "")) {
                        document.getElementById('display-num').innerText = "感应代码：" + boxes.map(b => b.value).join('');
                        setTimeout(() => nextPage(2, 3), 500);
                    }
                };
            });
            boxes[0].focus();
        }

        function setSphere() {
            const t = cosmicThemes[Math.floor(Math.random()*cosmicThemes.length)];
            const s = document.getElementById('sphere');
            s.style.background = `radial-gradient(circle at 30% 30%, #fff 0%, ${t.sphere} 100%)`;
            s.style.boxShadow = `0 0 50px ${t.sphere}`;
        }

        function showAnswer() {
            const res = answers[Math.floor(Math.random()*answers.length)];
            document.getElementById('ans-cn').innerText = res.cn;
            document.getElementById('ans-en').innerText = res.en;
            nextPage(3, 4);
        }

        // 初始化
        window.onload = () => {
            initCanvas();
            draw();
            document.getElementById('line1').classList.add('anim-breathe');
            setTimeout(() => document.getElementById('line2').classList.add('anim-breathe'), 3000);
            setTimeout(() => nextPage(1, 2), 7000);
        };
        window.onresize = initCanvas;
    </script>
</body>
</html>

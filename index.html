    "祖父的园子": ["📖 东北黑土地上的园子文化：在东北农村，几乎家家户户房前屋后都有一个菜园，用秫秸或木板围成栅栏。园子里种倭瓜、黄瓜、豆角，养鸡鸭。春天播种，夏天除草捉虫，秋天收获，冬天积肥。园子不仅是食物来源，更是孩子的自然课堂。萧红写的“愿意爬上架就爬上架”，正是这种自由文化的写照。", "🏠 东北民居的“前园后屋”布局：传统东北民居通常是坐北朝南的三间房，房前是园子，房后还有小菜园。园子与住房间有一道矮墙或栅栏，既分隔又连通。这种布局让生活与耕作紧密相连——推开屋门，就是一片生机勃勃的绿色。", "🎮 东北儿童的园子游戏：东北孩子会在园子里捉蜻蜓、逮蚂蚱、挖蚯蚓，用倭瓜花当小喇叭吹。冬天园子虽空，但雪后可以在里面堆雪人、扣麻雀。这些游戏与课文里“我”的活动一模一样，展现了物质不丰富的年代，孩子们如何从自然中获得无穷乐趣。", "🌾 黑土地农耕习俗：东北农村有“开犁”习俗，春天第一次耕地要选吉日，在地头烧纸、放鞭炮，祈求丰收。收获时，第一根黄瓜、第一个倭瓜往往先给长辈品尝，表达感恩。课文里祖父带着“我”在园子里劳作，正是这种传统的日常体现。"],
    "古诗三首": ["🎮 宋代儿童游戏：冰戏与玩具 — 《稚子弄冰》描写了宋代儿童冬天玩冰的场景。古代有“冰猴”（冰陀螺）、“冰床”等玩具。北方民间还有“采冰”习俗，冬天凿冰储藏，夏天用于消暑。这些游戏既锻炼身体，又培养动手能力。", "⛸️ 中国冰戏的历史传承：冰戏在中国有上千年历史。宋代《东京梦华录》记载了皇家冰嬉表演。清代乾隆年间，冰嬉被定为“国俗”，每年冬至前后在太液池举行盛大的冰上表演。如今北方民间依然保留着滑冰车、打冰嘎等传统游戏。", "🐃 江南水乡的牧童文化：《村晚》中的牧童、水牛、短笛，是江南水乡的经典意象。在浙江、安徽、江西等地，水牛曾是主要农耕畜力，牧童大多是家中男孩，他们骑牛、吹笛、戏水，形成独特的“牧童文化”。如今在一些古镇旅游区，还能看到水牛和牧童的雕塑。", "🌾 宋代农具与农耕习俗：《四时田园杂兴》中“也傍桑阴学种瓜”，反映了宋代儿童从小参与农事的习俗。宋代发明了“秧马”、“耘荡”等先进农具，提高了生产效率。江南地区还有“开秧门”习俗，插秧第一天要祭祀土地神，吃“秧酒”，热闹非凡。"],
    "月是故乡明": ["🌕 中国望月文化：中国人自古对月亮有特殊情感。中秋赏月、望月思乡、以月寄情，是传统文化的重要组成部分。古代文人常在中秋夜设宴赏月，写诗作赋。民间则有“拜月”习俗，女性祈求月神保佑家庭团圆。", "🏮 各地中秋习俗集锦：广东潮汕有“拜月娘”，设香案摆上月饼、水果、芋头；江南地区有“走月亮”，妇女结伴在月下散步；北方有“供兔儿爷”，泥塑的兔首人身像；台湾有中秋“烤肉”习俗。", "🏠 传统民居中的“望月”设计：中国传统民居往往设计有赏月的空间：庭院中的石桌石凳、楼阁上的露台、花园中的水榭。苏州园林更有“月到风来亭”，专门用于中秋赏月。", "💌 侨批文化：银信合一的乡愁载体<br><img src='qiaopi.jpeg' alt='侨批' class='detail-img'><br>侨批是近代华侨寄给国内亲人的家书和汇款凭证，一封侨批要走几个月。信中常写“见字如面”“月圆人未圆”。这与季羡林用散文表达乡愁一样，都是中国人“托物寄情”的文化传统。"],

    "景阳冈": ["🏞️ 古代酒馆文化：酒旗、酒坛、下酒菜。武松喝的“筛酒”是米酒，度数不高，所以他喝了十八碗还能打虎。", "🐅 中国虎文化：虎是百兽之王，象征勇猛，但野生虎已濒危。中国有东北虎、华南虎等亚种，现存野生东北虎仅约500只。", "📖 水浒传人物：武松、宋江、鲁智深等108将的故事。武松打虎的故事广为流传，体现了百姓对英雄的崇拜。", "🥢 宋代饮食：武松吃的“熟牛肉”“筛酒”，反映了当时的饮食习惯。宋代还流行“脍”（生鱼片）和“羹”（肉汤）。"],

    "祖父的园子": { outline:"【写作大纲】一、开头点明园子；二、描写植物昆虫（用拟人）；三、写与长辈互动；四、结尾表达情感。", essays:[{ title:"范文一：心灵的花园", content:"每个人心中都有一座秘密花园。我的花园在外婆家的老院子。院子西墙种着一架丝瓜，藤蔓调皮地爬上屋檐...外婆指着天空说：“你看，那三颗最亮的星叫‘扁担星’。”我数着星星，不知不觉睡去。这就是我的心灵花园。" },{ title:"范文二：都市里的秘密基地（时事结合）", content:"去年秋天，学校组织我们去光明欢乐田园研学。我们班分到一块菜地，种黄瓜。两个月后，黄瓜开花了，金灿灿的。我轻轻拧下一根，咬一口，脆生生的，有一股清甜。原来，即使在钢筋水泥的城市里，我们也能拥有一片属于自己的园子。" }] },
    "古诗三首": { outline:"【写作大纲】一、选择一首古诗；二、想象穿越到场景；三、描写画面；四、结尾感悟。", essays:[{ title:"范文一：冰，碎了", content:"冬天，我和表弟在老家院子玩。水缸里的水结了一层厚厚的冰。表弟拿锤子敲下一块...那一刻，我想起了杨万里的《稚子弄冰》：“敲成玉磬穿林响，忽作玻璃碎地声。”原来，一千年前的孩子也和我们一样快乐。" },{ title:"范文二：冰雪奇缘（时事结合）", content:"今年寒假，爸爸妈妈带我去哈尔滨看冰雪大世界。童趣园里复原了《稚子弄冰》的场景...我敲着冰块，心里想：古代孩子玩冰是冬天的日常，今天我们玩冰成了一种文化旅行。快乐从来没有变。" }] },
    "月是故乡明": { outline:"【写作大纲】一、引用诗句；二、写两个不同地方的月亮；三、借月亮写回忆；四、结尾点题。", essays:[{ title:"范文一：两地的月亮", content:"去年中秋，我在深圳湾公园看月亮...今年中秋，我回到了山东老家的院子。奶奶端出月饼，说：“月亮还是那个月亮，可看月亮的地方不一样，心里的温度也不一样。”我忽然想起季羡林的话：“月是故乡明。”" },{ title:"范文二：月亮上的中国红（时事结合）", content:"2024年，嫦娥六号成功从月球背面采样返回。爷爷说：“我们小时候，月亮就是嫦娥玉兔的传说。现在，中国人真的登上了月球背面。”我忽然明白了：月亮不仅是故乡的象征，也是梦想的象征。" }] },
    "草船借箭": { outline:"【写作大纲】一、交代背景；二、描述借箭过程；三、总结智慧；四、联系现实。", essays:[{ title:"范文一：假如我是诸葛亮", content:"如果我是诸葛亮，我也会选择在大雾天用草船借箭。但我还会加一道保险：在船尾绑上一些稻草人，防止箭射空..." },{ title:"范文二：现代版草船借箭（时事结合）", content:"2025年，中国航天团队用“借力”方式成功回收火箭助推器，就像诸葛亮借箭一样聪明。看来，古人的智慧至今还在启发我们。" }] },
    "景阳冈": { outline:"【写作大纲】一、武松喝酒；二、上冈遇虎；三、打虎过程；四、下冈。", essays:[{ title:"范文一：我心中的英雄", content:"武松的勇敢让我佩服。他在景阳冈上遇到老虎，没有逃跑，而是冷静地观察老虎的弱点...这告诉我，面对困难要勇敢，还要有智慧。" },{ title:"范文二：现代打虎英雄（时事结合）", content:"2024年，东北虎豹国家公园的巡护员们用科技手段保护老虎，他们才是真正的“打虎”英雄。他们用红外相机、无人机监测老虎，还给受伤的老虎做手术。这也是英雄，一种更文明的英雄。" }] },
    "汉字真有趣": { outline:"【写作大纲】一、介绍一个有趣的汉字；二、讲它的故事；三、说说感受。", essays:[{ title:"范文一：“家”字的故事", content:"“家”上面是“宀”，下面是“豕”，表示房子里有猪。古人把猪养在屋子里，因为猪是财富的象征。每次看到“家”，我就想起外婆家院子里的猪圈，那是家的味道。" },{ title:"范文二：汉字里的中国智慧（时事结合）", content:"2025年，联合国中文日活动中，外国朋友被“和”字深深打动。“和”左边是“禾”，右边是“口”，表示人人有饭吃，社会就和谐。这个简单的汉字，包含了中国几千年的和平思想。" }] },
    "我爱你，汉字": { outline:"【写作大纲】一、汉字的美；二、我学书法的经历；三、对汉字的热爱。", essays:[{ title:"范文一：我与毛笔的约会", content:"第一次拿起毛笔，我的手在发抖。老师告诉我，要“腕平掌竖”，才能写出好字。我写了一百个“永”字，终于有一个像样了。墨香弥漫在空气中，我的心慢慢静下来。" },{ title:"范文二：汉字走向世界（时事结合）", content:"2026年，全球汉语学习者已超过2亿。汉字从中国走向世界，成为连接不同文化的桥梁。在美国，很多学校开设中文课；在非洲，孔子学院的孩子们用毛笔写“福”字。我爱你，汉字——因为你让我感到自豪。" }] }

// 英文小站
const englishSection = {
    "祖父的园子": { vocab:"garden, pumpkin, dragonfly, freedom", culture:"《秘密花园》——小女孩玛丽在荒废花园中找回快乐。", translation:null },
    "古诗三首": { vocab:"ice, child, buffalo, flute", culture:"《一个孩子的诗园》——英国诗人史蒂文森写童年游戏。", translation:"许渊冲译《稚子弄冰》：A child from gold bowl scoops out ice at break of day..." },
    "月是故乡明": { vocab:"moon, hometown, bright, miss", culture:"彭斯《我的心在高原》——苏格兰诗人思念故乡。", translation:"直译：The moon is brighter in my hometown." },
    "草船借箭": { vocab:"arrow, fog, wisdom", culture:"《三国演义》英译本", translation:null },
    "景阳冈": { vocab:"tiger, brave, wine", culture:"《水浒传》英译本", translation:null },
    "汉字真有趣": { vocab:"Chinese character, oracle bone", culture:"西方人学汉字的故事", translation:null },
    "我爱你，汉字": { vocab:"calligraphy, brush", culture:"大英博物馆汉字展", translation:null }
};

function getTextbookData(unitId, textbook) {
    return {
        fullText: textbookFullText[textbook],
        analysis: textAnalysis[textbook],
        science: scienceExt[textbook] || [],
        history: historyExt[textbook] || [],
        current: currentAffairs[textbook],
        writing: writingTips[textbook],
        english: englishSection[textbook]
    };
}

// ---------- 全局变量与交互逻辑 ----------
let currentUnitId = "unit1", currentTextbook = "祖父的园子", currentCategory = null;
let completedCards = JSON.parse(localStorage.getItem("completedCards") || "{}");
let userChallenges = JSON.parse(localStorage.getItem("userChallenges") || "{}");
let parentMode = localStorage.getItem("parentMode") === "true";
let audioEnabled = localStorage.getItem("audioEnabled") === "true";
document.getElementById("parentModeCheckbox").checked = parentMode;
document.getElementById("audioCheckbox").checked = audioEnabled;
document.getElementById("parentModeCheckbox").addEventListener("change", e => { parentMode = e.target.checked; localStorage.setItem("parentMode", parentMode); if(currentCategory) renderDetailView(); });
document.getElementById("audioCheckbox").addEventListener("change", e => { audioEnabled = e.target.checked; localStorage.setItem("audioEnabled", audioEnabled); });

function markCompleted(category) { let key = `${currentUnitId}_${currentTextbook}_${category}`; if(!completedCards[key]){ completedCards[key]=true; localStorage.setItem("completedCards",JSON.stringify(completedCards)); updateProgress(); } }
function updateProgress() { let allKeys = []; for(let u of Object.keys(units)) for(let t of units[u].textbooks) for(let cat of ["课文内容","课文解析","科学拓展","人文历史","时事观察","作文小锦囊","英文小站"]) allKeys.push(`${u}_${t}_${cat}`); let done = allKeys.filter(k=>completedCards[k]).length; let total = allKeys.length; let percent = Math.round(done/total*100); let progressHtml = `📊 学习进度：已完成 ${done}/${total} 个核心卡片 (${percent}%)`; if(percent===100) progressHtml += " 🎉 恭喜！获得【跨学科小达人】勋章！"; document.getElementById("progressDisplay").innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>${progressHtml}`; }
function saveChallenge() { let note = document.getElementById("challengeNote").value; let key = `${currentUnitId}_${currentTextbook}_${currentCategory}_challenge`; if(note) userChallenges[key]=note; else delete userChallenges[key]; localStorage.setItem("userChallenges",JSON.stringify(userChallenges)); alert("笔记已保存！"); }
function speak(text) { if(audioEnabled && window.speechSynthesis) { window.speechSynthesis.cancel(); let u = new SpeechSynthesisUtterance(text); u.lang="zh-CN"; u.rate=0.9; window.speechSynthesis.speak(u); } }
function getTextForSpeak(content) { let div = document.createElement("div"); div.innerHTML = content; return div.innerText; }

function renderHome() { let search = document.getElementById("searchInput").value.toLowerCase(); let grid = document.getElementById("unitGrid"); grid.innerHTML = ""; for(let [id,u] of Object.entries(units)){ if(search && !u.name.toLowerCase().includes(search) && !u.textbooks.some(t=>t.toLowerCase().includes(search))) continue; let card = document.createElement("div"); card.className="card-item"; card.innerHTML=`<div class="card-icon">📚</div><div class="card-label">${u.name}</div>`; card.onclick=()=>{ currentUnitId=id; currentTextbook=u.textbooks[0]; renderUnitView(); showView("unitView"); }; grid.appendChild(card); } updateProgress(); }
function renderUnitView() { let unit=units[currentUnitId]; document.getElementById("unitName").innerText=unit.name; document.getElementById("unitDesc").innerText=unit.desc; let tabsDiv=document.getElementById("textbookTabs"); tabsDiv.innerHTML=""; unit.textbooks.forEach(tb=>{ let btn=document.createElement("button"); btn.className=`tab-btn ${tb===currentTextbook?"active":""}`; btn.innerText=tb; btn.onclick=()=>{ currentTextbook=tb; renderUnitView(); }; tabsDiv.appendChild(btn); }); let categories=[{id:"课文内容",icon:"📖",label:"课文内容"},{id:"课文解析",icon:"🔍",label:"课文解析"},{id:"科学拓展",icon:"🔬",label:"科学拓展"},{id:"人文历史",icon:"🏛️",label:"人文历史"},{id:"时事观察",icon:"📰",label:"时事观察"},{id:"作文小锦囊",icon:"✍️",label:"作文小锦囊"},{id:"英文小站",icon:"🇬🇧",label:"英文小站"}]; let grid=document.getElementById("categoryGrid"); grid.innerHTML=""; categories.forEach(cat=>{ let card=document.createElement("div"); card.className="card-item"; card.innerHTML=`<div class="card-icon">${cat.icon}</div><div class="card-label">${cat.label}</div>`; card.onclick=()=>{ if(cat.id==="时事观察"){ showView("currentSubView"); renderCurrentSubView(); } else { currentCategory=cat.id; renderDetailView(); showView("detailView"); } }; grid.appendChild(card); }); }
function renderCurrentSubView() { let subs=[{id:"international",label:"🌍 国际",icon:"🌍"},{id:"national",label:"🇨🇳 全国",icon:"🇨🇳"},{id:"shenzhen",label:"🏙️ 深圳",icon:"🏙️"},{id:"media",label:"🎬 影视文学",icon:"🎬"}]; let grid=document.getElementById("currentSubGrid"); grid.innerHTML=""; subs.forEach(sub=>{ let card=document.createElement("div"); card.className="card-item"; card.innerHTML=`<div class="card-icon">${sub.icon}</div><div class="card-label">${sub.label}</div>`; card.onclick=()=>{ currentCategory=sub.id; renderDetailView(); showView("detailView"); }; grid.appendChild(card); }); }
function renderDetailView() { let data=getTextbookData(currentUnitId,currentTextbook); let title="",contentHtml=""; if(currentCategory==="课文内容"){ title="📖 课文内容"; contentHtml=`<div class="detail-section">${data.fullText}</div>`; } else if(currentCategory==="课文解析"){ title="🔍 课文解析"; contentHtml=`<div><strong>✍️ 作者简介</strong><br>${data.analysis.author}</div><div><strong>📖 创作背景</strong><br>${data.analysis.background}</div><div><strong>🎯 中心思想</strong><br>${data.analysis.theme}</div><div><strong>✒️ 写作特色</strong><br>${data.analysis.writing}</div><div class="insight-block"><strong>📌 对今天的启示</strong><br>${data.analysis.today}</div>`; } else if(currentCategory==="科学拓展"){ title="🔬 科学拓展"; contentHtml=data.science.map(s=>`<div class="detail-section"><h3>${s.title}</h3><p>${s.content}</p></div>`).join("<hr>"); } else if(currentCategory==="人文历史"){ title="🏛️ 人文历史"; contentHtml=data.history.map(h=>`<p>${h}</p>`).join(""); } else if(["international","national","shenzhen","media"].includes(currentCategory)){ let map={international:"国际时事",national:"全国时事",shenzhen:"深圳时事",media:"影视文学"}; title=`📰 ${map[currentCategory]}`; let items=data.current[currentCategory]; contentHtml=items.map(item=>`<div class="sub-section"><div class="sub-section-title">${item.title}</div><div>${item.content}</div></div>`).join(""); } else if(currentCategory==="作文小锦囊"){ title="✍️ 作文小锦囊"; let essaysHtml=data.writing.essays.map(e=>`<div><strong>${e.title}</strong><div class="essay-full">${e.content}</div></div>`).join(""); if(parentMode) essaysHtml="<p>家长模式已隐藏范文，关闭后可查看。</p>"; contentHtml=`<div><strong>📝 写作大纲</strong><pre>${data.writing.outline}</pre></div>${essaysHtml}`; } else if(currentCategory==="英文小站"){ title="🇬🇧 英文小站"; contentHtml=`<div><strong>📖 核心词汇</strong><br>${data.english.vocab}</div><div><strong>🌍 文化连接</strong><br>${data.english.culture}</div>`; if(data.english.translation) contentHtml+=`<div><strong>🖋️ 古诗英译</strong><br>${data.english.translation}</div>`; } document.getElementById("detailTitle").innerText=title; document.getElementById("detailContent").innerHTML=contentHtml; markCompleted(currentCategory); let challengeKey=`${currentUnitId}_${currentTextbook}_${currentCategory}_challenge`; let saved=userChallenges[challengeKey]||""; document.getElementById("challengeNote").value=saved; document.getElementById("challengeArea").style.display="block"; document.getElementById("saveChallengeBtn").onclick=saveChallenge; if(audioEnabled){ let textToSpeak=getTextForSpeak(contentHtml); if(textToSpeak.trim()) speak(textToSpeak); } }
function showView(viewId){ document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden")); document.getElementById(viewId).classList.remove("hidden"); }

document.getElementById("backToHomeFromUnit").onclick=()=>{ renderHome(); showView("homeView"); };
document.getElementById("backToCategory").onclick=()=>{ if(["international","national","shenzhen","media"].includes(currentCategory)) showView("currentSubView"); else { renderUnitView(); showView("unitView"); } };
document.getElementById("backToCategoryFromSub").onclick=()=>{ renderUnitView(); showView("unitView"); };
document.getElementById("searchBtn").onclick=()=>{ renderHome(); };
document.getElementById("randomBtn").onclick=()=>{ let allTextbooks=[]; for(let u of Object.values(units)) for(let t of u.textbooks) allTextbooks.push({unitId:Object.keys(units).find(id=>units[id].name===u.name), textbook:t}); let rand=allTextbooks[Math.floor(Math.random()*allTextbooks.length)]; currentUnitId=rand.unitId; currentTextbook=rand.textbook; renderUnitView(); showView("unitView"); };
document.getElementById("printBtn").onclick=()=>{ window.print(); };
renderHome(); showView("homeView");
</script>
</body>
</html>

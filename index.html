        .card-label {
            font-weight: 600;
            color: #2d6a4f;
            font-size: 1rem;
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));

            margin-top: 1rem;

            }
        }
        footer {

            color: #7c8f7a;

</head>

            },
            writing: [
                { title: "《不一样的月亮》写作锦囊", content: "【极简大纲】<br>1. 开头：引用“月是故乡明”或描写你看到的月亮。<br>2. 中间：写两个不同地方的月亮（比如深圳湾和老家院子），对比景象和心情。<br>3. 结尾：点出“月亮相同，思念不同”。<br><br>【范文片段】<br>  去年中秋，我在深圳湾公园看月亮。月亮又大又圆，倒映在海面上，被海浪揉成碎银。周围人很多，大家举着手机拍照，热闹极了。可我心里总觉得缺了点什么。今年我回了老家，晚上搬个小凳坐在院子里。月亮从枣树梢升起来，月光把青瓦照得发亮，蟋蟀在墙角叫。奶奶端出月饼，咬一口，是熟悉的味道。我忽然懂了：月亮是一样的月亮，只是看月亮的地方不同，心里的温度也不一样。" }
            ]
        }
    };

    // 主题卡片定义（新增“课文内容”卡片放在最前面）
    const mainCategories = [
        { id: "textbook", label: "📖 课文内容", icon: "📖" },
        { id: "science", label: "🔬 科学", icon: "🔬" },
        { id: "history", label: "📜 人文历史", icon: "📜" },
        { id: "current_affairs", label: "📰 时事", icon: "📰" },
        { id: "english", label: "🇬🇧 英文", icon: "🇬🇧" },
        { id: "writing", label: "✍️ 作文", icon: "✍️" }
    ];

    // 时事子卡片定义
    const currentSubCategories = [
        { id: "international", label: "🌍 国际时事", icon: "🌍" },
        { id: "national", label: "🇨🇳 全国时事", icon: "🇨🇳" },
        { id: "shenzhen", label: "🏙️ 深圳时事", icon: "🏙️" }
    ];

    let currentTopicKey = "祖父的园子";
    let currentView = "mainCards";   // 'mainCards', 'subCards', 'detail'
    let currentMainCategory = null;   // 当前选中的主分类
    let currentSubCategory = null;     // 当前选中的子分类（时事专用）

    // 获取当前课文的某个分类的数据
    function getCategoryData(mainCat, subCat = null) {
        if (mainCat === "textbook") {
            // 课文内容特殊处理
            return { type: "textbook", text: textbookContent[currentTopicKey] };
        }
        const topicData = knowledgeBase[currentTopicKey];
        if (!topicData) return [];
        if (mainCat === "current_affairs") {
            if (!subCat) return [];
            const affairs = topicData.current_affairs;
            if (!affairs) return [];
            return affairs[subCat] || [];
        } else if (mainCat === "english") {
            // 英文返回特殊对象，以便添加朗读按钮
            return { type: "english", text: topicData.english?.text || "" };
        } else {
            return topicData[mainCat] || [];
        }
    }

    // 朗读函数（使用 Web Speech API）
    function speakText(text) {
        if (!window.speechSynthesis) {
            alert("您的浏览器不支持语音朗读");
            return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "zh-CN"; // 中文
        utterance.rate = 0.9;
        window.speechSynthesis.cancel(); // 避免重叠
        window.speechSynthesis.speak(utterance);
    }

    // 渲染主界面
    function render() {
        const mainDiv = document.getElementById('mainContent');
        const topicTitleMap = {
            "祖父的园子": "祖父的园子",
            "古诗三首": "古诗三首 · 稚子弄冰 / 村晚 / 四时田园杂兴",
            "月是故乡明": "月是故乡明"
        };
        const subtitleMap = {
            "祖父的园子": "萧红 | 怀念童年与自由",
            "古诗三首": "杨万里·雷震·范成大 | 童趣与田园",
            "月是故乡明": "季羡林 | 月是故乡明"
        };

        if (currentView === "mainCards") {
            let cardsHtml = `<div class="current-topic-title">📖 ${topicTitleMap[currentTopicKey]}</div>
                            <div class="topic-sub">${subtitleMap[currentTopicKey]}</div>
                            <div class="cards-grid">`;
            for (let cat of mainCategories) {
                cardsHtml += `
                    <div class="card-item" data-main-cat="${cat.id}">
                        <div class="card-icon">${cat.icon}</div>
                        <div class="card-label">${cat.label}</div>
                    </div>
                `;
            }
            cardsHtml += `</div>`;
            mainDiv.innerHTML = cardsHtml;

            document.querySelectorAll('.card-item').forEach(card => {
                card.addEventListener('click', (e) => {
                    const mainCat = card.getAttribute('data-main-cat');
                    if (mainCat === "current_affairs") {
                        currentView = "subCards";
                        currentMainCategory = "current_affairs";
                        render();
                    } else {
                        currentMainCategory = mainCat;
                        currentView = "detail";
                        currentSubCategory = null;
                        render();
                    }
                });
            });
        } 
        else if (currentView === "subCards") {
            let subHtml = `
                <button class="back-button" id="backToMain">← 返回主题</button>
                <div class="current-topic-title">📰 时事 · 分类</div>
                <div class="topic-sub">${topicTitleMap[currentTopicKey]} · 选择范围</div>
                <div class="sub-cards-grid">
            `;
            for (let sub of currentSubCategories) {
                subHtml += `
                    <div class="card-item" data-sub-cat="${sub.id}">
                        <div class="card-icon">${sub.icon}</div>
                        <div class="card-label">${sub.label}</div>
                    </div>
                `;
            }
            subHtml += `</div>`;
            mainDiv.innerHTML = subHtml;

            document.getElementById('backToMain')?.addEventListener('click', () => {
                currentView = "mainCards";
                render();
            });

            document.querySelectorAll('.card-item').forEach(card => {
                card.addEventListener('click', (e) => {
                    const subCat = card.getAttribute('data-sub-cat');
                    if (subCat) {
                        currentSubCategory = subCat;
                        currentView = "detail";
                        render();
                    }
                });
            });
        }
        else if (currentView === "detail") {
            let categoryLabel = "";
            let categoryIcon = "";
            let items = null;
            let isSpecial = false;

            if (currentMainCategory === "current_affairs" && currentSubCategory) {
                const sub = currentSubCategories.find(s => s.id === currentSubCategory);
                categoryLabel = sub ? sub.label : "时事";
                categoryIcon = sub ? sub.icon : "📰";
                items = getCategoryData("current_affairs", currentSubCategory);
                isSpecial = false;
            } else if (currentMainCategory === "textbook") {
                categoryLabel = "课文内容";
                categoryIcon = "📖";
                const data = getCategoryData("textbook");
                items = [{ title: "原文", content: data.text }];
                isSpecial = true;
            } else if (currentMainCategory === "english") {
                categoryLabel = "英文小站";
                categoryIcon = "🇬🇧";
                const data = getCategoryData("english");
                items = [{ title: "单词与句子", content: data.text }];
                isSpecial = true;
            } else {
                const main = mainCategories.find(m => m.id === currentMainCategory);
                categoryLabel = main ? main.label : "拓展";
                categoryIcon = main ? main.icon : "📌";
                items = getCategoryData(currentMainCategory);
                isSpecial = false;
            }

            let detailHtml = `
                <button class="back-button" id="backToPrev">← 返回</button>
                <div class="current-topic-title">${categoryIcon} ${categoryLabel}</div>
                <div class="topic-sub">${topicTitleMap[currentTopicKey]} · 拓展内容</div>
                <div class="detail-list">
            `;
            if (!items || (Array.isArray(items) && items.length === 0)) {
                detailHtml += `<div style="padding:1rem;text-align:center;">✨ 暂无内容，待补充</div>`;
            } else {
                // 处理课文内容和英文的朗读按钮
                if (currentMainCategory === "textbook") {
                    const textItem = items[0];
                    detailHtml += `
                        <div class="detail-card">
                            <div class="detail-title">
                                ${textItem.title}
                                <button class="speaker-btn" data-readtext="${escapeHtml(textItem.content)}">🔊 朗读课文</button>
                            </div>
                            <div class="detail-content">${escapeHtml(textItem.content).replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                } else if (currentMainCategory === "english") {
                    const engItem = items[0];
                    detailHtml += `
                        <div class="detail-card">
                            <div class="detail-title">
                                ${engItem.title}
                                <button class="speaker-btn" data-readtext="${escapeHtml(engItem.content)}">🔊 朗读英文</button>
                            </div>
                            <div class="detail-content">${escapeHtml(engItem.content).replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                } else {
                    for (let item of items) {
                        const isEssay = (currentMainCategory === "writing");
                        detailHtml += `
                            <div class="detail-card ${isEssay ? 'essay-highlight' : ''}">
                                <div class="detail-title">${escapeHtml(item.title)}</div>
                                <div class="detail-content">${item.content.replace(/\n/g, '<br>')}</div>
                            </div>
                        `;
                    }
                }
            }
            detailHtml += `</div>`;
            mainDiv.innerHTML = detailHtml;

            // 绑定朗读按钮
            document.querySelectorAll('.speaker-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const text = btn.getAttribute('data-readtext');
                    if (text) speakText(text);
                });
            });

            document.getElementById('backToPrev')?.addEventListener('click', () => {
                if (currentMainCategory === "current_affairs" && currentSubCategory) {
                    currentView = "subCards";
                    currentSubCategory = null;
                } else {
                    currentView = "mainCards";
                }
                render();
            });
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 切换课文
    function setTopic(topicKey) {
        currentTopicKey = topicKey;
        currentView = "mainCards";
        currentMainCategory = null;
        currentSubCategory = null;
        render();
        document.querySelectorAll('.topic-btn').forEach(btn => {
            if (btn.getAttribute('data-topic') === topicKey) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    document.querySelectorAll('.topic-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const topic = btn.getAttribute('data-topic');
            if (topic) setTopic(topic);
        });
    });

    setTopic("祖父的园子");
</script>
</body>
</html>

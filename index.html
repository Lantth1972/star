            international: "2025年联合国粮食及农业组织（FAO）倡导“城市农业”，鼓励屋顶种菜、社区农场。荷兰鹿特丹已建成世界首座海上漂浮农场，养牛40头，屋顶收集雨水，底层种植牧草，完美诠释现代版“祖父的园子”。",
            national: "2025年教育部推行“劳动教育清单”，要求小学生每学期参与农业生产劳动。北京史家小学在教学楼顶建“天空农场”，每个班认领菜地，种植黄瓜、西红柿，收获的蔬菜供应食堂，将课文场景变为现实。",
            shenzhen: "深圳光明区“欢乐田园”占地3.8平方公里，2025年春季推出“小农夫体验营”，孩子们可下田插秧、摘黄瓜，体验祖父园子里的自由。南山区大沙河公园建有“昆虫旅馆”，用竹筒、瓦片为蜻蜓、瓢虫安家，成为城市里的生态教育基地。"
        },
        "古诗三首": {
            international: "日本长野县每年冬季举办“冰镜节”，孩子们将水冻成薄冰片，穿绳悬挂当镜子玩，与《稚子弄冰》几乎完全一致，显示东亚文化同源性。",
            national: "2025年哈尔滨冰雪大世界以“古韵冰情”为主题，复原了《稚子弄冰》场景，游客可体验敲冰、冰上滑梯。冰雪经济带动东北文旅复苏。",
            shenzhen: "2025年春节，深圳罗湖儿童公园举办“冰雪奇趣节”，人造冰场让孩子们在南国体验冰戏，吸引数万家庭参与。南山博物馆同步展出“宋代儿童玩具”特展。"
        },
        "月是故乡明": {
            international: "2025年中秋，全球5000万华人共庆佳节。美国旧金山举办“月亮节”，马来西亚槟城“中秋园游会”提灯游行，新加坡滨海湾“月娘节”吸引百万人。",
            national: "2025年，中国探月工程嫦娥七号计划发射，将探测月球南极水冰。多地中小学开展“我与月亮”天文观测活动，呼应课文主题。",
            shenzhen: "2025年中秋，深圳湾公园举办“海上生明月”大型灯光秀，数万人沿海赏月。深圳图书馆推出“月是故乡明”诗文朗诵会，季羡林散文成为热门朗读篇目。"
        }
    };

    // 作文小锦囊
    const writingTips = {
        "祖父的园子": "写作角度：1）模仿萧红用“愿意……就……”句式写一个自由的地方；2）写一位给你温暖的长辈（祖父/祖母/外公/外婆），通过具体事例；3）写你心中的秘密花园，可以结合深圳的欢乐田园或昆虫旅馆。建议运用拟人和细节描写。",
        "古诗三首": "写作角度：1）选择一首古诗，扩写成一篇现代故事，加入想象；2）写一个冬天或夏天的童年游戏，对比古今乐趣；3）假如穿越到古诗里，你看到了什么？怎么写？建议多用感官描写（听觉、视觉）。",
        "月是故乡明": "写作角度：1）写你两个不同地方的月亮（比如深圳和老家），对比景象与心情；2）借月亮写一个人或一段回忆；3）采访长辈，写他们的“故乡月亮”。注意引用古诗句增加文采。"
    };

    // 英文（每个课文提供词汇和例句）
    const englishSection = {
        "祖父的园子": "🔹 garden (园子)  🔹 pumpkin (倭瓜/南瓜)  🔹 dragonfly (蜻蜓)  🔹 freedom (自由)\n📝 例句：In my grandfather's garden, everything grows freely and happily.",
        "古诗三首": "🔹 ice (冰)  🔹 child (儿童)  🔹 flute (笛子)  🔹 ancient poem (古诗)\n📝 例句：Children knocking ice make sounds like ringing jade.",
        "月是故乡明": "🔹 moon (月亮)  🔹 hometown (故乡)  🔹 bright (明亮)  🔹 miss (思念)\n📝 例句：No matter where I go, the moon always reminds me of my hometown."
    };

    // 数据组织
    const unitData = {
        unit1: {
            name: "第一单元 · 童年往事",
            desc: "本单元课文以童年生活为主题，体会作者对童年往事的怀念。",
            textbooks: ["祖父的园子", "古诗三首", "月是故乡明"]
        },
        unit2: {
            name: "第二单元 · 古典名著",
            desc: "四大名著节选（示例数据，暂不展开）",
            textbooks: ["草船借箭", "景阳冈"]
        },
        unit3: {
            name: "第三单元 · 汉字王国",
            desc: "综合性学习：遨游汉字王国",
            textbooks: ["汉字真有趣", "我爱你，汉字"]
        }
    };

    // 对于其他单元，提供简化内容（演示框架）
    function getDummyContent(textbook) {
        return {
            fullText: "此处为完整课文内容（示例）。实际使用时可添加对应课文原文。",
            analysis: "作者背景及解析。",
            science: [{ title: "示例科学", content: "详细说明不少于100字。科学内容涵盖天文地理物理生物。" }],
            history: ["示例人文历史1", "示例人文历史2", "示例人文历史3"],
            current: { international: "国际时事", national: "全国时事", shenzhen: "深圳时事" },
            writing: "作文指导。",
            english: "示例英文。"
        };
    }

    let currentUnit = "unit1";
    let currentTextbook = "祖父的园子";

    function render() {
        const mainDiv = document.getElementById('mainContent');
        const unit = unitData[currentUnit];
        if (!unit) return;

        // 课文列表渲染
        let tabsHtml = `<div class="textbook-tabs">`;
        unit.textbooks.forEach(tb => {
            tabsHtml += `<button class="tab-btn ${tb === currentTextbook ? 'active' : ''}" data-tb="${tb}">${tb}</button>`;
        });
        tabsHtml += `</div>`;

        // 获取当前课文内容（第一单元有完整数据，其他单元用模拟）
        let fullText, analysis, scienceArr, historyArr, currentObj, writing, english;
        if (currentUnit === "unit1") {
            fullText = textbookFullText[currentTextbook];
            analysis = textAnalysis[currentTextbook];
            scienceArr = scienceExt[currentTextbook];
            historyArr = historyExt[currentTextbook];
            currentObj = currentAffairs[currentTextbook];
            writing = writingTips[currentTextbook];
            english = englishSection[currentTextbook];
        } else {
            let dummy = getDummyContent(currentTextbook);
            fullText = dummy.fullText;
            analysis = { author: "作者介绍", background: "背景", theme: "主题", writing: "特色" };
            scienceArr = dummy.science;
            historyArr = dummy.history;
            currentObj = dummy.current;
            writing = dummy.writing;
            english = dummy.english;
        }

        // 构建每个板块的HTML（确保内容>100字）
        const scienceHtml = scienceArr.map(s => `<div class="science-item"><strong>${s.title}</strong><br>${s.content}</div>`).join('<hr>');
        const historyHtml = historyArr.map(h => `<div class="history-item">• ${h}</div>`).join('');
        const currentHtml = `
            <div class="subsection"><strong>🌍 国际时事</strong><br>${currentObj.international}</div>
            <div class="subsection"><strong>🇨🇳 全国时事</strong><br>${currentObj.national}</div>
            <div class="subsection"><strong>🏙️ 深圳时事</strong><br>${currentObj.shenzhen}</div>
        `;

        // 课文解析结构化
        const analysisHtml = `
            <div class="subsection"><strong>✍️ 作者简介</strong><br>${analysis.author}</div>
            <div class="subsection"><strong>📖 创作背景</strong><br>${analysis.background}</div>
            <div class="subsection"><strong>🎯 中心思想</strong><br>${analysis.theme}</div>
            <div class="subsection"><strong>✒️ 写作特色</strong><br>${analysis.writing}</div>
        `;

        const contentHtml = `
            <div class="section-card">
                <div class="section-title">📖 课文内容</div>
                <div class="section-content">${fullText.replace(/\n/g, '<br>')}</div>
            </div>
            <div class="section-card">
                <div class="section-title">🔍 课文解析</div>
                <div class="section-content">${analysisHtml}</div>
            </div>
            <div class="section-card">
                <div class="section-title">🔬 科学拓展（天文·地理·物理·生物）</div>
                <div class="section-content">${scienceHtml}</div>
            </div>
            <div class="section-card">
                <div class="section-title">🏛️ 人文历史</div>
                <div class="section-content">${historyHtml}</div>
            </div>
            <div class="section-card">
                <div class="section-title">📰 时事观察</div>
                <div class="section-content">${currentHtml}</div>
            </div>
            <div class="section-card">
                <div class="section-title">✍️ 作文小锦囊</div>
                <div class="section-content">${writing}</div>
            </div>
            <div class="section-card">
                <div class="section-title">🇬🇧 英文小站</div>
                <div class="section-content">${english.replace(/\n/g, '<br>')}</div>
            </div>
        `;

        const finalHtml = `
            <div class="unit-title">${unit.name}</div>
            <div class="unit-desc">${unit.desc}</div>
            ${tabsHtml}
            ${contentHtml}
        `;
        mainDiv.innerHTML = finalHtml;

        // 绑定课文切换事件
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentTextbook = btn.getAttribute('data-tb');
                render();
            });
        });
    }

    // 单元切换
    function switchUnit(unitId) {
        currentUnit = unitId;
        // 切换单元后默认选中第一个课文
        const firstTextbook = unitData[unitId]?.textbooks[0];
        if (firstTextbook) currentTextbook = firstTextbook;
        render();
        document.querySelectorAll('.unit-btn').forEach(btn => {
            if (btn.getAttribute('data-unit') === unitId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // 绑定单元按钮
    document.querySelectorAll('.unit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const unitId = btn.getAttribute('data-unit');
            switchUnit(unitId);
        });
    });

    // 初始化
    switchUnit("unit1");
</script>
</body>
</html>

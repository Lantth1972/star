<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>喵星的答案 - 珍藏版</title>
    <style>
        :root {
            --gold: #d4af37;
            --star-white: rgba(255, 255, 255, 0.8);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white; font-family: "PingFang SC", "STHeiti", serif;
            overflow: hidden; touch-action: manipulation;
        }
        /* 动态背景层 */
        #bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #02060c 0%, #050a15 60%, #000 100%);
            transition: background 3s ease-in-out;
            z-index: 1;
        }
        #starCanvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        .container {
            position: relative; z-index: 10;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        /* 顶部装饰 */
        .divider-fixed {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px;
            display: flex; align-items: center; justify-content: center;
            z-index: 15; opacity: 0.8;
        }
        .divider-line {
            flex-grow: 1; height: 1px;
            background: linear-gradient(to var(--dir, right), transparent, var(--gold));
        }
        .divider-line.right { --dir: left; }
        .star-mini { color: var(--gold); font-size: 14px; margin: 0 10px; }
        .moon-phases { display: flex; align-items: center; gap: 8px; color: var(--gold); font-size: 12px; }
        
        /* 页面切换 */
        .page { display: none; opacity: 0; transition: opacity 1.2s ease; width: 90%; text-align: center; }
        .active { display: block; opacity: 1; }
        .content-body { margin-top: -5vh; }
        
        /* 呼吸文案动画 */
        .text-breathe {
            font-size: 26px; letter-spacing: 6px; opacity: 0;
            text-shadow: 0 0 25px var(--star-white);
            position: absolute; width: 100%; left: 0;
        }
        .anim-breathe { animation: breatheFade 5s ease-in-out forwards; }
        @keyframes breatheFade {
            0% { opacity: 0; transform: scale(0.95); }
            40%, 60% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }
        
        /* 输入组件 */
        .hint-question { font-size: 17px; color: var(--star-white); margin-bottom: 8px; height: 25px; transition: opacity 0.5s; opacity: 0.6; }
        .guide-main { font-size: 22px; font-weight: bold; margin-bottom: 35px; letter-spacing: 2px; }
        .input-num-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 10px; }
        .num-box {
            width: 55px; height: 75px; background: #fff; border-radius: 8px;
            color: #000; font-size: 35px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid transparent; outline: none; text-align: center;
        }
        .num-box:focus { border-color: var(--gold); }
        #alert-text {
            color: #ff6b6b; font-size: 14px; height: 20px; margin-top: 15px;
            opacity: 0; transition: opacity 0.3s; margin-bottom: 20px;
        }
        
        /* 能量球脉冲 */
        .energy-sphere {
            width: 175px; height: 175px; border-radius: 50%; margin: 0 auto;
            animation: pulse 2.5s infinite alternate; cursor: pointer;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
        
        /* 结果展示 */
        .ans-cn { font-size: 40px; font-weight: bold; margin-bottom: 25px; text-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .ans-en { font-size: 22px; color: rgba(255,255,255,0.7); font-style: italic; letter-spacing: 1px; }
        .reset-btn {
            background: rgba(212, 175, 55, 0.1); border: 2px solid var(--gold); color: var(--gold);
            padding: 16px 55px; border-radius: 50px; font-size: 20px; font-weight: bold;
            cursor: pointer; margin-top: 60px;
        }
        .disclaimer { position: fixed; bottom: 5vh; width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="bg-wrapper"></div>
    <canvas id="starCanvas"></canvas>
    
    <div id="top-divider" class="divider-fixed">
        <div class="divider-line"></div>
        <div class="star-mini"> ✦ </div>
        <div class="moon-phases"> ☽  ●  ☾ </div>
        <div class="star-mini"> ✦ </div>
        <div class="divider-line right"></div>
    </div>

    <div class="container">
        <!-- P1: 序幕 -->
        <div id="page1" class="page active">
            <div class="content-body" style="height:100px; position:relative;">
                <div id="line1" class="text-breathe">聆听来自宇宙的声音</div>
                <div id="line2" class="text-breathe">感受今日星辰的指引</div>
            </div>
        </div>

        <!-- P2: 输入 -->
        <div id="page2" class="page">
            <div class="content-body">
                <div id="q-hint" class="hint-question">适合换工作吗？</div>
                <div class="guide-main">默念你想问的问题</div>
                <div class="input-num-group">
                    <input type="tel" maxlength="1" class="num-box" id="num1" inputmode="numeric">
                    <input type="tel" maxlength="1" class="num-box" id="num2" inputmode="numeric">
                    <input type="tel" maxlength="1" class="num-box" id="num3" inputmode="numeric">
                </div>
                <div id="alert-text">需要输入 3 位数字以建立连接</div>
                <div class="guide-sub" style="font-size: 18px; color: var(--gold);">请输入 3 位数字开启感应</div>
            </div>
        </div>

        <!-- P3: 感应（文案已改） -->
        <div id="page3" class="page">
            <div class="content-body">
                <div style="font-size: 22px; margin-bottom: 45px; color: #fff; letter-spacing: 3px;" id="display-num"></div>
                <div id="sphere" class="energy-sphere" onclick="showAnswer()"></div>
                <div style="margin-top: 45px; color: var(--gold); font-size: 21px; font-weight: bold; letter-spacing: 2px;">触碰能量球 · 开启答案</div>
            </div>
        </div>

        <!-- P4: 答案 -->
        <div id="page4" class="page">
            <div class="ans-cn" id="ans-cn"></div>
            <div class="ans-en" id="ans-en"></div>
            <button class="reset-btn" onclick="location.reload()">再次对话星空</button>
        </div>
    </div>

    <div class="disclaimer" id="bottom-disclaimer" style="display:none;">仅供娱乐，不作为判断依据</div>

    <script>
        const cosmicThemes = [
            { sphere: '#4facfe', bg: 'linear-gradient(to bottom, #02060c 0%, #0a192f 60%, #1e3a5f 100%)' },
            { sphere: '#f093fb', bg: 'linear-gradient(to bottom, #1e002a 0%, #3d0e5a 60%, #1a0025 100%)' },
            { sphere: '#43e97b', bg: 'linear-gradient(to bottom, #001a1a 0%, #004d40 60%, #000 100%)' },
            { sphere: '#fa709a', bg: 'linear-gradient(to bottom, #2a0a0a 0%, #641e1e 60%, #000 100%)' },
            { sphere: '#f6d365', bg: 'linear-gradient(to bottom, #1a1a00 0%, #4d4d00 60%, #000 100%)' }
        ];

        const answers = [
            { cn: "顺其自然", en: "Let it flow naturally" }, { cn: "绝非偶然", en: "It is not by chance" },
            { cn: "答案已在心中", en: "The answer is in your heart" }, { cn: "时机未到", en: "The time is not yet ripe" },
            { cn: "勇敢一试", en: "Take the leap of faith" }, { cn: "另寻他路", en: "Seek another path" },
            { cn: "结局圆满", en: "A happy ending awaits" }, { cn: "保持警惕", en: "Stay vigilant" },
            { cn: "去做吧", en: "Just do it" }, { cn: "再等一等", en: "Wait for a moment" },
            { cn: "还不是时候", en: "Not the right time" }, { cn: "答案是肯定的", en: "The answer is yes" },
            { cn: "不要勉强", en: "Do not force it" }, { cn: "值得等待", en: "Worth waiting for" },
            { cn: "情况会改变", en: "Things will change" }, { cn: "相信直觉", en: "Trust your intuition" },
            { cn: "需要耐心", en: "Be patient" }, { cn: "结局很好", en: "A good ending awaits" },
            { cn: "再试一次", en: "Try again" }, { cn: "不要冲动", en: "Do not rush" },
            { cn: "已经太迟", en: "It is already too late" }, { cn: "放手吧", en: "Let it go" },
            { cn: "大胆一点", en: "Be bold" }, { cn: "时机成熟", en: "The time is right" },
            { cn: "很快就会知道", en: "You will know soon" }, { cn: "会有惊喜", en: "A surprise is coming" },
            { cn: "保持沉默", en: "Stay silent" }, { cn: "答案在路上", en: "The answer is coming" },
            { cn: "不要回头", en: "Do not look back" }, { cn: "现在行动", en: "Act now" },
            { cn: "你会明白", en: "You will understand" }, { cn: "情况复杂", en: "It is complicated" },
            { cn: "接受现实", en: "Accept reality" }, { cn: "好运将至", en: "Luck is near" },
            { cn: "保持清醒", en: "Stay clear-minded" }, { cn: "不要犹豫", en: "Do not hesitate" },
            { cn: "有可能", en: "It is possible" }, { cn: "非常有戏", en: "Very likely" },
            { cn: "不要逃避", en: "Do not avoid it" }, { cn: "会遇见的", en: "You will meet" },
            { cn: "请相信自己", en: "Believe in yourself" }, { cn: "结局未定", en: "The ending is unclear" },
            { cn: "不要执着", en: "Do not cling to it" }, { cn: "继续前进", en: "Keep moving" },
            { cn: "别想太多", en: "Stop overthinking" }, { cn: "有人在帮你", en: "Someone is helping you" },
            { cn: "不会太久", en: "Not for long" }, { cn: "答案很明显", en: "The answer is obvious" },
            { cn: "结果会满意", en: "You will be satisfied" }, { cn: "不要轻信", en: "Do not trust easily" },
            { cn: "是个开始", en: "It is a beginning" }, { cn: "还会重来", en: "It will return" },
            { cn: "无需担心", en: "No need to worry" }, { cn: "坚持下去", en: "Keep going" },
            { cn: "马上开始", en: "Start now" }, { cn: "别太认真", en: "Do not take it too seriously" },
            { cn: "会有答案", en: "There will be an answer" }, { cn: "暂时不会", en: "Not for now" },
            { cn: "可以相信", en: "You can trust it" }, { cn: "别被影响", en: "Do not be affected" },
            { cn: "已经注定", en: "It is destined" }, { cn: "事情未完", en: "It is not over" },
            { cn: "不要等待", en: "Do not wait" }, { cn: "机会来了", en: "Opportunity is here" },
            { cn: "不必追问", en: "No need to ask" }, { cn: "时机已至", en: "The time has come" },
            { cn: "再考虑一下", en: "Consider it again" }, { cn: "非常值得", en: "Very much worth it" },
            { cn: "会有帮助", en: "Help is on the way" }, { cn: "顺应趋势", en: "Follow the trend" },
            { cn: "会有回报", en: "There will be a reward" }, { cn: "放下过去", en: "Let go of the past" },
            { cn: "专注于现在", en: "Focus on the now" }, { cn: "很快就有好消息", en: "Good news soon" },
            { cn: "一切顺利", en: "Everything is going well" }, { cn: "值得一试", en: "Worth a try" },
            { cn: "相信会有转机", en: "Believe in a turn" }, { cn: "继续保持", en: "Keep it up" },
            { cn: "去做你想做的", en: "Do what you want" }, { cn: "直觉是正确的", en: "Intuition is right" }
        ];

        /* 星空引擎 */
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [], meteors = [], allowMeteors = true;

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.opacity = Math.random();
                this.speed = 0.01 + Math.random() * 0.015;
            }
            update() {
                this.opacity += this.speed;
                if (this.opacity > 1 || this.opacity < 0.1) this.speed = -this.speed;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(this.opacity)})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        class Meteor {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width + 100;
                this.y = Math.random() * (canvas.height / 2) - 100;
                this.len = Math.random() * 70 + 40;
                this.speed = Math.random() * 1.5 + 1.2;
                this.opacity = 0.7;
            }
            update() {
                this.x -= this.speed * 1.8;
                this.y += this.speed;
                this.opacity -= 0.004;
                if (this.opacity <= 0 || this.x < -100) this.init();
            }
            draw() {
                ctx.save();
                const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.len, this.y - this.len);
                grad.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                grad.addColorStop(1, "rgba(255, 255, 255, 0)");
                ctx.strokeStyle = grad; ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.len, this.y - this.len); ctx.stroke();
                ctx.restore();
            }
        }

        function initEngine() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array.from({length: 120}, () => new Star());
            meteors = Array.from({length: 2}, () => new Meteor());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { s.update(); s.draw(); });
            if (allowMeteors) meteors.forEach(m => { m.update(); m.draw(); });
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            initEngine(); animate();
            document.getElementById('line1').classList.add('anim-breathe');
            setTimeout(() => {
                const l2 = document.getElementById('line2');
                if(l2) l2.classList.add('anim-breathe');
            }, 4000);
            setTimeout(() => nextPage(1, 2), 9000);
        };

        function nextPage(from, to) {
            const f = document.getElementById('page' + from);
            const t = document.getElementById('page' + to);
            if(f) f.classList.remove('active');
            setTimeout(() => {
                if(f) f.style.display = 'none';
                if(t) {
                    t.style.display = 'block';
                    setTimeout(() => t.classList.add('active'), 50);
                }
                if(to === 2) setupInputLogic();
                if(to === 3) setSphereStyle();
                if(to === 4) {
                    allowMeteors = false;
                    document.getElementById('top-divider').style.display = 'none';
                    document.getElementById('bottom-disclaimer').style.display = 'block';
                }
            }, 800);
        }

        function setupInputLogic() {
            const boxes = [document.getElementById('num1'), document.getElementById('num2'), document.getElementById('num3')];
            const alertText = document.getElementById('alert-text');
            boxes.forEach((box, i) => {
                box.addEventListener('input', () => {
                    box.value = box.value.replace(/[^\d]/g, '');
                    if (box.value) {
                        alertText.style.opacity = 0;
                        if (i < 2) boxes[i+1].focus();
                        else {
                            const code = boxes.map(b => b.value).join('');
                            if(code.length === 3) {
                                setTimeout(() => {
                                    // 修正文案为：你的感应数字
                                    document.getElementById('display-num').innerText = `你的感应数字：${code}`;
                                    nextPage(2, 3);
                                }, 300);
                            }
                        }
                    }
                });
                box.addEventListener('keydown', (e) => {
                    if (e.key === "Backspace" && !box.value && i > 0) boxes[i-1].focus();
                    if (e.key === "Enter") {
                        if(boxes.map(b => b.value).join('').length < 3) alertText.style.opacity = 1;
                    }
                });
            });
            boxes[0].focus();
        }

        function setSphereStyle() {
            const t = cosmicThemes[Math.floor(Math.random() * cosmicThemes.length)];
            const s = document.getElementById('sphere');
            if(s) {
                s.style.background = `radial-gradient(circle at 30% 30%, #fff 0%, ${t.sphere} 100%)`;
                s.style.boxShadow = `0 0 50px ${t.sphere}`;
            }
        }

        function showAnswer() {
            const t = cosmicThemes[Math.floor(Math.random() * cosmicThemes.length)];
            document.getElementById('bg-wrapper').style.background = t.bg;
            const res = answers[Math.floor(Math.random() * answers.length)];
            document.getElementById('ans-cn').innerText = res.cn;
            document.getElementById('ans-en').innerText = res.en;
            nextPage(3, 4);
        }

        window.onresize = initEngine;
    </script>
</body>
</html>

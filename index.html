<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星星的答案</title>
    <style>
        :root { --gold: #d4af37; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: serif; overflow: hidden; }
        #bg-wrapper { position: fixed; width: 100%; height: 100%; background: linear-gradient(to bottom, #02060c, #000); z-index: 1; }
        #starCanvas { position: absolute; z-index: 2; pointer-events: none; }
        .container { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 统一缩小后的输入框 */
        .num-box { 
            width: 35px; height: 45px; background: rgba(255,255,255,0.1); 
            border: 1px solid var(--gold); border-radius: 4px; color: var(--gold);
            font-size: 22px; text-align: center; outline: none; margin: 0 5px;
        }

        .page { display: none; opacity: 0; transition: opacity 1.5s; text-align: center; width: 90%; }
        .active { display: block; opacity: 1; }

        .ans-cn { font-size: 26px; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; }
        .ans-en { font-size: 14px; color: rgba(255,255,255,0.4); font-style: italic; }

        .energy-sphere { width: 140px; height: 140px; border-radius: 50%; margin: 20px auto; cursor: pointer; animation: pulse 3s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.7; } to { transform: scale(1.05); opacity: 1; } }
    </style>
</head>
<body>
    <div id="bg-wrapper"></div>
    <canvas id="starCanvas"></canvas>

    <div class="container">
        <!-- 引导页 -->
        <div id="page1" class="page active">聆听星辰的指引...</div>

        <!-- 输入页 -->
        <div id="page2" class="page">
            <p style="margin-bottom:30px; opacity:0.8;">输入 3 位感应数字</p>
            <div style="display:flex; justify-content:center;">
                <input type="tel" maxlength="1" class="num-box" id="n1">
                <input type="tel" maxlength="1" class="num-box" id="n2">
                <input type="tel" maxlength="1" class="num-box" id="n3">
            </div>
        </div>

        <!-- 能量页 -->
        <div id="page3" class="page">
            <div id="sphere" class="energy-sphere"></div>
            <p>触碰星核</p>
        </div>

        <!-- 结果页 -->
        <div id="page4" class="page">
            <div class="ans-cn" id="ans-cn"></div>
            <div class="ans-en" id="ans-en"></div>
            <button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:8px 30px; margin-top:50px; border-radius:20px;">再寻归处</button>
        </div>
    </div>

<script>
    // 这里是 300 条独立文案的仓库（已为你填入示范，可继续手动增加）
    const answersBook = [
        {cn: "不必追问", en: "No need to ask"},
        {cn: "时机已至", en: "The time has come"},
        {cn: "另寻他路", en: "Seek another path"},
        {cn: "结局圆满", en: "Happy ending"},
        {cn: "保持耐心", en: "Stay patient"},
        {cn: "勇敢去试", en: "Take the risk"},
        {cn: "答案就在心中", en: "Answer is in your heart"},
        {cn: "顺其自然", en: "Let it be"},
        {cn: "去看大海", en: "Go see the sea"},
        {cn: "别在深夜做决定", en: "Don't decide at night"},
        {cn: "去买束花吧", en: "Go buy some flowers"},
        {cn: "这是最好的安排", en: "The best arrangement"},
        {cn: "换个角度看世界", en: "Change your perspective"},
        {cn: "你会收获惊喜", en: "Expect a surprise"},
        {cn: "放下执念", en: "Let it go"},
        {cn: "你需要更多睡眠", en: "Need more sleep"},
        {cn: "去见想见的人", en: "Go see them"},
        {cn: "别回头，往前走", en: "Don't look back"},
        {cn: "直觉是正确的", en: "Trust your intuition"},
        {cn: "这是一个考验", en: "This is a test"},
        // ... 你可以继续在这里增加到 300 条，每条都是独立的
    ];

    // --- 核心逻辑（保持简洁不乱改） ---
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    }
    // 简单的星星效果
    function drawStars() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        for(let i=0; i<100; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*1.5, 0, Math.PI*2);
            ctx.fill();
        }
    }

    window.onload = () => {
        init(); drawStars();
        setTimeout(() => switchPage(1, 2), 3000);
    };

    function switchPage(f, t) {
        document.getElementById('page'+f).classList.remove('active');
        setTimeout(() => {
            document.getElementById('page'+t).classList.add('active');
            if(t===2) setupInputs();
            if(t===3) {
                document.getElementById('sphere').style.background = "radial-gradient(circle, #fff, #d4af37)";
                document.getElementById('sphere').onclick = () => {
                    const res = answersBook[Math.floor(Math.random()*answersBook.length)];
                    document.getElementById('ans-cn').innerText = res.cn;
                    document.getElementById('ans-en').innerText = res.en;
                    switchPage(3, 4);
                }
            }
        }, 500);
    }

    function setupInputs() {
        const ins = [document.getElementById('n1'), document.getElementById('n2'), document.getElementById('n3')];
        ins.forEach((el, i) => {
            el.addEventListener('input', () => {
                if(el.value && i<2) ins[i+1].focus();
                if(ins.every(v => v.value.length === 1)) setTimeout(() => switchPage(2, 3), 500);
            });
        });
        ins[0].focus();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>来自宇宙的声音 - 答案之书版</title>
    <style>
        :root {
            --gold: #d4af37;
            --star-white: rgba(255, 255, 255, 0.8);
            --bg-color: linear-gradient(to bottom, #02060c 0%, #0a192f 60%, #000 100%);
            --sphere-color: #4facfe; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: white; font-family: "PingFang SC", "STHeiti", serif;
            overflow: hidden;
        }

        #bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            transition: background 2.5s ease-in-out;
            z-index: 1;
        }

        #star-canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        .container { 
            position: relative; z-index: 10; 
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- 1. 顶部固定装饰线条 (高度设为 5%) --- */
        .divider-fixed {
            position: fixed;
            top: 5%; /* 屏幕最上方 */
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 400px;
            display: flex; align-items: center; justify-content: center;
            z-index: 15;
            opacity: 0.8;
            pointer-events: none;
        }
        .divider-line {
            flex-grow: 1; height: 1px;
            background: linear-gradient(to var(--dir, right), transparent, var(--gold));
        }
        .divider-line.right { --dir: left; }
        .star-mini { color: var(--gold); font-size: 14px; margin: 0 10px; }
        .moon-phases { display: flex; align-items: center; gap: 8px; color: var(--gold); font-size: 12px; }

        .page { display: none; opacity: 0; transition: opacity 1.5s ease; width: 90%; text-align: center; }
        .active { display: block; opacity: 1; }

        /* 主体内容上边距，防止与顶部线条重叠 */
        .content-body { margin-top: 15vh; }

        /* 呼吸文字 */
        .text-breathe { 
            font-size: 24px; letter-spacing: 5px; opacity: 0; 
            text-shadow: 0 0 20px var(--star-white);
            position: absolute; width: 100%; left: 0;
        }
        .anim-breathe { animation: breatheFade 5s ease-in-out forwards; }
        @keyframes breatheFade {
            0% { opacity: 0; transform: scale(0.9); }
            40%, 60% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        /* --- 2. 仪式感数字提问页布局 --- */
        /* 问题提示轮播 */
        .question-rotator { 
            font-size: 22px; color: #fff; margin-bottom: 5vh; 
            font-weight: 300; letter-spacing: 1px; 
            transition: opacity 0.5s ease;
        }

        /* 参考图片布局：三个独立的白色方形输入框 */
        .input-num-group {
            display: flex; gap: 20px; justify-content: center; margin-bottom: 5vh;
        }
        .num-box {
            width: 80px; height: 100px; /* 方形比例 */
            background: #fff; /* 白色背景 */
            border-radius: 8px; /* 轻微圆角 */
            color: #000; font-size: 40px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: none; outline: none;
            text-align: center;
        }

        /* 操作指引（仪式感文字） */
        .guide-text {
            color: rgba(255, 255, 255, 0.4); font-size: 14px; 
            line-height: 1.8; letter-spacing: 1.5px;
        }

        /* 错误抖动 */
        .shake { animation: shakeAnim 0.4s ease-in-out; border-color: #ff4d4d !important; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* 能量球 */
        .energy-sphere { 
            width: 160px; height: 160px; 
            background: radial-gradient(circle at 30% 30%, #fff 0%, var(--sphere-color) 100%);
            border-radius: 50%; margin: 0 auto; 
            box-shadow: 0 0 60px var(--sphere-color);
            animation: pulse 2.5s infinite alternate; cursor: pointer; 
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* 结果页 */
        .ans-cn { font-size: 38px; font-weight: bold; margin-bottom: 25px; letter-spacing: 4px; color: #fff; }
        .ans-en { font-size: 22px; color: rgba(255,255,255,0.75); font-style: italic; line-height: 1.5; padding: 0 20px; }
        
        .reset-btn { 
            background: rgba(212, 175, 55, 0.1); border: 2px solid var(--gold); color: var(--gold); 
            padding: 15px 50px; border-radius: 50px; font-size: 20px; font-weight: bold;
            cursor: pointer; transition: 0.4s; margin-top: 50px;
        }

        /* 底部固定声明 */
        .disclaimer-fixed { 
            position: fixed; bottom: 5vh; left: 0; width: 100%; text-align: center;
            font-size: 12px; color: rgba(255, 255, 255, 0.25); z-index: 15; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="bg-wrapper"></div>
    <canvas id="star-canvas"></canvas>

    <div id="top-divider" class="divider-fixed">
        <div class="divider-line"></div>
        <div class="star-mini">✦</div>
        <div class="moon-phases">☽ ● ☾</div>
        <div class="star-mini">✦</div>
        <div class="divider-line right"></div>
    </div>

    <div class="container">
        <!-- 第1页 -->
        <div id="page1" class="page active">
            <div class="content-body" style="height:80px; position:relative;">
                <div id="line1" class="text-breathe">聆听来自宇宙的声音</div>
                <div id="line2" class="text-breathe">感受宇宙能量的奥妙</div>
            </div>
        </div>

        <!-- 第2页：灵感数字输入页 -->
        <div id="page2" class="page">
            <div class="content-body">
                <!-- 轮播提示问题 -->
                <div id="question-text" class="question-rotator">我该换工作吗？</div>
                
                <!-- 还原图片：三个独立的白色方形输入框 -->
                <div class="input-num-group">
                    <input type="tel" maxlength="1" class="num-box" id="num1" autocomplete="off">
                    <input type="tel" maxlength="1" class="num-box" id="num2" autocomplete="off">
                    <input type="tel" maxlength="1" class="num-box" id="num3" autocomplete="off">
                </div>

                <!-- 仪式感操作指引文字 -->
                <div class="guide-text">
                    1、默念你最想问的问题；<br>
                    2、输入心中的3个数字
                </div>
            </div>
        </div>

        <!-- 第3页 -->
        <div id="page3" class="page">
            <div class="content-body">
                <div style="font-size: 24px; margin-bottom: 50px; color: var(--star-white); min-height: 30px; letter-spacing: 2px;" id="display-num"></div>
                <div class="energy-sphere" onclick="showAnswer()"></div>
                <div style="margin-top: 40px; color: var(--gold); font-size: 18px;">触碰能量球 · 接收感应</div>
            </div>
        </div>

        <!-- 第4页 -->
        <div id="page4" class="page">
            <div class="ans-cn" id="ans-cn"></div>
            <div class="ans-en" id="ans-en"></div>
            <button class="reset-btn" onclick="location.reload()">再次聆听</button>
        </div>
    </div>

    <div id="bottom-disclaimer" class="disclaimer-fixed" style="display:none;">
        仅供娱乐，不作为任何完全判断依据
    </div>

<script>
    const baseAnswers = [
        { cn: "顺其自然", en: "Let it be" }, { cn: "绝对不要", en: "Absolutely not" },
        { cn: "答案就在你心中", en: "The answer is within you" }, { cn: "时机尚未成熟", en: "The time is not yet ripe" },
        { cn: "勇敢地去尝试", en: "Go for it bravely" }, { cn: "会有意外收获", en: "Unexpected gains" },
        { cn: "不要犹豫", en: "Do not hesitate" }, { cn: "重新审视初衷", en: "Re-examine your intention" },
        { cn: "结果令人满意", en: "Satisfying results" }, { cn: "现在正是时候", en: "Now is the time" }
    ];
    let answers = [...baseAnswers];
    const extraCns = ["是的","不","很有可能","很难说","暂时别想","全力以赴","换个角度","你会后悔的","别回头","这是好主意"];
    const extraEns = ["Yes","No","Highly likely","Hard to say","Forget it","Go all out","Another perspective","You'll regret it","Don't look back","Good idea"];
    while(answers.length < 200) {
        let idx = Math.floor(Math.random() * extraCns.length);
        answers.push({ cn: extraCns[idx], en: extraEns[idx] });
    }

    // 仪式感轮播问题
    const hints = ["我该换工作吗？", "他爱我吗？", "考试会顺利吗？", "未来会变好吗？", "坚持还是放弃？"];

    window.onload = function() {
        initStarEngine();
        const l1 = document.getElementById('line1');
        const l2 = document.getElementById('line2');
        l1.classList.add('anim-breathe');
        setTimeout(() => l2.classList.add('anim-breathe'), 4500);
        setTimeout(() => nextPage(1, 2), 9500);
    };

    function nextPage(from, to) {
        document.getElementById('page' + from).classList.remove('active');
        setTimeout(() => {
            document.getElementById('page' + to).classList.add('active');
            if(to === 2) {
                startInputSetup(); // 设置独立数字输入框逻辑
                startHintRotation();
            }
            if(to === 3) randomizeSphere();
            if(to === 4) {
                document.getElementById('top-divider').style.display = 'none';
                document.getElementById('bottom-disclaimer').style.display = 'block';
            }
        }, 1000);
    }

    // --- 3. 独立数字输入逻辑 (自动跳转) ---
    function startInputSetup() {
        const num1 = document.getElementById('num1');
        const num2 = document.getElementById('num2');
        const num3 = document.getElementById('num3');

        function setupInput(currentInput, nextInput) {
            currentInput.addEventListener('input', () => {
                if (currentInput.value.length === 1 && nextInput) {
                    nextInput.focus();
                } else if (currentInput.value.length === 1 && !nextInput) {
                    // 输满3个数字，执行跳转感应
                    setTimeout(() => goToEnergy(), 200);
                }
            });
        }
        setupInput(num1, num2);
        setupInput(num2, num3);
        setupInput(num3, null); // 最后一个输入框
        num1.focus(); // 自动聚焦第一个
    }

    // 校验与跳转
    function goToEnergy() {
        const n1 = document.getElementById('num1').value;
        const n2 = document.getElementById('num2').value;
        const n3 = document.getElementById('num3').value;
        const val = n1 + n2 + n3;
        
        if (val.length < 3) {
            // 校验失败逻辑（正常通过自动跳转拦截）
            return;
        }
        document.getElementById('display-num').innerText = `数字感应：${val}`;
        nextPage(2, 3);
    }

    // 问题提示轮播
    function startHintRotation() {
        const qEl = document.getElementById('question-text');
        let i = 0;
        setInterval(() => {
            qEl.style.opacity = 0; // 淡出
            setTimeout(() => {
                i = (i + 1) % hints.length;
                qEl.innerText = hints[i];
                qEl.style.opacity = 1; // 淡入
            }, 500);
        }, 3500);
    }

    function randomizeSphere() {
        const randomHue = Math.floor(Math.random() * 360);
        document.documentElement.style.setProperty('--sphere-color', `hsl(${randomHue}, 80%, 60%)`);
    }

    function showAnswer() {
        const res = answers[Math.floor(Math.random() * answers.length)];
        document.getElementById('ans-cn').innerText = res.cn;
        document.getElementById('ans-en').innerText = res.en;
        const randomHue = Math.floor(Math.random() * 360);
        document.documentElement.style.setProperty('--bg-color', `linear-gradient(to bottom, #02060c 0%, hsl(${randomHue}, 40%, 10%) 60%, hsl(${randomHue}, 60%, 25%) 100%)`);
        nextPage(3, 4);
    }

    function initStarEngine() {
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        const stars = Array.from({length: 180}, () => ({
            x: Math.random() * w, y: Math.random() * h,
            size: Math.random() * 1.5, opacity: Math.random(),
            speed: 0.01 + Math.random() * 0.02
        }));
        function draw() {
            ctx.clearRect(0, 0, w, h);
            stars.forEach(s => {
                s.opacity += s.speed;
                if (s.opacity > 1 || s.opacity < 0.1) s.speed = -s.speed;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>

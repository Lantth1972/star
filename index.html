<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>五年级语文下册 · 跨学科望远镜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef5e8; font-family: system-ui, 'Segoe UI', 'Noto Sans', sans-serif; padding: 1rem; }
        .view { max-width: 1200px; margin: 0 auto; background: white; border-radius: 2rem; box-shadow: 0 12px 30px rgba(0,0,0,0.08); padding: 1.5rem; transition: 0.2s; }
        .hidden { display: none; }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 2rem; color: #2d6a4f; }
        .header p { color: #5a7a62; margin-top: 0.3rem; }
        .toolbar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.8rem; margin-bottom: 1.5rem; background: #f8fbf5; padding: 0.8rem; border-radius: 2rem; }
        .search-box { flex: 2; min-width: 180px; display: flex; gap: 0.5rem; }
        .search-box input { flex: 1; padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid #cfe3cf; font-size: 0.9rem; }
        .btn { background: #2d6a4f; color: white; border: none; border-radius: 2rem; padding: 0.5rem 1rem; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .btn-outline { background: white; color: #2d6a4f; border: 1px solid #2d6a4f; }
        .btn-outline:hover { background: #eef2e8; }
        .settings-bar { display: flex; gap: 0.8rem; align-items: center; font-size: 0.8rem; flex-wrap: wrap; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.2rem; margin-top: 1rem; }
        .card-item { background: #f9faf5; border-radius: 1.2rem; padding: 1rem 0.8rem; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid #e2ecd9; }
        .card-item:hover { transform: translateY(-4px); background: #f0f5ea; border-color: #bdd8ae; }
        .card-icon { font-size: 2.4rem; margin-bottom: 0.5rem; }
        .card-label { font-weight: 600; color: #2d6a4f; font-size: 1rem; }
        .textbook-tabs { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1.5rem; border-bottom: 1px solid #e2e8d5; padding-bottom: 0.8rem; }
        .tab-btn { background: #f0f4ea; border: none; border-radius: 2rem; padding: 0.5rem 1.2rem; font-size: 0.9rem; cursor: pointer; }
        .tab-btn.active { background: #2d6a4f; color: white; }
        .detail-content { line-height: 1.6; color: #2c3e2f; font-size: 1rem; }
        .detail-section { margin-bottom: 1.2rem; }
        .detail-section h3 { color: #1e3a2f; margin-bottom: 0.5rem; font-size: 1.2rem; border-left: 4px solid #2d6a4f; padding-left: 0.6rem; }
        .back-button { background: #eef2e8; border: none; border-radius: 2rem; padding: 0.4rem 1rem; font-size: 0.9rem; cursor: pointer; margin-bottom: 1rem; display: inline-flex; align-items: center; gap: 0.3rem; }
        .sub-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .essay-full { background: #fff7e8; padding: 1rem; border-radius: 1rem; margin-top: 0.8rem; }
        .insight-block { background: #f0f7f0; padding: 0.8rem; border-radius: 0.8rem; margin-top: 0.5rem; }
        .sub-section { margin-bottom: 1.2rem; border-bottom: 1px solid #e2ecd9; padding-bottom: 0.8rem; }
        .sub-section-title { font-weight: 700; color: #2d6a4f; margin-bottom: 0.3rem; }
        .challenge-box { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 0.8rem; margin-top: 1rem; border-radius: 0.8rem; }
        .challenge-input { width: 100%; padding: 0.5rem; margin-top: 0.5rem; border-radius: 1rem; border: 1px solid #ddd; }
        .badge { background: #fbbf24; color: #78350f; border-radius: 2rem; padding: 0.2rem 0.6rem; font-size: 0.7rem; margin-left: 0.5rem; }
        .progress-bar { background: #e2e8d5; border-radius: 1rem; height: 0.5rem; width: 100%; margin-top: 0.3rem; }
        .progress-fill { background: #2d6a4f; border-radius: 1rem; height: 0.5rem; width: 0%; }
        .detail-img { max-width: 100%; border-radius: 1rem; margin: 0.5rem 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        footer { text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #7c8f7a; }
        @media (max-width: 640px) { .toolbar { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
<div id="app">
    <!-- 首页 -->
    <div id="homeView" class="view">
        <div class="header"><h1>📚 五年级语文下册</h1><p>统编版 · 跨学科望远镜</p></div>
        <div class="toolbar">
            <div class="search-box"><input type="text" id="searchInput" placeholder="搜索课文名或关键词"><button id="searchBtn" class="btn">🔍 搜索</button></div>
            <div><button id="randomBtn" class="btn">🎲 随机一篇</button><button id="printBtn" class="btn btn-outline">🖨️ 打印/分享</button></div>
            <div class="settings-bar"><label><input type="checkbox" id="parentModeCheckbox"> 👪 家长模式（隐藏范文）</label><label><input type="checkbox" id="audioCheckbox"> 🔊 朗读（实验）</label></div>
        </div>
        <div id="progressDisplay" style="margin-bottom:1rem; font-size:0.8rem;"></div>
        <div class="cards-grid" id="unitGrid"></div>
        <footer>选择单元 → 课文 → 分类卡片 | 完成所有卡片可获勋章</footer>
    </div>

    <!-- 单元视图 -->
    <div id="unitView" class="view hidden">
        <div class="header"><h1 id="unitName"></h1><p id="unitDesc"></p></div>
        <div id="textbookTabs" class="textbook-tabs"></div>
        <div class="cards-grid" id="categoryGrid"></div>
        <button class="back-button" id="backToHomeFromUnit">← 返回首页</button>
    </div>

    <!-- 详情视图 -->
    <div id="detailView" class="view hidden">
        <button class="back-button" id="backToCategory">← 返回分类</button>
        <div id="detailTitle" style="font-size:1.6rem; font-weight:700; margin-bottom:0.5rem;"></div>
        <div id="detailContent" class="detail-content"></div>
        <div id="challengeArea" class="challenge-box" style="display:none;"><strong>✍️ 小挑战</strong><br>写下你的想法或回答：<textarea id="challengeNote" rows="2" class="challenge-input" placeholder="例如：画一画你心中的园子，或者用今天学的英文单词造句..."></textarea><button id="saveChallengeBtn" class="btn" style="margin-top:0.5rem;">💾 保存我的笔记</button></div>
    </div>

    <!-- 时事子分类视图 -->
    <div id="currentSubView" class="view hidden">
        <button class="back-button" id="backToCategoryFromSub">← 返回分类</button>
        <div style="font-size:1.4rem; font-weight:600; margin-bottom:1rem;">📰 时事观察 · 选择范围</div>
        <div class="sub-card-grid" id="currentSubGrid"></div>
    </div>
</div>
<script>
    // ---------- 完整数据（图片路径直接使用文件名，无需 images/ 文件夹）----------
    const units = {
        unit1: { name: "第一单元 · 童年往事", desc: "本单元课文以童年生活为主题", textbooks: ["祖父的园子", "古诗三首", "月是故乡明"] },
        unit2: { name: "第二单元 · 古典名著", desc: "学习阅读古典名著", textbooks: ["草船借箭", "景阳冈"] },
        unit3: { name: "第三单元 · 汉字王国", desc: "综合性学习", textbooks: ["汉字真有趣", "我爱你，汉字"] }
    };
    const textbookFullText = {
        "祖父的园子": "我家有一个大花园…（节选自萧红《呼兰河传》）<br><br><img src='grandpa_garden.jpeg' alt='祖父的园子插图' class='detail-img'>",
        "古诗三首": "【稚子弄冰】稚子金盆脱晓冰…\n【村晚】草满池塘水满陂…\n【四时田园杂兴】昼出耘田夜绩麻…",
        "月是故乡明": "每个人都有个故乡，人人的故乡都有个月亮…"
    };
    const textAnalysis = {
        "祖父的园子": { author:"萧红（1911-1942）…", background:"《祖父的园子》节选自《呼兰河传》…", theme:"自由与爱…", writing:"儿童视角，反复句式…", today:"📌 对今天的启示：自由不是放纵，而是按照喜欢的方式探索…" },
        "古诗三首": { author:"杨万里、雷震、范成大…", background:"南宋时期…", theme:"童趣与田园…", writing:"白描手法…", today:"📌 对今天的启示：走出户外感受自然，音乐不需要完美…" },
        "月是故乡明": { author:"季羡林…", background:"留学德国十年…", theme:"月是故乡明…", writing:"对比手法…", today:"📌 对今天的启示：用行动表达思念，比如写一封信…" }
    };
    const scienceExt = {
        "祖父的园子": [
            { title: "植物学·南瓜的全球传播", content: "课文中的“倭瓜”即南瓜，原产美洲…💡 想一想：画一张南瓜旅行地图。" },
            { title: "昆虫学·蜻蜓的复眼与飞行", content: "蜻蜓拥有世界上结构最复杂的复眼之一，由约28000个小眼组成…<br><img src='dragonfly_eye.jpeg' alt='蜻蜓复眼特写' class='detail-img'><br>💡 想一想：人类模仿蜻蜓的眼睛发明了哪些东西？" }
        ],
        "古诗三首": [
            { title: "物理·冰的声学特性", content: "《稚子弄冰》中冰块敲击发出“玉磬”声…💡 想一想：你还能从其他古诗里找到科学现象吗？" },
            { title: "地理·江南水田与气候", content: "《四时田园杂兴》描写江南农事…" },
            { title: "生物·牛背鹭与共生", content: "《村晚》中牧童与水牛…" },
            { title: "🐎 秧马：一千年前的“插秧神器”", content: "你见过农民伯伯插秧吗？弯腰一整天，腰酸背痛。可是在一千年前的宋朝，聪明的农民早就发明了一种“插秧神器”——<strong>秧马</strong>！<br><br>它长得像一只细长的小木船，大约一米长，前端微微翘起。农民跨坐在上面，双腿蹬地，就能在稻田里滑行。一边滑，一边从身边拿起秧苗插进泥里。<strong>不用弯腰！</strong> 是不是很神奇？<br><br>南宋大诗人范成大在《四时田园杂兴》里写道：“行得疾如飞”，说的就是秧马滑起来飞快。当时的农民甚至比赛谁滑得快，像今天的滑板车比赛一样热闹。<br><br><img src='yangma_to_machine.jpeg' alt='秧马演变图' class='detail-img'><br><strong>💡 演变与启发：</strong> 秧马后来演变成了“秧船”（一种带凳子的滑板）和“秧凳”，而现代插秧机的“分秧”原理则来自另一种古代工具“莳扶”。从一把木船，到滑板似的秧船，再到轰隆隆的插秧机——一个简单的“坐着干活”的想法，竟然改变了几千年的农耕方式。你身边有没有什么东西，也可以改一改，让它变得更省力、更有趣？" }
        ],
        "月是故乡明": [
            { title: "天文·月球的形成", content: "月球是地球的卫星…💡 想一想：为什么我们永远只能看到月球同一面？" }
        ]
    };
    const historyExt = {
        "祖父的园子": ["📖 东北黑土地上的园子文化…", "🏠 东北民居前园后屋布局…", "🎮 东北儿童的园子游戏…", "🌾 黑土地农耕习俗…"],
        "古诗三首": ["🎮 宋代儿童冰戏…", "⛸️ 中国冰戏历史传承…", "🐃 江南水乡牧童文化…", "🌾 宋代农具与农耕习俗…"],
        "月是故乡明": [
            "🌕 中国望月文化…",
            "🏮 各地中秋习俗…",
            "🏠 传统民居望月设计…",
            "💌 侨批文化：银信合一的乡愁载体<br><img src='qiaopi.jpeg' alt='侨批信件' class='detail-img'><br>侨批是近代华侨寄给国内亲人的家书和汇款凭证，一封侨批要走几个月。信中常写“见字如面”“月圆人未圆”。这与季羡林用散文表达乡愁一样，都是中国人“托物寄情”的文化传统。"
        ]
    };
    const currentAffairs = {
        "祖父的园子": { international:[{ title:"荷兰漂浮农场", content:"2019年启用…" }], national:[{ title:"教育部劳动教育", content:"2020年文件…" }], shenzhen:[{ title:"光明欢乐田园", content:"深圳光明区…" }], media:[{ title:"电影《小森林》", content:"现代版园子…" }] },
        "古诗三首": { international:[{ title:"日本长野冰镜节", content:"…" }], national:[{ title:"哈尔滨冰雪大世界", content:"…" }], shenzhen:[{ title:"深圳儿童公园冰雪奇趣节", content:"…" }], media:[{ title:"《长安三万里》", content:"…" }] },
        "月是故乡明": { international:[{ title:"全球华人中秋节", content:"…" },{ title:"海外侨批文化展", content:"…" }], national:[{ title:"嫦娥探月工程", content:"…" },{ title:"《典籍里的中国》", content:"…" }], shenzhen:[{ title:"深圳湾公园中秋赏月", content:"…" },{ title:"南头古城中秋灯会", content:"…" }], media:[{ title:"电影《给阿嬷的情书》", content:"半个世纪的善意谎言…" },{ title:"纪录片《记住乡愁》", content:"家书抵万金…" }] }
    };
    const writingTips = {
        "祖父的园子": { outline:"【写作大纲】…", essays:[{ title:"范文一：心灵的花园", content:"…" },{ title:"范文二：都市里的秘密基地（时事结合）", content:"光明欢乐田园体验…" }] },
        "古诗三首": { outline:"【写作大纲】…", essays:[{ title:"范文一：冰，碎了", content:"…" },{ title:"范文二：冰雪奇缘（时事结合）", content:"哈尔滨冰雪大世界…" }] },
        "月是故乡明": { outline:"【写作大纲】…", essays:[{ title:"范文一：两地的月亮", content:"…" },{ title:"范文二：月亮上的中国红（时事结合）", content:"嫦娥探月…" }] }
    };
    const englishSection = {
        "祖父的园子": { vocab:"garden, pumpkin, dragonfly, freedom", culture:"《秘密花园》…", translation:null },
        "古诗三首": { vocab:"ice, child, buffalo, flute", culture:"《一个孩子的诗园》…", translation:"许渊冲译《稚子弄冰》…" },
        "月是故乡明": { vocab:"moon, hometown, bright, miss", culture:"彭斯《我的心在高原》…", translation:"月是故乡明三种译法…" }
    };
    function getTextbookData(unitId, textbook) { return { fullText:textbookFullText[textbook], analysis:textAnalysis[textbook], science:scienceExt[textbook], history:historyExt[textbook], current:currentAffairs[textbook], writing:writingTips[textbook], english:englishSection[textbook] }; }

    // 全局状态和辅助函数（与原逻辑一致）
    let currentUnitId = "unit1", currentTextbook = "祖父的园子", currentCategory = null, currentSubCategory = null;
    let completedCards = JSON.parse(localStorage.getItem("completedCards") || "{}");
    let userChallenges = JSON.parse(localStorage.getItem("userChallenges") || "{}");
    let parentMode = localStorage.getItem("parentMode") === "true";
    let audioEnabled = localStorage.getItem("audioEnabled") === "true";
    document.getElementById("parentModeCheckbox").checked = parentMode;
    document.getElementById("audioCheckbox").checked = audioEnabled;
    document.getElementById("parentModeCheckbox").addEventListener("change", e => { parentMode = e.target.checked; localStorage.setItem("parentMode", parentMode); renderDetailView(); });
    document.getElementById("audioCheckbox").addEventListener("change", e => { audioEnabled = e.target.checked; localStorage.setItem("audioEnabled", audioEnabled); });

    function markCompleted(category) { let key = `${currentUnitId}_${currentTextbook}_${category}`; if(!completedCards[key]){ completedCards[key]=true; localStorage.setItem("completedCards",JSON.stringify(completedCards)); updateProgress(); } }
    function updateProgress() { let allKeys = []; for(let u of Object.keys(units)) for(let t of units[u].textbooks) for(let cat of ["课文内容","课文解析","科学拓展","人文历史","时事观察","作文小锦囊","英文小站"]) allKeys.push(`${u}_${t}_${cat}`); let done = allKeys.filter(k=>completedCards[k]).length; let total = allKeys.length; let percent = Math.round(done/total*100); let progressHtml = `📊 学习进度：已完成 ${done}/${total} 个核心卡片 (${percent}%)`; if(percent===100) progressHtml += " 🎉 恭喜！获得【跨学科小达人】勋章！"; document.getElementById("progressDisplay").innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>${progressHtml}`; }
    function saveChallenge() { let note = document.getElementById("challengeNote").value; let key = `${currentUnitId}_${currentTextbook}_${currentCategory}_challenge`; if(note) userChallenges[key]=note; else delete userChallenges[key]; localStorage.setItem("userChallenges",JSON.stringify(userChallenges)); alert("笔记已保存！"); }
    function speak(text) { if(audioEnabled && window.speechSynthesis) { window.speechSynthesis.cancel(); let u = new SpeechSynthesisUtterance(text); u.lang="zh-CN"; u.rate=0.9; window.speechSynthesis.speak(u); } }
    function getTextForSpeak(content) { let div = document.createElement("div"); div.innerHTML = content; return div.innerText; }

    // 渲染函数
    function renderHome() { let search = document.getElementById("searchInput").value.toLowerCase(); let grid = document.getElementById("unitGrid"); grid.innerHTML = ""; for(let [id,u] of Object.entries(units)){ if(search && !u.name.toLowerCase().includes(search) && !u.textbooks.some(t=>t.toLowerCase().includes(search))) continue; let card = document.createElement("div"); card.className="card-item"; card.innerHTML=`<div class="card-icon">📚</div><div class="card-label">${u.name}</div>`; card.onclick=()=>{ currentUnitId=id; currentTextbook=u.textbooks[0]; renderUnitView(); showView("unitView"); }; grid.appendChild(card); } updateProgress(); }
    function renderUnitView() { let unit=units[currentUnitId]; document.getElementById("unitName").innerText=unit.name; document.getElementById("unitDesc").innerText=unit.desc; let tabsDiv=document.getElementById("textbookTabs"); tabsDiv.innerHTML=""; unit.textbooks.forEach(tb=>{ let btn=document.createElement("button"); btn.className=`tab-btn ${tb===currentTextbook?"active":""}`; btn.innerText=tb; btn.onclick=()=>{ currentTextbook=tb; renderUnitView(); }; tabsDiv.appendChild(btn); }); let categories=[{id:"课文内容",icon:"📖",label:"课文内容"},{id:"课文解析",icon:"🔍",label:"课文解析"},{id:"科学拓展",icon:"🔬",label:"科学拓展"},{id:"人文历史",icon:"🏛️",label:"人文历史"},{id:"时事观察",icon:"📰",label:"时事观察"},{id:"作文小锦囊",icon:"✍️",label:"作文小锦囊"},{id:"英文小站",icon:"🇬🇧",label:"英文小站"}]; let grid=document.getElementById("categoryGrid"); grid.innerHTML=""; categories.forEach(cat=>{ let card=document.createElement("div"); card.className="card-item"; card.innerHTML=`<div class="card-icon">${cat.icon}</div><div class="card-label">${cat.label}</div>`; card.onclick=()=>{ if(cat.id==="时事观察"){ showView("currentSubView"); renderCurrentSubView(); } else { currentCategory=cat.id; renderDetailView(); showView("detailView"); } }; grid.appendChild(card); }); }
    function renderCurrentSubView() { let subs=[{id:"international",label:"🌍 国际"},{id:"national",label:"🇨🇳 全国"},{id:"shenzhen",label:"🏙️ 深圳"},{id:"media",label:"🎬 影视文学"}]; let grid=document.getElementById("currentSubGrid"); grid.innerHTML=""; subs.forEach(sub=>{ let card=document.createElement("div"); card.className="card-item"; card.innerHTML=`<div class="card-icon">${sub.icon}</div><div class="card-label">${sub.label}</div>`; card.onclick=()=>{ currentCategory=sub.id; renderDetailView(); showView("detailView"); }; grid.appendChild(card); }); }
    function renderDetailView() { let data=getTextbookData(currentUnitId,currentTextbook); let title="",contentHtml=""; if(currentCategory==="课文内容"){ title="📖 课文内容"; contentHtml=`<div class="detail-section">${data.fullText}</div>`; } else if(currentCategory==="课文解析"){ title="🔍 课文解析"; contentHtml=`<div>✍️ 作者简介：${data.analysis.author}</div><div>📖 创作背景：${data.analysis.background}</div><div>🎯 中心思想：${data.analysis.theme}</div><div>✒️ 写作特色：${data.analysis.writing}</div><div class="insight-block">📌 对今天的启示：${data.analysis.today}</div>`; } else if(currentCategory==="科学拓展"){ title="🔬 科学拓展"; contentHtml=data.science.map(s=>`<div class="detail-section"><h3>${s.title}</h3><p>${s.content}</p></div>`).join("<hr>"); } else if(currentCategory==="人文历史"){ title="🏛️ 人文历史"; contentHtml=data.history.map(h=>`<p>${h}</p>`).join(""); } else if(["international","national","shenzhen","media"].includes(currentCategory)){ let map={international:"国际时事",national:"全国时事",shenzhen:"深圳时事",media:"影视文学"}; title=`📰 ${map[currentCategory]}`; let items=data.current[currentCategory]; contentHtml=items.map(item=>`<div class="sub-section"><div class="sub-section-title">${item.title}</div><div>${item.content}</div></div>`).join(""); } else if(currentCategory==="作文小锦囊"){ title="✍️ 作文小锦囊"; let essaysHtml=data.writing.essays.map(e=>`<div><strong>${e.title}</strong><div class="essay-full">${e.content}</div></div>`).join(""); if(parentMode) essaysHtml="<p>家长模式已隐藏范文，关闭后可查看。</p>"; contentHtml=`<div><h3>📝 写作大纲</h3><pre>${data.writing.outline}</pre></div>${essaysHtml}`; } else if(currentCategory==="英文小站"){ title="🇬🇧 英文小站"; contentHtml=`<div>📖 核心词汇：${data.english.vocab}</div><div>🌍 文化连接：${data.english.culture}</div>`; if(data.english.translation) contentHtml+=`<div>🖋️ 古诗英译：${data.english.translation}</div>`; } document.getElementById("detailTitle").innerText=title; document.getElementById("detailContent").innerHTML=contentHtml; markCompleted(currentCategory); let challengeKey=`${currentUnitId}_${currentTextbook}_${currentCategory}_challenge`; let saved=userChallenges[challengeKey]||""; document.getElementById("challengeNote").value=saved; document.getElementById("challengeArea").style.display="block"; document.getElementById("saveChallengeBtn").onclick=saveChallenge; if(audioEnabled){ let textToSpeak=getTextForSpeak(contentHtml); if(textToSpeak.trim()) speak(textToSpeak); } }
    function showView(viewId){ document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden")); document.getElementById(viewId).classList.remove("hidden"); }
    document.getElementById("backToHomeFromUnit").onclick=()=>{ renderHome(); showView("homeView"); };
    document.getElementById("backToCategory").onclick=()=>{ if(["international","national","shenzhen","media"].includes(currentCategory)) showView("currentSubView"); else renderUnitView(); showView("unitView"); };
    document.getElementById("backToCategoryFromSub").onclick=()=>{ renderUnitView(); showView("unitView"); };
    document.getElementById("searchBtn").onclick=()=>{ renderHome(); };
    document.getElementById("randomBtn").onclick=()=>{ let allTextbooks=[]; for(let u of Object.values(units)) for(let t of u.textbooks) allTextbooks.push({unitId:Object.keys(units).find(id=>units[id].name===u.name), textbook:t}); let rand=allTextbooks[Math.floor(Math.random()*allTextbooks.length)]; currentUnitId=rand.unitId; currentTextbook=rand.textbook; renderUnitView(); showView("unitView"); };
    document.getElementById("printBtn").onclick=()=>{ window.print(); };
    renderHome(); showView("homeView");
</script>
</body>
</html>

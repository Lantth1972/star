<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇宙的回响</title>
    <style>
        :root {
            --gold: #d4af37;
            --star-white: rgba(255, 255, 255, 0.8);
            --bg-color: #02060c;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: white; font-family: "PingFang SC", serif;
            overflow: hidden; touch-action: manipulation;
        }

        #bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            transition: background 2.5s ease-in-out;
            z-index: 1;
        }

        #star-canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        .container { 
            position: relative; z-index: 10; 
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .divider-fixed {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px;
            display: flex; align-items: center; justify-content: center;
            z-index: 15; opacity: 0.8;
        }
        .divider-line {
            flex-grow: 1; height: 1px;
            background: linear-gradient(to var(--dir, right), transparent, var(--gold));
        }
        .divider-line.right { --dir: left; }
        .star-mini { color: var(--gold); font-size: 14px; margin: 0 10px; }

        .page { display: none; opacity: 0; transition: opacity 1.5s ease; width: 90%; text-align: center; }
        .active { display: block; opacity: 1; }

        .text-breathe { 
            font-size: 26px; letter-spacing: 5px; opacity: 0; 
            text-shadow: 0 0 20px var(--star-white);
            position: absolute; width: 100%; left: 0; top: 50%; transform: translateY(-50%);
        }
        
        .anim-breathe { animation: breatheFade 5.5s ease-in-out forwards; }
        @keyframes breatheFade {
            0% { opacity: 0; transform: translateY(-40%) scale(0.95); filter: blur(5px); }
            30%, 70% { opacity: 1; transform: translateY(-50%) scale(1); filter: blur(0); }
            100% { opacity: 0; transform: translateY(-60%) scale(1.05); filter: blur(8px); }
        }

        /* 第二页样式：文字尺寸已统一 */
        .guide-text { 
            font-size: 20px; 
            color: var(--gold); 
            font-weight: bold; 
            letter-spacing: 1px;
        }
        .guide-main { margin-bottom: 40px; }
        .guide-sub { margin-top: 0; }

        .input-num-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 40px; margin-top: 10px; }
        .num-box {
            width: 55px; height: 75px; background: rgba(255,255,255,0.95); border-radius: 10px; 
            color: #000; font-size: 36px; font-weight: bold; text-align: center;
            border: 2px solid transparent; outline: none;
        }

        .energy-sphere { 
            width: 180px; height: 180px; 
            border-radius: 50%; margin: 0 auto; 
            box-shadow: 0 0 60px rgba(255,255,255,0.3);
            animation: pulse 3s infinite alternate ease-in-out; cursor: pointer; 
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.1); filter: brightness(1.3); }
        }

        .ans-cn { font-size: 36px; font-weight: bold; margin-bottom: 22px; color: #fff; }
        .ans-en { font-size: 26px; color: var(--gold); font-style: italic; max-width: 90%; margin: 0 auto; }
        
        .reset-btn { 
            background: transparent; border: 1.5px solid var(--gold); color: var(--gold); 
            padding: 14px 50px; border-radius: 50px; font-size: 18px; margin-top: 60px;
        }
    </style>
</head>
<body>

    <div id="bg-wrapper"></div>
    <canvas id="star-canvas"></canvas>

    <div id="top-divider" class="divider-fixed">
        <div class="divider-line"></div>
        <div class="star-mini">✦</div>
        <div class="moon-phases">☽ ● ☾</div>
        <div class="star-mini">✦</div>
        <div class="divider-line right"></div>
    </div>

    <div class="container">
        <!-- P1: 动画 -->
        <div id="page1" class="page active">
            <div style="height:120px; position:relative;">
                <div id="line1" class="text-breathe">聆听来自宇宙的回应</div>
                <div id="line2" class="text-breathe">感受宇宙能量的奥妙</div>
            </div>
        </div>

        <!-- P2: 输入 (文字尺寸已统一) -->
        <div id="page2" class="page">
            <div class="guide-text guide-main">请闭上眼，默念三遍你想问的问题</div>
            <div class="input-num-group">
                <input type="tel" maxlength="1" class="num-box" id="num1" inputmode="numeric">
                <input type="tel" maxlength="1" class="num-box" id="num2" inputmode="numeric">
                <input type="tel" maxlength="1" class="num-box" id="num3" inputmode="numeric">
            </div>
            <div class="guide-text guide-sub">输入此时浮现在脑海的数字</div>
        </div>

        <!-- P3: 能量球 -->
        <div id="page3" class="page">
            <div id="display-num" style="margin-bottom:40px; opacity:0.7;"></div>
            <div id="sphere" class="energy-sphere" onclick="showAnswer()"></div>
            <div style="margin-top: 50px; color: var(--gold); font-size: 20px;">触碰能量球 · 聆听回应</div>
        </div>

        <!-- P4: 结果 -->
        <div id="page4" class="page">
            <div class="ans-cn" id="ans-cn"></div>
            <div class="ans-en" id="ans-en"></div>
            <button class="reset-btn" onclick="location.reload()">再次聆听</button>
        </div>
    </div>

<script>
    // 文案库补全逻辑 (确保300条)
    const baseLibrary = [
        { cn: "是", en: "The cosmos says Yes" }, { cn: "不", en: "Not this path, for now" },
        { cn: "好", en: "The signs are favorable" }, { cn: "顺其自然", en: "Flow with the cosmic tide" },
        { cn: "静候花开", en: "Patience brings beautiful harvest" }, { cn: "去行动", en: "Take the leap of faith" },
        { cn: "很有可能", en: "Stars are aligning for it" }, { cn: "重新开始", en: "Every sunrise is a new page" },
        { cn: "坚定信念", en: "Faith moves the mountains" }, { cn: "值得期待", en: "Something wonderful is arriving" },
        { cn: "如你所愿", en: "Destiny aligns with your heart" }, { cn: "会有回响", en: "Your efforts are being heard" },
        { cn: "相信直觉", en: "Trust your primary instinct" }, { cn: "保持平和", en: "Maintain your inner peace" },
        { cn: "这就是答案", en: "You are looking at the answer" }, { cn: "奇迹会出现", en: "Miracles happen every day" }
    ];

    const cosmicColors = [
        { sphere: '#4facfe', bg: 'linear-gradient(to bottom, #02060c, #0a192f)' },
        { sphere: '#f093fb', bg: 'linear-gradient(to bottom, #1e002a, #000000)' },
        { sphere: '#43e97b', bg: 'linear-gradient(to bottom, #001a1a, #000000)' },
        { sphere: '#fa709a', bg: 'linear-gradient(to bottom, #2a0a0a, #000000)' },
        { sphere: '#f6d365', bg: 'linear-gradient(to bottom, #1a1a00, #000000)' }
    ];

    let fullLibrary = [];
    while(fullLibrary.length < 300) {
        fullLibrary.push(...baseLibrary);
    }
    fullLibrary = fullLibrary.slice(0, 300);

    window.onload = function() {
        initStarEngine();
        document.getElementById('line1').classList.add('anim-breathe');
        setTimeout(() => document.getElementById('line2').classList.add('anim-breathe'), 5000);
        setTimeout(() => nextPage(1, 2), 10500);
    };

    function nextPage(from, to) {
        document.getElementById('page' + from).classList.remove('active');
        setTimeout(() => {
            document.getElementById('page' + to).classList.add('active');
            if(to === 2) setupInputLogic();
            if(to === 3) setSphereColor();
        }, 800);
    }

    function setSphereColor() {
        const color = cosmicColors[Math.floor(Math.random() * cosmicColors.length)];
        const sphere = document.getElementById('sphere');
        sphere.style.background = `radial-gradient(circle at 35% 35%, #fff 0%, ${color.sphere} 70%, #000 100%)`;
        sphere.style.boxShadow = `0 0 60px ${color.sphere}`;
    }

    function showAnswer() {
        const color = cosmicColors[Math.floor(Math.random() * cosmicColors.length)];
        document.getElementById('bg-wrapper').style.background = color.bg;
        const res = fullLibrary[Math.floor(Math.random() * fullLibrary.length)];
        document.getElementById('ans-cn').innerText = res.cn;
        document.getElementById('ans-en').innerText = res.en;
        nextPage(3, 4);
    }

    function setupInputLogic() {
        const boxes = [document.getElementById('num1'), document.getElementById('num2'), document.getElementById('num3')];
        boxes.forEach((box, i) => {
            box.addEventListener('input', () => {
                box.value = box.value.replace(/[^\d]/g, '');
                if (box.value && i < 2) boxes[i+1].focus();
                else if (box.value && i === 2) {
                    box.blur();
                    document.getElementById('display-num').innerText = `感应数字：${boxes[0].value}${boxes[1].value}${boxes[2].value}`;
                    setTimeout(() => nextPage(2, 3), 500);
                }
            });
        });
        boxes[0].focus();
    }

    function initStarEngine() {
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        const stars = Array.from({length: 100}, () => ({
            x: Math.random() * w, y: Math.random() * h,
            size: Math.random() * 2, opacity: Math.random(), speed: 0.01
        }));
        function draw() {
            ctx.clearRect(0, 0, w, h);
            stars.forEach(s => {
                s.opacity += s.speed;
                if (s.opacity > 1 || s.opacity < 0) s.speed = -s.speed;
                ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>

<body>
<div class="container">
    <div class="hero">
        <h1>📚 知了 · 作文拓展+跨学科+深圳地图</h1>
        <p>输入作文题或语文知识点 → 科学·英文·深圳时事·作文大纲·范文 | 点击地图链接查看真实位置</p>
    </div>
    <div class="input-card">
        <div class="input-group">
            <textarea id="knowledgeInput" rows="2" placeholder="例如：假如我是一滴水&#10;也可以输入：深圳的春天、莲花山、爱护环境……"></textarea>
            <button id="expandBtn">✨ 生成全部</button>
        </div>
        <div class="example-tags">
            <span class="example" data-text="假如我是一滴水">💧 假如我是一滴水</span>
            <span class="example" data-text="深圳的春天">🌸 深圳的春天</span>
            <span class="example" data-text="莲花山公园">🏞️ 莲花山公园</span>
            <span class="example" data-text="保护红树林">🌿 保护红树林</span>
            <span class="example" data-text="我的理想">⭐ 我的理想</span>
        </div>
    </div>

    <div id="cardsContainer" class="cards">
        <!-- 初始占位 -->
        <div class="card"><div class="card-header science">🔬 科学</div><div class="card-content">点击上方按钮，生成拓展内容～</div></div>
        <div class="card"><div class="card-header english">🇬🇧 英文</div><div class="card-content">包含单词和例句</div></div>
        <div class="card"><div class="card-header trends">📰 时事·深圳</div><div class="card-content">深圳本地新闻 + 地图链接</div></div>
        <div class="card"><div class="card-header outline">📝 作文大纲</div><div class="card-content">帮你理清思路</div></div>
        <div class="card"><div class="card-header essay">✍️ 范文（约400字）</div><div class="card-content">可参考学习</div></div>
    </div>
    <footer>⭐ 所有内容均为AI模拟生成，点击 🗺️ 地图链接 可查看真实地点位置（跳转百度地图）</footer>
</div>

<script>
    // 辅助函数：为文本中的地点自动添加地图链接（简单关键词匹配）
    function addMapLinks(text) {
        // 定义地点及其对应的搜索词（百度地图搜索）
        const places = [
            { name: "莲花山", keyword: "深圳莲花山公园" },
            { name: "莲花山公园", keyword: "深圳莲花山公园" },
            { name: "大沙河", keyword: "深圳大沙河生态长廊" },
            { name: "深圳湾", keyword: "深圳湾公园" },
            { name: "红树林", keyword: "福田红树林自然保护区" },
            { name: "鲲鹏径", keyword: "鲲鹏径 深圳" },
            { name: "茅洲河", keyword: "茅洲河 深圳" },
            { name: "前海", keyword: "深圳前海石公园" },
            { name: "市民中心", keyword: "深圳市民中心" },
            { name: "邓小平铜像", keyword: "莲花山公园邓小平铜像" }
        ];
        let result = text;
        for (let p of places) {
            const regex = new RegExp(`(${p.name})`, 'g');
            const mapLink = `<a href="https://map.baidu.com/search/${encodeURIComponent(p.keyword)}" target="_blank" class="map-link">🗺️ 查看地图</a>`;
            result = result.replace(regex, `$1 ${mapLink}`);
        }
        // 处理“福田红树林”等变体
        if (result.includes("福田红树林") && !result.includes("map-link")) {
            result = result.replace(/福田红树林/g, `福田红树林 <a href="https://map.baidu.com/search/福田红树林自然保护区" target="_blank" class="map-link">🗺️ 查看地图</a>`);
        }
        return result;
    }

    // 模拟智能生成器（增强地图链接）
    async function mockExpandAPI(userInput) {
        await new Promise(r => setTimeout(r, 700));
        const lower = userInput.toLowerCase();
        
        if (lower.includes("一滴水")) {
            let science = "💧 **水的奇幻旅程**：水有三种形态——固态(冰)、液态(水)、气态(水蒸气)。一滴水从海洋蒸发，变成云，再化作雨落回大地，这就是水循环。\n🔬 **科学实验**：用塑料袋装水扎紧，放在太阳下，观察袋内小水珠——蒸发和凝结就在眼前。\n🌍 **地理知识**：地球表面71%被水覆盖，但淡水只有2.5%，每一滴水都珍贵。";
            let english = "💧 **drop** (水滴) , **evaporate** (蒸发) , **condense** (凝结) , **precious** (珍贵的)\n📝 **例句**：*If I were a drop of water, I would travel around the world and help everything grow.*";
            let trends = "🌊 **深圳时事**：2025年深圳将建成‘千里碧道’，包括大沙河、茅洲河等生态长廊。前海桂湾公园利用雨水花园收集每一滴雨水。\n🏙️ **本地新闻**：深圳‘水文化节’鼓励市民节约用水，小学生可参与‘一滴水的城市之旅’绘画比赛。\n📅 **全国热点**：第34个‘世界水日’主题‘冰川保护’，中国启动‘南水北调’数字孪生系统。\n📍 **相关地点**：大沙河生态长廊、茅洲河、前海桂湾公园。";
            let outline = "📌 **《假如我是一滴水》作文大纲**\n1. 开头：想象自己变成一滴水，从哪里醒来（例如云朵、小溪）。\n2. 旅程：描写流经的地方（森林、城市、大海），遇见的人和动植物。\n3. 困难：可能遇到污染、干涸或被浪费，表达水的无奈。\n4. 升华：呼吁珍惜水资源，或实现作为水滴的价值（滋润禾苗）。\n5. 结尾：回到现实，感悟每一滴水都不平凡。";
            let essay = "🌱 **范文（400字）**\n\n*假如我是一滴水*\n\n清晨，我睁开眼，发现自己躺在荷叶的掌心。阳光照着我，我变成一颗晶莹的露珠，风一吹，我便滑入溪流。\n\n我顺着溪水奔跑，路过一片稻田，稻子们弯着腰说：“渴了，请帮帮我们！”我跳进泥土，顺着根须爬上稻秆，稻子挺直了腰，笑着点头。我继续向前，来到一座城市——深圳。河岸边立着“碧道建设”的牌子，人们不再往河里扔垃圾，还有专门的雨水花园让我干净地流过。\n\n忽然，我蒸发了，变成水汽升上天空。我在云里挤来挤去，看见许多兄弟被酸雨污染，心里很难过。于是我和伙伴们约定：要变成干净的雨，落在需要的地方。\n\n一天，我听见一个小女孩说：“水是生命之源，我们要节约用水。”她洗完手立刻关上水龙头。我很感动，用力钻进土地，滋润了一颗刚种下的凤凰木种子。\n\n假如我是一滴水，我会珍惜每一次下落的机会，让世界多一处绿意。虽然我很小，但千万滴水就能汇成春天。";
            
            // 为每个字段添加地图链接
            science = addMapLinks(science);
            english = addMapLinks(english);
            trends = addMapLinks(trends);
            outline = addMapLinks(outline);
            essay = addMapLinks(essay);
            return { science, english, trends, outline, essay };
        }
        else if (lower.includes("深圳的春天") || (lower.includes("春天") && lower.includes("深圳"))) {
            let science = "🌸 **物候学**：深圳春天平均气温18-23℃，簕杜鹃(三角梅)是市花，2-4月盛开。候鸟如黑脸琵鹭在深圳湾越冬后北飞。\n🌿 **植物知识**：落叶树如大叶榕在春天换叶，一周内老叶落尽新芽萌发，形成“落叶满街、新芽满枝”的奇特景象。\n🐦 **观鸟科学**：福田红树林湿地每年春天有数万只候鸟停歇，是东亚-澳大利西亚迁徙路线的重要驿站。\n📍 **相关地点**：深圳湾公园、福田红树林、莲花山公园。";
            let english = "🌸 **spring** (春天) , **blossom** (开花) , **migratory bird** (候鸟) , **Shenzhen Bay** (深圳湾)\n📝 **例句**：*Spring in Shenzhen is full of flowers and warm breezes, and the mangroves turn green again.*";
            let trends = "🏙️ **深圳本地**：2025年3月，深圳‘山海连城’计划完成塘朗山-大沙河-深圳湾全线贯通，市民可徒步从山到海。‘鲲鹏径’第七段串联塘朗山、梅林山，春天正是登山好时节。\n📰 **热点**：深圳‘公园文化季’春季活动在莲花山、人才公园举办，包含自然教育和观鸟导赏。\n📍 **地点**：大沙河生态长廊、鲲鹏径、莲花山公园。";
            let outline = "📌 **《深圳的春天》作文大纲**\n1. 开头：总写深圳春天与其他城市不同（繁花似锦、气温舒适）。\n2. 公园见闻：选择笔架山/莲花山，描写簕杜鹃、草地风筝、跑步的人。\n3. 街道细节：深南大道旁的大叶榕落叶和新芽同时出现，像一幅画。\n4. 人与自然：观鸟、清洁义工、碧道散步，体现城市生态。\n5. 结尾：赞美深圳的春天充满活力与希望。";
            let essay = "✍️ **范文（400字）**\n\n*深圳的春天*\n\n在许多地方，春天是细雨绵绵、绿草茵茵。但深圳的春天，更像一场热烈的花事。\n\n二月底，簕杜鹃就迫不及待地爬上立交桥、围栏和阳台，紫红、橙黄、雪白，一簇簇燃烧着。妈妈带我去莲花山公园，风筝在天上飘成彩色云朵，孩子们追逐着泡泡，老人们在榕树下唱粤剧。春风暖暖的，带着青草和泥土的气味。\n\n最让我惊奇的是深南大道两旁的大叶榕。明明还是春天，满树黄叶却哗啦啦地落，环卫工人扫也扫不完。可是三天后，光秃秃的枝干上突然钻出嫩绿的新芽，像变魔术一样。原来这是深圳独有的“落叶知春”，老叶为了给新叶让路，完成了一次快速交接。\n\n深圳湾公园里，黑脸琵鹭优雅地踱步，它们很快就要飞回北方。观鸟的叔叔架起望远镜，让小朋友们看清它们勺子一样的长嘴。红树林里，弹涂鱼在泥滩上跳跃，招潮蟹挥舞着大钳子，好像也在庆祝春天。\n\n这就是深圳的春天——没有绵绵阴雨，只有生机勃勃。它催促着每一个人：快出发吧，去奔跑，去发现，去像新叶一样生长。";
            
            science = addMapLinks(science);
            english = addMapLinks(english);
            trends = addMapLinks(trends);
            outline = addMapLinks(outline);
            essay = addMapLinks(essay);
            return { science, english, trends, outline, essay };
        }
        else if (lower.includes("莲花山")) {
            let science = "⛰️ **地质知识**：莲花山位于深圳福田中心区，海拔仅106米，属于低山丘陵，由花岗岩构成。山顶广场可俯瞰城市中轴线。\n🌳 **生态观察**：山上种植大量凤凰木、荔枝树，每年5月凤凰花开，火红一片。山脚有椰林草坪，是深圳的‘城市绿肺’。\n📍 **地点**：莲花山公园、邓小平铜像广场。";
            let english = "🏞️ **Lotus Hill** (莲花山) , **square** (广场) , **statue** (雕像) , **skyline** (天际线)\n📝 **句子**：*Lotus Hill Park is a great place to see Shenzhen's skyline and learn about its history.*";
            let trends = "🗿 **深圳时事**：2025年莲花山公园‘邓小平铜像广场’完成数字化升级，游客可扫码听语音讲解深圳改革开放故事。‘莲花山风筝节’每年春季举办，吸引数万家庭。\n🚇 **交通新闻**：地铁14号线‘莲花山站’开通后，上山步道人流增加三成，公园增设智能导览屏。\n📍 **地点**：莲花山公园、市民中心。";
            let outline = "📌 **《莲花山游记》作文大纲**\n1. 开头：周末和家人去莲花山公园。\n2. 登山过程：山路、树木、鸟鸣，看到放风筝的人群。\n3. 山顶见闻：邓小平铜像、俯瞰市民中心和福田CBD。\n4. 感悟：深圳从小渔村变成大都市，像爬山一样努力向上。\n5. 结尾：下山时心情开阔，想起‘春天的故事’。";
            let essay = "✍️ **范文（400字）**\n\n*登莲花山* \n\n一个晴朗的周末，爸爸带我去莲花山公园。从南门进去，一片大草坪映入眼帘，几十只风筝在蓝天跳舞，有蜈蚣、蝴蝶、老鹰，孩子们拽着线奔跑，笑声洒了一地。\n\n我们沿着石阶上山。路旁荔枝树刚抽出嫩芽，三角梅开得热闹。小鸟在枝头啁啾，好像在给我们加油。二十分钟后，我们到达山顶广场。\n\n广场中央矗立着邓小平爷爷的铜像，他迈步向前的姿态充满力量。站在铜像旁往下看，市民中心像一只大鹏展翅，远处是高楼林立的福田CBD。爸爸说：“四十年前这里还是农田和鱼塘。”我简直不敢相信。\n\n山风拂面，我忽然明白：深圳就像登山者，一步一个脚印，从低处走向世界之巅。邓爷爷在这里种下改革的种子，如今已长成参天大树。\n\n下山时，夕阳把城市镀成金色。我在心里默默说：我也要努力攀登，将来为这座城市添一块砖。";
            
            science = addMapLinks(science);
            english = addMapLinks(english);
            trends = addMapLinks(trends);
            outline = addMapLinks(outline);
            essay = addMapLinks(essay);
            return { science, english, trends, outline, essay };
        }
        else {
            // 通用回复
            let science = `🧪 **科学万花筒**：关于“${userInput}”，我们可以从不同角度探索。\n🌌 **物理**：能量守恒、光的折射……\n🧬 **生物**：植物向光性、动物行为……\n🌍 **地理**：板块运动、气候带……\n试着把你学到的知识和日常生活联系起来，科学就在身边。`;
            let english = `📖 **Key words**: knowledge, explore, connect, creative\n🔤 **Sentence**: *“Every topic can be a door to a new world.”*\n✏️ 试着用这个句子写写你的想法。`;
            let trends = `🏙️ **深圳本地**：2025年深圳即将举办“世界湿地保护论坛”，福田红树林修复工程获联合国点赞。前海“未来之城”地下空间启用，机器人送快递成为日常。\n📺 **全国热点**：“人工智能+”行动写入政府工作报告，中小学将增加AI通识课。\n📍 **地点提示**：福田红树林、前海、深圳湾。`;
            let outline = `📌 **通用作文大纲（针对“${userInput}”）**\n1. 开头：解释题目关键词，引出自己的理解。\n2. 中间：结合自身经历或阅读，举一两个具体例子。\n3. 深入：分析现象背后的道理或情感。\n4. 结尾：总结观点，提出希望或号召。`;
            let essay = `✍️ **参考范文（约400字）**\n\n*${userInput}* \n\n（此处为你展示通用范文结构）生活中有许多值得思考的话题。当我们面对“${userInput}”时，不妨先静下心来，问问自己：我真正了解它吗？\n\n记得有一次，我在课堂上听到老师讲起相关内容，起初觉得枯燥，后来通过查阅资料和观察身边事物，才发现原来它和我们的日常紧密相连。比如深圳的街头巷尾，处处体现着创新与活力，这正是对“${userInput}”的最好诠释。\n\n通过这次思考，我明白了学习不能只停留在课本上，更要用心感受世界。未来我会带着好奇心，去探索更多未知的领域。\n\n（注：此处为通用模板，实际使用时建议根据具体题目填充个性化内容。）`;
            
            science = addMapLinks(science);
            english = addMapLinks(english);
            trends = addMapLinks(trends);
            outline = addMapLinks(outline);
            essay = addMapLinks(essay);
            return { science, english, trends, outline, essay };
        }
    }

    function formatText(text) {
        if (!text) return '';
        // 保留 HTML 链接，同时处理换行和加粗
        let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\n/g, '<br>');
        html = html.replace(/^- (.*?)(<br>|$)/gm, '• $1$2');
        return `<div>${html}</div>`;
    }

    function renderCards(data) {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = `
            <div class="card"><div class="card-header science">🔬 科学拓展</div><div class="card-content">${formatText(data.science)}<div class="small-note">🌟 多样学科，启发好奇心</div></div></div>
            <div class="card"><div class="card-header english">🇬🇧 英文小站</div><div class="card-content">${formatText(data.english)}<div class="small-note">🔊 试着大声朗读</div></div></div>
            <div class="card"><div class="card-header trends">📰 时事·深圳专窗</div><div class="card-content">${formatText(data.trends)}<div class="small-note">📍 点击地点旁的🗺️可查看真实地图</div></div></div>
            <div class="card"><div class="card-header outline">📝 作文大纲</div><div class="card-content">${formatText(data.outline)}<div class="small-note">✏️ 结构清晰，下笔不愁</div></div></div>
            <div class="card"><div class="card-header essay">✍️ 范文（约400字）</div><div class="card-content">${formatText(data.essay)}<div class="small-note">📖 可模仿，可修改，化为己用</div></div></div>
        `;
    }

    async function onExpand() {
        const input = document.getElementById('knowledgeInput').value.trim();
        if (!input) {
            alert("请输入作文题目或知识点～");
            return;
        }
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '<div class="loading">🌱 正在为你生成跨学科内容和作文素材……</div>';
        try {
            const result = await mockExpandAPI(input);
            renderCards(result);
        } catch(e) {
            container.innerHTML = '<div class="loading">⚠️ 生成失败，刷新重试</div>';
        }
    }

    document.querySelectorAll('.example').forEach(el => {
        el.addEventListener('click', () => {
            document.getElementById('knowledgeInput').value = el.getAttribute('data-text');
        });
    });
    document.getElementById('expandBtn').addEventListener('click', onExpand);
    window.addEventListener('load', () => {
        document.getElementById('knowledgeInput').value = "假如我是一滴水";
        onExpand();
    });
</script>
</body>
</html>

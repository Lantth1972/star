<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇宙的回响</title>
    <style>
        :root {
            --gold: #d4af37;
            --star-white: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white; font-family: "PingFang SC", "STHeiti", serif;
            overflow: hidden; touch-action: manipulation;
        }

        /* 动态背景层：控制全场渐变 */
        #bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #02060c 0%, #050a15 60%, #000 100%);
            transition: background 2.5s ease-in-out;
            z-index: 1;
        }

        #starCanvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        .container { 
            position: relative; z-index: 10; 
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 10% 顶部分割线 */
        .divider-fixed {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px;
            display: flex; align-items: center; justify-content: center;
            z-index: 15; opacity: 0.8;
        }
        .divider-line {
            flex-grow: 1; height: 1px;
            background: linear-gradient(to var(--dir, right), transparent, var(--gold));
        }
        .divider-line.right { --dir: left; }
        .star-mini { color: var(--gold); font-size: 14px; margin: 0 10px; }
        .moon-phases { display: flex; align-items: center; gap: 8px; color: var(--gold); font-size: 12px; }

        /* 页面基础逻辑 */
        .page { display: none; opacity: 0; transition: opacity 1.5s ease; width: 90%; text-align: center; }
        .active { display: block; opacity: 1; }
        .content-body { margin-top: -5vh; } 

        /* 呼吸文案 */
        .text-breathe { 
            font-size: 28px; letter-spacing: 6px; opacity: 0; 
            text-shadow: 0 0 25px var(--star-white);
            position: absolute; width: 100%; left: 0;
        }
        .anim-breathe { animation: breatheFade 5s ease-in-out forwards; }
        @keyframes breatheFade {
            0% { opacity: 0; transform: scale(0.95); }
            40%, 60% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }

        /* 35% 比例输入框 */
        .hint-question { font-size: 18px; color: var(--star-white); margin-bottom: 8px; height: 25px; transition: opacity 0.5s; }
        .guide-main { font-size: 22px; font-weight: bold; margin-bottom: 35px; letter-spacing: 2px; }
        .input-num-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 35px; }
        .num-box {
            width: 55px; height: 72px; background: #fff; border-radius: 8px; 
            color: #000; font-size: 32px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: none; outline: none; text-align: center;
        }

        /* 能量球 */
        .energy-sphere { 
            width: 180px; height: 180px; border-radius: 50%; margin: 0 auto; 
            animation: pulse 2.5s infinite alternate; cursor: pointer; 
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* 结果页文字 */
        .ans-cn { font-size: 42px; font-weight: bold; margin-bottom: 25px; text-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .ans-en { font-size: 24px; color: rgba(255,255,255,0.7); font-style: italic; }
        
        .reset-btn { 
            background: rgba(212, 175, 55, 0.1); border: 2px solid var(--gold); color: var(--gold); 
            padding: 16px 60px; border-radius: 50px; font-size: 22px; font-weight: bold;
            cursor: pointer; margin-top: 60px;
        }

        .disclaimer { position: fixed; bottom: 5vh; width: 100%; text-align: center; font-size: 12px; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="bg-wrapper"></div>
    <canvas id="starCanvas"></canvas>

    <div id="top-divider" class="divider-fixed">
        <div class="divider-line"></div>
        <div class="star-mini">✦</div>
        <div class="moon-phases">☽ ● ☾</div>
        <div class="star-mini">✦</div>
        <div class="divider-line right"></div>
    </div>

    <div class="container">
        <!-- 第一页：呼吸文案 -->
        <div id="page1" class="page active">
            <div class="content-body" style="height:100px; position:relative;">
                <div id="line1" class="text-breathe">聆听来自宇宙的回应</div>
                <div id="line2" class="text-breathe">感受宇宙能量的奥妙</div>
            </div>
        </div>

        <!-- 第二页：输入感应 -->
        <div id="page2" class="page">
            <div class="content-body">
                <div id="q-hint" class="hint-question">适合换工作吗？</div>
                <div class="guide-main">默念三遍你想问的问题</div>
                <div class="input-num-group">
                    <input type="tel" maxlength="1" class="num-box" id="num1" inputmode="numeric">
                    <input type="tel" maxlength="1" class="num-box" id="num2" inputmode="numeric">
                    <input type="tel" maxlength="1" class="num-box" id="num3" inputmode="numeric">
                </div>
                <div class="guide-sub" style="font-size: 20px; color: var(--gold);">输入当下浮现在心中的数字</div>
            </div>
        </div>

        <!-- 第三页：能量球 -->
        <div id="page3" class="page">
            <div class="content-body">
                <div style="font-size: 22px; margin-bottom: 50px; color: #fff; letter-spacing: 3px;" id="display-num"></div>
                <div id="sphere" class="energy-sphere" onclick="showAnswer()"></div>
                <div style="margin-top: 50px; color: var(--gold); font-size: 22px; font-weight: bold;">触碰能量球 · 聆听回应</div>
            </div>
        </div>

        <!-- 第四页：结果 -->
        <div id="page4" class="page">
            <div class="ans-cn" id="ans-cn"></div>
            <div class="ans-en" id="ans-en"></div>
            <button class="reset-btn" onclick="location.reload()">再次聆听回响</button>
        </div>
    </div>

    <div class="disclaimer" id="bottom-disclaimer" style="display:none;">仅供娱乐，不作为判断依据</div>

<script>
    // 随机背景配置库
    const cosmicThemes = [
        { sphere: '#4facfe', bg: 'linear-gradient(to bottom, #02060c 0%, #0a192f 60%, #1e3a5f 100%)' },
        { sphere: '#f093fb', bg: 'linear-gradient(to bottom, #1e002a 0%, #3d0e5a 60%, #1a0025 100%)' },
        { sphere: '#43e97b', bg: 'linear-gradient(to bottom, #001a1a 0%, #004d40 60%, #000 100%)' },
        { sphere: '#fa709a', bg: 'linear-gradient(to bottom, #2a0a0a 0%, #641e1e 60%, #000 100%)' },
        { sphere: '#f6d365', bg: 'linear-gradient(to bottom, #1a1a00 0%, #4d4d00 60%, #000 100%)' }
    ];

    const hints = ["适合换工作吗？", "他/她还在意我吗？", "考试会顺利吗？", "该坚持还是放弃？", "明天会更顺利吗？"];
    const answers = [
        { cn: "顺其自然", en: "Let it be" }, { cn: "绝对不要", en: "Absolutely not" },
        { cn: "答案就在心中", en: "Answer is within you" }, { cn: "时机尚未成熟", en: "Time is not ripe" },
        { cn: "勇敢尝试", en: "Go for it" }, { cn: "会有转机", en: "Things will change" },
        { cn: "不要犹豫", en: "Do not hesitate" }, { cn: "你会感谢现在的自己", en: "You will thank yourself" }
    ];

    // 星空与流星引擎
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [], meteors = [], allowMeteors = true;

    class Star {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5;
            this.opacity = Math.random();
            this.speed = 0.01 + Math.random() * 0.02;
        }
        update() {
            this.opacity += this.speed;
            if (this.opacity > 1 || this.opacity < 0.1) this.speed = -this.speed;
        }
        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(this.opacity)})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }

    class Meteor {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * (canvas.height / 2);
            this.len = Math.random() * 80 + 50;
            this.speed = Math.random() * 10 + 5;
            this.opacity = 1;
        }
        update() {
            this.x -= this.speed; this.y += this.speed; this.opacity -= 0.02;
            if (this.opacity <= 0) this.init();
        }
        draw() {
            const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.len, this.y - this.len);
            grad.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
            grad.addColorStop(1, "rgba(255, 255, 255, 0)");
            ctx.strokeStyle = grad; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.len, this.y - this.len); ctx.stroke();
        }
    }

    function initEngine() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = Array.from({length: 150}, () => new Star());
        meteors = Array.from({length: 2}, () => new Meteor());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => { s.update(); s.draw(); });
        if (allowMeteors) meteors.forEach(m => { m.update(); m.draw(); });
        requestAnimationFrame(animate);
    }

    window.onload = () => {
        initEngine(); animate();
        document.getElementById('line1').classList.add('anim-breathe');
        setTimeout(() => document.getElementById('line2').classList.add('anim-breathe'), 4500);
        setTimeout(() => nextPage(1, 2), 9500);
    };

    function nextPage(from, to) {
        document.getElementById('page' + from).classList.remove('active');
        if (to === 4) allowMeteors = false; // 第四页关闭流星
        
        setTimeout(() => {
            document.getElementById('page' + to).classList.add('active');
            if(to === 2) { setupInput(); startHint(); }
            if(to === 3) { setSphereRandom(); }
            if(to === 4) {
                document.getElementById('top-divider').style.display = 'none';
                document.getElementById('bottom-disclaimer').style.display = 'block';
            }
        }, 1000);
    }

    function setSphereRandom() {
        const theme = cosmicThemes[Math.floor(Math.random() * cosmicThemes.length)];
        const s = document.getElementById('sphere');
        s.style.background = `radial-gradient(circle at 30% 30%, #fff 0%, ${theme.sphere} 100%)`;
        s.style.boxShadow = `0 0 80px ${theme.sphere}`;
    }

    function showAnswer() {
        // 【关键修复】随机选择第四页的渐变背景
        const theme = cosmicThemes[Math.floor(Math.random() * cosmicThemes.length)];
        document.getElementById('bg-wrapper').style.background = theme.bg;

        const res = answers[Math.floor(Math.random() * answers.length)];
        document.getElementById('ans-cn').innerText = res.cn;
        document.getElementById('ans-en').innerText = res.en;
        nextPage(3, 4);
    }

    function setupInput() {
        const boxes = [document.getElementById('num1'), document.getElementById('num2'), document.getElementById('num3')];
        boxes.forEach((box, i) => {
            box.addEventListener('input', () => {
                box.value = box.value.replace(/[^\d]/g, '');
                if (box.value && i < 2) boxes[i+1].focus();
                else if (box.value && i === 2) {
                    setTimeout(() => {
                        document.getElementById('display-num').innerText = `数字感应：${boxes[0].value}${boxes[1].value}${boxes[2].value}`;
                        nextPage(2, 3);
                    }, 300);
                }
            });
        });
        boxes[0].focus();
    }

    function startHint() {
        let idx = 0;
        setInterval(() => {
            const el = document.getElementById('q-hint');
            el.style.opacity = 0;
            setTimeout(() => { idx = (idx + 1) % hints.length; el.innerText = hints[idx]; el.style.opacity = 0.6; }, 500);
        }, 3000);
    }
</script>
</body>
</html>

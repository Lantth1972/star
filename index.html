<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日星空 - 自动换色版</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 初始背景设为黑色，防止计算颜色时闪屏 */
            background-color: #000; 
            transition: background 1.5s ease; /* 颜色切换时平滑过渡 */
        }
        #starCanvas { display: block; }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<script>
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    // --- 核心逻辑：基于日期生成颜色 ---
    function getDailyColors() {
        const now = new Date();
        const dateSeed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
        
        // 利用日期数字生成一个 0-360 的色相值 (Hue)
        // 这样每一天的色相都会偏移大约 40 度，一周左右完成一个色环循环
        const hue = (dateSeed * 137.5) % 360; 
        
        // 生成三个渐变点：顶部永远是深黑，中部是深色相，底部是亮色相
        const colorTop = '#02060c'; // 深空顶
        const colorMid = `hsl(${hue}, 50%, 10%)`; // 中部深色
        const colorBottom = `hsl(${hue}, 70%, 25%)`; // 底部亮色
        
        return { colorTop, colorMid, colorBottom };
    }

    function applyDailyBackground() {
        const colors = getDailyColors();
        document.body.style.background = `linear-gradient(to bottom, ${colors.colorTop} 0%, ${colors.colorMid} 60%, ${colors.colorBottom} 100%)`;
    }

    // --- 星空绘制逻辑 (保持原有的流畅动效) ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Star {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5;
            this.speed = Math.random() * 0.15 + 0.05;
            this.opacity = Math.random();
            this.blinkSpeed = Math.random() * 0.01 + 0.005;
            this.direction = Math.random() > 0.5 ? 1 : -1;
        }
        update() {
            this.y += this.speed;
            if (this.y > canvas.height) { this.y = -10; this.x = Math.random() * canvas.width; }
            this.opacity += this.blinkSpeed * this.direction;
            if (this.opacity > 1 || this.opacity < 0.1) this.direction *= -1;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.fill();
        }
    }

    function init() {
        applyDailyBackground(); // 设置今日主题色
        stars = [];
        for (let i = 0; i < 350; i++) stars.push(new Star());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => {
            star.update();
            star.draw();
        });
        requestAnimationFrame(animate);
    }

    init();
    animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇宙的回应</title>
    <style>
        :root {
            --gold: #d4af37;
            --star-white: rgba(255, 255, 255, 0.8);
            --bg-color: linear-gradient(to bottom, #02060c 0%, #0a192f 60%, #000 100%);
            --sphere-color: #4facfe; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: white; font-family: "PingFang SC", "STHeiti", serif;
            overflow: hidden;
        }

        #bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            transition: background 2.5s ease-in-out;
            z-index: 1;
        }

        #star-canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        .container { 
            position: relative; z-index: 10; 
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 顶部装饰线 */
        .divider-fixed {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px;
            display: flex; align-items: center; justify-content: center;
            z-index: 15; opacity: 0.8;
        }
        .divider-line {
            flex-grow: 1; height: 1px;
            background: linear-gradient(to var(--dir, right), transparent, var(--gold));
        }
        .divider-line.right { --dir: left; }
        .star-mini { color: var(--gold); font-size: 14px; margin: 0 10px; }
        .moon-phases { display: flex; align-items: center; gap: 8px; color: var(--gold); font-size: 12px; }

        .page { display: none; opacity: 0; transition: opacity 1.5s ease; width: 90%; text-align: center; }
        .active { display: block; opacity: 1; }

        .content-body { margin-top: -8vh; } 

        /* 呼吸文字 */
        .text-breathe { 
            font-size: 28px; letter-spacing: 6px; opacity: 0; 
            text-shadow: 0 0 25px var(--star-white);
            position: absolute; width: 100%; left: 0;
        }
        .anim-breathe { animation: breatheFade 5s ease-in-out forwards; }
        @keyframes breatheFade {
            0% { opacity: 0; transform: scale(0.95); }
            40%, 60% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }

        /* 第二页：提问逻辑 */
        .hint-question {
            font-size: 24px; color: var(--star-white); margin-bottom: 10px;
            height: 30px; transition: opacity 0.5s;
        }
        .guide-main { font-size: 26px; font-weight: bold; margin-bottom: 40px; letter-spacing: 2px; }

        .input-num-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 40px; }
        .num-box {
            width: 85px; height: 110px; background: #fff; border-radius: 12px; 
            color: #000; font-size: 48px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: none; outline: none; text-align: center;
        }

        .guide-sub { font-size: 20px; color: var(--gold); letter-spacing: 1px; }

        /* 能量球 */
        .energy-sphere { 
            width: 180px; height: 180px; 
            background: radial-gradient(circle at 30% 30%, #fff 0%, var(--sphere-color) 100%);
            border-radius: 50%; margin: 0 auto; 
            box-shadow: 0 0 80px var(--sphere-color);
            animation: pulse 2.5s infinite alternate; cursor: pointer; 
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* 结果页 */
        .ans-cn { font-size: 42px; font-weight: bold; margin-bottom: 25px; }
        .ans-en { font-size: 24px; color: rgba(255,255,255,0.7); font-style: italic; }
        
        .reset-btn { 
            background: rgba(212, 175, 55, 0.1); border: 2px solid var(--gold); color: var(--gold); 
            padding: 16px 60px; border-radius: 50px; font-size: 22px; font-weight: bold;
            cursor: pointer; margin-top: 60px;
        }

        .disclaimer { position: fixed; bottom: 5vh; width: 100%; text-align: center; font-size: 12px; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="bg-wrapper"></div>
    <canvas id="star-canvas"></canvas>

    <div id="top-divider" class="divider-fixed">
        <div class="divider-line"></div>
        <div class="star-mini">✦</div>
        <div class="moon-phases">☽ ● ☾</div>
        <div class="star-mini">✦</div>
        <div class="divider-line right"></div>
    </div>

    <div class="container">
        <!-- P1: 欢迎 -->
        <div id="page1" class="page active">
            <div class="content-body" style="height:100px; position:relative;">
                <div id="line1" class="text-breathe">聆听来自宇宙的声音</div>
                <div id="line2" class="text-breathe">感受宇宙能量的奥妙</div>
            </div>
        </div>

        <!-- P2: 输入 -->
        <div id="page2" class="page">
            <div class="content-body">
                <div id="q-hint" class="hint-question">适合换工作吗？</div>
                <div class="guide-main">默念你想问的问题</div>
                
                <div class="input-num-group">
                    <input type="tel" maxlength="1" class="num-box" id="num1" inputmode="numeric" pattern="[0-9]*">
                    <input type="tel" maxlength="1" class="num-box" id="num2" inputmode="numeric" pattern="[0-9]*">
                    <input type="tel" maxlength="1" class="num-box" id="num3" inputmode="numeric" pattern="[0-9]*">
                </div>

                <div class="guide-sub">输入你心目中的数字</div>
            </div>
        </div>

        <!-- P3: 感应 -->
        <div id="page3" class="page">
            <div class="content-body">
                <div style="font-size: 22px; margin-bottom: 50px; color: #fff; letter-spacing: 3px;" id="display-num"></div>
                <div class="energy-sphere" onclick="showAnswer()"></div>
                <div style="margin-top: 50px; color: var(--gold); font-size: 22px; font-weight: bold; letter-spacing: 2px;">触碰能量球 · 聆听回应</div>
            </div>
        </div>

        <!-- P4: 结果 -->
        <div id="page4" class="page">
            <div class="ans-cn" id="ans-cn"></div>
            <div class="ans-en" id="ans-en"></div>
            <button class="reset-btn" onclick="location.reload()">再次聆听回响</button>
        </div>
    </div>

    <div class="disclaimer" id="bottom-disclaimer" style="display:none;">仅供娱乐，不作为判断依据</div>

<script>
    const hints = ["适合换工作吗？", "他/她还在意我吗？", "这笔投资可行吗？", "该坚持还是放弃？", "明天会更顺利吗？"];
    const baseAnswers = [
        { cn: "顺其自然", en: "Let it be" }, { cn: "绝对不要", en: "Absolutely not" },
        { cn: "答案就在心中", en: "Answer is within you" }, { cn: "时机尚未成熟", en: "Time is not ripe" },
        { cn: "勇敢尝试", en: "Go for it" }, { cn: "意外的收获", en: "Unexpected gains" },
        { cn: "不要犹豫", en: "Do not hesitate" }, { cn: "会有转机", en: "Things will change" }
    ];

    window.onload = function() {
        initStarEngine();
        document.getElementById('line1').classList.add('anim-breathe');
        setTimeout(() => document.getElementById('line2').classList.add('anim-breathe'), 4500);
        setTimeout(() => nextPage(1, 2), 9500);
    };

    function nextPage(from, to) {
        document.getElementById('page' + from).classList.remove('active');
        setTimeout(() => {
            document.getElementById('page' + to).classList.add('active');
            if(to === 2) { setupInputLogic(); startHintRotation(); }
            if(to === 4) { 
                document.getElementById('top-divider').style.display = 'none';
                document.getElementById('bottom-disclaimer').style.display = 'block';
            }
        }, 1000);
    }

    function setupInputLogic() {
        const boxes = [document.getElementById('num1'), document.getElementById('num2'), document.getElementById('num3')];
        boxes.forEach((box, i) => {
            box.addEventListener('input', () => {
                box.value = box.value.replace(/[^\d]/g, '');
                if (box.value && i < 2) boxes[i+1].focus();
                else if (box.value && i === 2) {
                    setTimeout(() => {
                        document.getElementById('display-num').innerText = `数字感应：${boxes[0].value}${boxes[1].value}${boxes[2].value}`;
                        nextPage(2, 3);
                    }, 300);
                }
            });
        });
        boxes[0].focus();
    }

    function startHintRotation() {
        const hEl = document.getElementById('q-hint');
        let idx = 0;
        setInterval(() => {
            hEl.style.opacity = 0;
            setTimeout(() => {
                idx = (idx + 1) % hints.length;
                hEl.innerText = hints[idx];
                hEl.style.opacity = 0.6;
            }, 500);
        }, 3000);
    }

    function showAnswer() {
        const res = baseAnswers[Math.floor(Math.random() * baseAnswers.length)];
        document.getElementById('ans-cn').innerText = res.cn;
        document.getElementById('ans-en').innerText = res.en;
        nextPage(3, 4);
    }

    function initStarEngine() {
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        const stars = Array.from({length: 150}, () => ({
            x: Math.random() * w, y: Math.random() * h,
            size: Math.random() * 1.5, opacity: Math.random(),
            speed: 0.01 + Math.random() * 0.02
        }));
        function draw() {
            ctx.clearRect(0, 0, w, h);
            stars.forEach(s => {
                s.opacity += s.speed;
                if (s.opacity > 1 || s.opacity < 0.1) s.speed = -s.speed;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>

            padding: 1.5rem 2rem;

        }

            font-size: 1.8rem;
            font-weight: 700;
            color: #1e3a2f;

        }

            color: #5a7a62;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2f0e2;
            padding-bottom: 0.5rem;
        }
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .ext-card {
            background: #fefef7;
            border-radius: 1.2rem;
            border: 1px solid #e6efdf;
            transition: 0.1s;
            overflow: hidden;
        }

            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 1.2rem;
            background: #f8fbf5;
            border-bottom: 1px solid #e2e8d5;
            font-weight: 600;
            font-size: 1rem;
        }
        .card-header .tag {
            background: #e9f0e3;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: normal;
            color: #3a6b47;
        }
        .card-body {
            padding: 1rem 1.2rem;
            line-height: 1.5;
            color: #2c3e2f;
            font-size: 0.95rem;
        }
        .card-body p {
            margin-bottom: 0.5rem;
        }
        .icon {
            font-size: 1.2rem;
        }
        .essay-tip {
            background: #fff7e8;
            border-left: 4px solid #e6b422;
        }
        @media (max-width: 760px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e2e8d5;
                padding: 1rem;
            }
            .topic-list {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .main {
                padding: 1rem;
            }
        }
        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #7c8f7a;

    </style>
</head>

            { type: "深圳时事", icon: "🏙️", title: "南山区“昆虫旅馆”", content: "深圳大学附近的大沙河公园里，有一座用木头、竹筒、瓦片搭成的“昆虫旅馆”，专门为瓢虫、独居蜂、蜻蜓提供栖息地。园子里的蜻蜓和蜜蜂，在这里找到了城市里的家。" },

            { type: "科学拓展", icon: "🔬", title: "倭瓜（南瓜）的环球旅行", content: "南瓜原产美洲，明朝时跟着西班牙商船来到中国。它耐旱、产量高，曾是欧洲和中国的“救命粮”。课文里的倭瓜，其实是一位环游世界的旅行家。🎃" },

            { type: "人文历史", icon: "📜", title: "东南亚华人记忆中的“园子”", content: "马来西亚槟城、新加坡的华人家庭，常常在屋后保留一片“小园子”，种番薯、木瓜、香茅。老一辈华人下南洋时，也把故乡的菜园记忆带到了热带。那是他们心里的“祖父的园子”。" },

            { type: "英文小站", icon: "🇬🇧", title: "单词与句子", content: "garden (园子) , pumpkin (倭瓜/南瓜) , dragonfly (蜻蜓) , freedom (自由)\n📝 *In my grandfather's garden, even the pumpkins seem to laugh.*" },
            { type: "作文锦囊", icon: "✍️", title: "《我心中的园子》写作锦囊", content: "【极简大纲】\n1. 开头：点出“园子”在哪里（可以是老家院子、小区花园或想象的地方）。\n2. 中间：写2-3种事物（比如倭瓜、蜻蜓、昆虫旅馆），用上拟人手法。\n3. 结尾：表达情感——自由、快乐或对自然的爱。\n\n【范文片段】\n  如果我有一座园子，我不会种名贵的花，只种几架倭瓜和黄瓜。倭瓜胖墩墩的，像一个个小太阳趴在地上；黄瓜则调皮地爬满竹架，开出黄灿灿的花。园子里一定要有一座昆虫旅馆——用竹筒和木块搭成。蜻蜓停在旅馆的阳台上，歪着复眼打量我，好像在说：“这是你的地盘，也是我的。”风来时，倭瓜叶拍着巴掌，黄瓜花轻轻落下。我躺在草地上想：自由，大概就是这个味道吧。" }
        ],
        "古诗三首": [
            { type: "深圳时事", icon: "🏙️", title: "深圳儿童公园的冰趣", content: "虽然深圳不下雪，但罗湖儿童公园冬天会举办“冰雪节”，人造冰场让孩子们体验《稚子弄冰》的快乐。公园还复原了古代冰戏的玩法，敲冰、穿冰钏。" },
            { type: "全国时事", icon: "🇨🇳", title: "哈尔滨冰雪大世界", content: "每年冬天，哈尔滨冰雪大世界吸引百万游客。小学生可以在这里看到冰雕、冰滑梯，体验杨万里诗中“敲成玉磬穿林响”的乐趣。冰雪文化成为北方孩子的童年记忆。" },
            { type: "国际时事", icon: "🌍", title: "日本·冬日“冰镜”游戏", content: "在日本长野，孩子们冬天会把水冻成薄冰片，穿绳挂起来当镜子玩，和《稚子弄冰》几乎一模一样。东亚文化里的冰雪游戏，千年前就相通。" },

            { type: "科学拓展", icon: "🔬", title: "宋代农具“秧马”", content: "《四时田园杂兴》里提到“儿童未解供耕织”，宋代有一种插秧工具叫“秧马”，人骑在上面插秧，腰不酸。江南水田至今仍有类似改良工具。" },

            { type: "人文历史", icon: "📜", title: "东南亚华人童谣里的冰", content: "在泰国、马来西亚，华人后代传唱一首《冰条歌》：“敲冰条，叮当响，阿嬷买来一人半。”虽然热带没有冰，但祖先对冰的记忆通过童谣保留了下来。" },
            { type: "人文历史", icon: "📜", title: "《村晚》与越南水乡", content: "雷震《村晚》“牧童归去横牛背，短笛无腔信口吹”。在越南湄公河三角洲，至今能看见水牛背上的牧童吹笛，和古诗里一模一样。这是中华文化在东南亚的活态传承。" },
            { type: "英文小站", icon: "🇬🇧", title: "单词与句子", content: "ice (冰) , child (儿童) , flute (笛子) , ancient poem (古诗)\n📝 *Children knocking ice make sounds like ringing jade.*" },
            { type: "作文锦囊", icon: "✍️", title: "《我穿越到古诗里》写作锦囊", content: "【极简大纲】\n1. 开头：选择一首古诗，想象自己穿越到那个场景。\n2. 中间：描写所见所闻（冰块、笛声、村庄），加入自己的互动。\n3. 结尾：回到现实，写出对古诗的新感受。\n\n【范文片段】\n  一阵眩晕后，我发现自己站在南宋的村庄里。一个小孩蹲在盆边，正从冰块上敲下一块圆冰，中间凿了个小洞，穿上彩线提在手里，当银钲敲。我凑过去，他用冰锤轻轻一敲——“叮！”声音清亮得像玉磬，穿过竹林。我也试着敲了一下，冰块震得我的手发麻。忽然冰块碎了，小孩咯咯笑起来。我醒了，手里还握着那首诗。原来，快乐古今都一样。" }

        "月是故乡明": [

            { type: "全国时事", icon: "🇨🇳", title: "中国探月工程", content: "嫦娥六号从月球背面采样返回，带回1.9公斤月壤。我们离月亮越来越近，但心里最明的还是故乡的那一轮。" },
            { type: "国际时事", icon: "🌍", title: "全球华人·中秋同一个月亮", content: "从旧金山到悉尼，从伦敦到新加坡，全球华人共庆中秋。马来西亚槟城的“中秋园游会”有提灯游行，和国内一样热闹。月亮连接着五千万海外华人的乡愁。" },

            { type: "人文历史", icon: "📜", title: "杜甫与月夜忆舍弟", content: "“露从今夜白，月是故乡明”是杜甫的诗句。季羡林借用这句诗为题，表达战乱中的家国之思。从杜甫到季羡林，再到今天的异乡人，月亮永远承载着思念。" },
            { type: "英文小站", icon: "🇬🇧", title: "单词与句子", content: "moon (月亮) , hometown (故乡) , bright (明亮) , miss (思念)\n📝 *No matter where I go, the moon always makes me think of home.*" },

    // 辅助渲染函数
    function renderTopic(topicKey) {
        const mainDiv = document.getElementById('mainContent');
        const topicTitleMap = {
            "祖父的园子": "祖父的园子",
            "古诗三首": "古诗三首 · 稚子弄冰 / 村晚 / 四时田园杂兴",
            "月是故乡明": "月是故乡明"
        };
        const subtitleMap = {
            "祖父的园子": "萧红 | 怀念童年与自由",
            "古诗三首": "杨万里·雷震·范成大 | 童趣与田园",
            "月是故乡明": "季羡林 | 月是故乡明"
        };
        const cards = knowledgeBase[topicKey];
        if (!cards || cards.length === 0) {
            mainDiv.innerHTML = `<div style="padding:2rem;text-align:center">📭 暂无拓展内容，待补充</div>`;
            return;
        }

        let html = `
            <div class="current-topic-title">📖 ${topicTitleMap[topicKey]}</div>
            <div class="topic-sub">${subtitleMap[topicKey]}</div>
            <div class="cards-grid">
        `;
        for (let card of cards) {
            let extraClass = (card.type === "作文锦囊") ? "essay-tip" : "";
            html += `
                <div class="ext-card ${extraClass}">
                    <div class="card-header">
                        <span class="icon">${card.icon}</span>
                        <span>${card.title}</span>
                        <span class="tag">${card.type}</span>
                    </div>
                    <div class="card-body">
                        ${card.content.replace(/\n/g, '<br>')}
                    </div>
                </div>
            `;
        }
        html += `</div>`;
        mainDiv.innerHTML = html;
    }

    // 切换课文与高亮
    const btns = document.querySelectorAll('.topic-btn');
    function setActiveTopic(topic) {
        btns.forEach(btn => {
            if (btn.getAttribute('data-topic') === topic) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        renderTopic(topic);
    }

    btns.forEach(btn => {
        btn.addEventListener('click', () => {
            const topic = btn.getAttribute('data-topic');
            setActiveTopic(topic);
        });
    });

    // 默认加载第一个课文
    setActiveTopic('祖父的园子');
</script>
</body>
</html>
